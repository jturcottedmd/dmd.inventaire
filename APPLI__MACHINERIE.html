:root{
  --asphalt:#232221; --asphalt-2:#2f2d2b; --paper:#f3efe6; --paper-dim:#d9d2c2;
  --brick:#8a2f31; --brick-line:#5e2022; --logo-grey:#656263;
  --safety-yellow:#f2b705; --ok-green:#4c7a3f; --danger-red:#c0392b; --line:#46433f;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--asphalt);color:var(--paper);font-family:'Barlow',sans-serif;min-height:100%;}
#app{min-height:100vh; display:flex; flex-direction:column; max-width:560px; margin:0 auto; background:var(--asphalt);}

.hdr{
  padding:14px 16px 14px; background-color:#6e2325;
  background-image:
    linear-gradient(180deg, rgba(0,0,0,0.10), rgba(0,0,0,0.30)),
    repeating-linear-gradient(0deg, rgba(48,16,16,0.85) 0px, rgba(48,16,16,0.85) 3px, transparent 3px, transparent 30px),

}
.back{ color:var(--paper); text-decoration:none; font-size:22px; line-height:1; padding:8px 10px; border-radius:8px; background:rgba(0,0,0,0.25); border:1px solid rgba(0,0,0,0.3); flex:0 0 auto; }
.hdr-title{ font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:21px; letter-spacing:1.5px; text-transform:uppercase; margin:0; }
.hdr-sub{ font-size:11.5px; letter-spacing:1px; text-transform:uppercase; color:var(--paper-dim); margin-top:1px; }

.summary{ display:flex; gap:8px; padding:10px 14px 2px; flex-wrap:wrap; }
.sum-chip{ flex:1 1 auto; min-width:120px; background:var(--asphalt-2); border:1.5px solid var(--line); border-radius:10px; padding:8px 11px; font-size:12px; color:var(--paper-dim); }
.sum-chip b{ display:block; font-family:'Barlow Condensed',sans-serif; font-size:20px; color:var(--paper); }
.sum-chip.alert{ border-color:var(--danger-red); } .sum-chip.alert b{ color:#ff9d8f; }
.sum-chip.warn{ border-color:var(--safety-yellow); } .sum-chip.warn b{ color:var(--safety-yellow); }

.tabs{ display:flex; gap:6px; padding:10px 14px 2px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.tab{ flex:0 0 auto; padding:9px 15px; border-radius:20px; border:1.5px solid var(--line); background:var(--asphalt-2); color:var(--paper-dim); font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:15px; letter-spacing:0.7px; text-transform:uppercase; cursor:pointer; }
.tab.active{ background:var(--brick); border-color:var(--brick-line); color:var(--paper); }
/* Pastilles d'alerte sur les onglets (comme l'inventaire) */
.tab .tcount{ margin-left:6px; font-family:'Barlow',sans-serif; font-size:11.5px; font-weight:700; border-radius:10px; padding:1px 7px; background:var(--danger-red); color:#fff; vertical-align:middle; }
.tab .tcount.orange{ background:var(--safety-yellow); color:#232221; }
.tab .tdot{ display:inline-block; margin-left:6px; width:9px; height:9px; border-radius:50%; background:var(--ok-green); vertical-align:middle; }
/* Indicateur d'enregistrement */
.save-status{ padding:2px 16px 0; font-size:11.5px; color:var(--paper-dim); min-height:16px; }
.save-status.ok{ color:#a9d39a; } .save-status.err{ color:#ff9d8f; font-weight:700; }

.toolbar{ padding:10px 14px 4px; }
.toolbar input{ width:100%; padding:11px 14px; font-size:16px; border-radius:10px; border:1.5px solid var(--line); background:var(--asphalt-2); color:var(--paper); }
.toolbar input:focus{ outline:none; border-color:var(--paper-dim); }
.count{ padding:4px 16px 0; font-size:12px; color:var(--paper-dim); }

.list{ padding:8px 14px 24px; display:flex; flex-direction:column; gap:10px; }
.card{ position:relative; background:var(--asphalt-2); border:1.5px solid var(--line); border-radius:14px; padding:12px 13px; cursor:pointer; border-left-width:5px; }
.card.edge-red{ border-left-color:var(--danger-red); } .card.edge-yellow{ border-left-color:var(--safety-yellow); } .card.edge-green{ border-left-color:var(--ok-green); }

.c-cat{ font-size:10px; letter-spacing:0.5px; text-transform:uppercase; font-weight:700; color:var(--paper-dim); border:1px solid var(--line); border-radius:20px; padding:2px 8px; }
.c-loc{ margin-top:6px; font-size:13px; color:var(--paper); }

.c-pills{ margin-top:8px; display:flex; gap:6px; flex-wrap:wrap; }

.pill.red{ border-color:#5e2022; color:#ff9d8f; } .pill.orange{ border-color:var(--safety-yellow); color:var(--safety-yellow); } .pill.green{ border-color:#345c2a; color:#a9d39a; }

.empty,.loading{ padding:34px 20px; text-align:center; color:var(--paper-dim); font-size:14px; line-height:1.5; }

.foot{ margin-top:auto; padding:14px 18px 20px; color:var(--logo-grey); font-size:11px; text-align:center; border-top:1px solid var(--line); line-height:1.5; }

/* ---- Modale détail ---- */
.overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.66); display:none; align-items:flex-start; justify-content:center; z-index:500; padding:16px; overflow:auto; }
.overlay.show{ display:flex; }
.modal{ background:var(--asphalt-2); border:1.5px solid var(--line); border-radius:16px; padding:16px; width:100%; max-width:520px; margin:10px 0 30px; }
.m-head{ display:flex; align-items:center; gap:10px; margin-bottom:4px; }

details.sec{ background:var(--asphalt); border:1.5px solid var(--line); border-radius:12px; margin-bottom:9px; overflow:hidden; }
details.sec>summary{ list-style:none; cursor:pointer; padding:12px 13px; display:flex; align-items:center; gap:9px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; letter-spacing:0.5px; text-transform:uppercase; }
details.sec>summary::-webkit-details-marker{ display:none; }
details.sec>summary .chev{ margin-left:auto; color:var(--paper-dim); transition:transform .15s; }
details.sec[open]>summary .chev{ transform:rotate(90deg); }
details.sec[open]>summary{ border-bottom:1px solid var(--line); }
.sec-body{ padding:12px 13px; }

.field-label{ font-size:12px; text-transform:uppercase; letter-spacing:0.5px; color:var(--paper-dim); font-weight:700; margin:2px 0 4px; }
.inp{ width:100%; padding:10px 12px; font-size:16px; border-radius:9px; border:1.5px solid var(--line); background:var(--asphalt-2); color:var(--paper); margin-bottom:8px; font-family:'Barlow',sans-serif; }

.btn.mini{ width:auto; padding:6px 10px; font-size:12px; }
.btn-row{ display:flex; gap:8px; margin-top:2px; }

.entry .e-date{ font-weight:700; color:var(--paper); font-size:13px; }
.entry .e-by{ color:var(--logo-grey); font-size:11.5px; margin-left:auto; }
.entry .e-desc{ color:var(--paper); }
.entry .e-actions{ display:flex; gap:8px; margin-top:6px; }
.tag{ font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; border-radius:20px; padding:2px 8px; }
.tag.red{ background:#3a1516; color:#ff9d8f; } .tag.green{ background:#1f3018; color:#a9d39a; } .tag.orange{ background:#3a2f0a; color:var(--safety-yellow); } .tag.grey{ background:var(--asphalt); color:var(--paper-dim); border:1px solid var(--line); }
.mini-link{ color:var(--safety-yellow); font-size:12.5px; font-weight:600; cursor:pointer; text-decoration:none; }
.mini-link.danger{ color:#ff9d8f; }
.empty-sec{ color:var(--logo-grey); font-size:13px; padding:4px 0 8px; }
.note{ background:var(--asphalt-2); border:1px dashed var(--line); border-radius:8px; padding:9px 11px; font-size:12.5px; color:var(--paper-dim); margin-bottom:9px; line-height:1.5; }
.statusline{ font-size:13px; margin-bottom:8px; display:flex; align-items:center; gap:7px; }

/* écran de blocage session */
.gate{ position:fixed; inset:0; z-index:1000; display:none; align-items:center; justify-content:center; padding:28px; text-align:center; background:var(--asphalt); color:var(--paper-dim); font-size:15px; }
.gate.show{ display:flex; }
</style>

function withTimeout(p, ms, label){ return Promise.race([Promise.resolve(p), new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout:'+(label||''))), ms))]); }

const storage = {
  async get(k, shared=true){
    if(shared===false){ try{ const v=localStorage.getItem(k); return v===null?null:{key:k,value:v}; }catch(e){ return null; } }

// ================== HELPERS ==================
function escapeHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeAttr(s){ return escapeHtml(s).replace(/'/g,'&#39;'); }
function formatNom(s){ s=String(s==null?'':s).replace(/\s+/g,' ').trim(); if(!s) return s; return s.toLocaleLowerCase('fr').replace(/[\p{L}\p{N}]+/gu, function(w){ return w.charAt(0).toLocaleUpperCase('fr')+w.slice(1); }); }
function normNom(s){ return (s||'').toString().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[.,\-]/g,' ').replace(/\s+/g,' ').trim(); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayInput(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDateFR(v){ if(!v) return '—'; const d=new Date(v); if(isNaN(d)) return String(v); return d.toLocaleDateString('fr-CA'); }
function fmtDateTimeFR(iso){ const d=new Date(iso); if(isNaN(d)) return ''; return d.toLocaleDateString('fr-CA')+' '+String(d.getHours()).padStart(2,'0')+'h'+String(d.getMinutes()).padStart(2,'0'); }

// Vérif annuelle AAAA/MM (même logique que l'inventaire)
function formatVerif(val){ const d=(val||'').replace(/[^\d]/g,'').slice(0,6); if(d.length<=4) return d; return d.slice(0,4)+'/'+d.slice(4); }
function verifStatus(val){
  const s=(val||'').trim();
  const m=s.match(/^(\d{4})[\/\-. ]?(\d{1,2})$/);
  if(!m) return {level:'red', label: s?'Format AAAA/MM attendu':'Aucune date'};
  const y=parseInt(m[1],10), mo=parseInt(m[2],10);
  if(mo<1||mo>12) return {level:'red', label:'Mois invalide'};
  const now=new Date(); const months=(now.getFullYear()-y)*12+(now.getMonth()+1-mo);
  if(months<0) return {level:'green', label:'Date future'};
  if(months>=12) return {level:'red', label:'Expirée ('+months+' mois)'};
  if(months>=9) return {level:'orange', label:'Bientôt due ('+months+' mois)'};
  return {level:'green', label:'À jour ('+months+' mois)'};
}
// Entretien libre (huile / tune-up) pour machines à moteur
function entretienStatus(val){
  const s=(val||'').trim();
  if(!s) return {level:'grey', label:'À faire'};
  const m=s.match(/(\d{4})[\/\-. ]?(\d{1,2})/);
  if(!m) return {level:'orange', label:'Date à préciser'};
  const y=parseInt(m[1],10), mo=parseInt(m[2],10);
  if(mo<1||mo>12) return {level:'orange', label:'Date à préciser'};
  const now=new Date(); const months=(now.getFullYear()-y)*12+(now.getMonth()+1-mo);

  if(months>=12) return {level:'red', label:'Expiré ('+months+' mois)'};

  return {level:'green', label:'À jour ('+months+' mois)'};

function parLabel(){ try{ const v=localStorage.getItem('inv:deviceUser'); if(v){ const u=JSON.parse(v); if(u && u.nom) return u.nom; } }catch(e){} return 'Appareil '+getDeviceId().slice(-4); }

function machineKey(m){ return (m.ident && m.ident.trim()) ? m.ident.trim() : 'nom:'+normNom(m.nom); }
function recFor(m){ return records[machineKey(m)] || {}; }
function blankRec(m){ return { ident:m.ident||'', nom:m.nom, cat:m.cat, verif:'', huile:'', tuneup:'', loc:null, histoLoc:[], bris:[], reparations:[], inspections:[] }; }
function setSaveStatus(state){
  const el = document.getElementById('saveStatus'); if(!el) return;
  if(state==='saving'){ el.className='save-status'; el.textContent='💾 Enregistrement…'; }
  else if(state==='ok'){ const d=new Date(); el.className='save-status ok'; el.textContent='✔ Enregistré à '+String(d.getHours()).padStart(2,'0')+'h'+String(d.getMinutes()).padStart(2,'0'); }
  else if(state==='err'){ el.className='save-status err'; el.textContent='⚠ Non enregistré — vérifie la connexion et réessaie'; }
  else { el.className='save-status'; el.innerHTML='&nbsp;'; }
}
// Fusionne les listes d'événements avec la version serveur avant d'écrire :
// si un collègue a ajouté un bris/une inspection sur la MÊME machine pendant qu'on
// éditait, son entrée est réintégrée au lieu d'être écrasée (dernier-écrit-gagne).
// Les entrées supprimées volontairement sont mémorisées dans rec.del pour ne pas revenir.
function mergeEventLists(rec, srv){
  const del = new Set(rec.del || []);
  ['bris','reparations','inspections'].forEach(f => {
    const loc = rec[f] || [], remote = (srv && srv[f]) || [];
    const ids = new Set(loc.map(x => x && x.id));
    remote.forEach(x => { if(x && x.id && !ids.has(x.id) && !del.has(x.id)) loc.push(x); });
    loc.sort((a,b) => String((b&&b.date)||'').localeCompare(String((a&&a.date)||'')));
    rec[f] = loc;
  });
  return rec;
}
async function saveMachine(m, rec){
  const key = machineKey(m);
  rec.ident = m.ident||''; rec.nom = m.nom; rec.cat = m.cat;
  setSaveStatus('saving');
  try{
    const r = await storage.get('inv:machine:'+key, true);
    if(r && r.value){ mergeEventLists(rec, JSON.parse(r.value)); }
  }catch(e){}
  records[key] = rec;
  const res = await storage.set('inv:machine:'+key, JSON.stringify(rec), true);
  setSaveStatus(res ? 'ok' : 'err');
}

async function loadTeams(){
  try{ const r=await storage.get('inv:teams', true); if(r&&r.value){ const p=JSON.parse(r.value); if(Array.isArray(p)&&p.length) teams=p; } }catch(e){}
}
async function loadCatalog(){
  // Base embarquée, fusionnée avec le catalogue publié par l'inventaire (ajouts éventuels)
  const byKey = {};
  EMBEDDED_CATALOG.forEach(m => { byKey[machineKey(m)] = Object.assign({}, m); });
  try{
    const r = await storage.get('inv:machineCatalog', true);
    if(r && r.value){
      const p = JSON.parse(r.value);
      if(p && Array.isArray(p.machines)){
        p.machines.forEach(m => {
          if(!m || !m.nom) return;
          if(CATS.indexOf(m.cat) === -1) return;
          const k = machineKey(m);
          if(!byKey[k]) byKey[k] = { ident:m.ident||'', nom:m.nom, cat:m.cat, gas:!!m.gas, vf:!!m.vf };
        });
      }
    }
  }catch(e){}
  catalog = Object.values(byKey);
}
async function loadRecords(){
  records = {};
  try{
    const res = await withTimeout(_sb.from('inv_store').select('key,value').like('key','inv:machine:%'), 12000, 'machines');
    if(res && Array.isArray(res.data)){
      res.data.forEach(r => { try{ const rec=JSON.parse(r.value); if(rec) records[r.key.replace('inv:machine:','')]=rec; }catch(e){} });
    }
  }catch(e){ console.error(e); }
}
// ================== EXTINCTEURS (registre partagé — assignés aux machines) ==================
// Une ligne par extincteur : inv:extincteur:<num> = { num, machineKey, machineNom,
// machineIdent, since, par, statut, history:[] }. Un extincteur = une seule machine.
let extincteurs = {};   // num (string) -> entrée
async function loadExtincteurs(){
  extincteurs = {};
  try{
    const res = await withTimeout(_sb.from('inv_store').select('key,value').like('key','inv:extincteur:%'), 12000, 'ext');
    if(res && Array.isArray(res.data)){
      res.data.forEach(r => { try{ const e = JSON.parse(r.value); if(e && e.num!=null) extincteurs[String(e.num)] = e; }catch(err){} });
    }
  }catch(e){ console.error('loadExtincteurs', e); }
}
function extForMachine(m){
  const k = machineKey(m);
  return Object.values(extincteurs).find(e => e && e.machineKey === k) || null;
}
async function saveExtincteur(e){
  extincteurs[String(e.num)] = e;
  return await storage.set('inv:extincteur:'+e.num, JSON.stringify(e), true);
}
function extHistoPush(e, action){ e.history = e.history || []; e.history.unshift({ date:new Date().toISOString(), action, par:parLabel() }); }
// Assigne l'extincteur `num` à la machine m ; le retire de son ancienne machine (déplacement)
// et retire l'extincteur déjà présent sur m (remplacement).
async function assignExtincteur(m, num){
  num = String(num).replace(/[^\d]/g,'').replace(/^0+(?=\d)/,'');
  if(!num) return false;
  const k = machineKey(m);
  const actuel = extForMachine(m);
  if(actuel && String(actuel.num) !== num){
    actuel.machineKey = null; actuel.machineNom=''; actuel.machineIdent=''; actuel.statut='stock';
    extHistoPush(actuel, 'Retiré de '+(m.ident||m.nom)+' (remplacé par #'+num+')');
    await saveExtincteur(actuel);
  }
  let e = extincteurs[num] || { num:num, machineKey:null, history:[] };
  const provenance = (e.machineKey && e.machineKey !== k) ? (' — déplacé de '+(e.machineIdent||e.machineNom||'?')) : '';
  e.machineKey = k; e.machineNom = m.nom; e.machineIdent = m.ident||''; e.since = new Date().toISOString(); e.par = parLabel(); e.statut = 'assigne';
  extHistoPush(e, 'Assigné à '+(m.ident?m.ident+' — ':'')+m.nom+provenance);
  const res = await saveExtincteur(e);
  return !!res;
}
async function removeExtincteur(m){
  const e = extForMachine(m); if(!e) return;
  e.machineKey=null; e.machineNom=''; e.machineIdent=''; e.statut='stock';
  extHistoPush(e, 'Retiré de '+(m.ident||m.nom)+' — remis en stock');
  await saveExtincteur(e);
}

// Sélection des machines par équipe (faite dans l'inventaire) + chantier de chaque équipe.
// C'est la source de la localisation/équipe AUTOMATIQUE de chaque machine.
async function loadTeamAssignments(){
  teamMachines = {}; teamChantier = {};
  await Promise.all(teams.map(async t => {
    try{
      const r = await storage.get('inv:machines:'+t.id+':MACHINERIE', true);
      if(r && r.value){ const p = JSON.parse(r.value); if(p && p.set && Array.isArray(p.actifs)) teamMachines[t.id] = p.actifs; }
    }catch(e){}
    try{
      const r2 = await storage.get('inv:info:'+t.id, true);
      if(r2 && r2.value){ const info = JSON.parse(r2.value); if(info && typeof info==='object') teamChantier[t.id] = info; }
    }catch(e){}
  }));
}
// Localisation automatique d'une machine = équipe(s) qui l'ont cochée dans l'inventaire + le chantier de l'équipe.
function autoLocForMachine(m){
  const target = normNom(m.nom);
  const found = teams.filter(t => (teamMachines[t.id]||[]).some(n => normNom(n) === target));
  if(!found.length) return null;
  const info = teamChantier[found[0].id] || {};
  const cbits = [];
  if(info.projet && String(info.projet).trim()) cbits.push('Projet '+String(info.projet).trim());
  if(info.adresse && String(info.adresse).trim()) cbits.push(String(info.adresse).trim());
  return { equipe: found.map(x=>x.label).join(', '), chantier: cbits.join(' — '), multi: found.length>1 };
}
function locTextAuto(m){
  const a = autoLocForMachine(m);
  if(!a) return '<span class="muted">Non assignée — coche cette machine dans une équipe de l\'inventaire</span>';
  const bits = [];
  if(a.chantier) bits.push('🏗 '+escapeHtml(a.chantier));
  bits.push('👷 '+escapeHtml(a.equipe));
  return '📍 ' + bits.join(' · ');
}

// ================== STATUT / AFFICHAGE ==================
function machineStatus(m){
  const rec = recFor(m);
  const verif = verifStatus(rec.verif);
  const verifActive = !!(m.vf || (rec.verif && rec.verif.trim()));  // couleur seulement si pertinent
  const openBris = (rec.bris||[]).filter(b => b.statut !== 'resolu').length;
  const openRepar = (rec.reparations||[]).filter(r => r.statut !== 'fait').length;
  const insps = rec.inspections||[];
  const lastInsp = insps.length ? insps[0] : null;
  let maint = null;
  if(m.gas){
    const h=entretienStatus(rec.huile), t=entretienStatus(rec.tuneup);
    const rank={grey:0,green:1,orange:2,red:3};
    maint = (rank[h.level]>=rank[t.level]) ? h : t;
  }
  // couleur de bord : pire de (verif si actif), bris ouverts, maintenance
  let edge='';
  const levels=[];
  if(verifActive) levels.push(verif.level);
  if(openBris>0) levels.push('red');
  if(maint) levels.push(maint.level);
  if(levels.indexOf('red')!==-1) edge=' edge-red';
  else if(levels.indexOf('orange')!==-1) edge=' edge-yellow';
  else if(levels.indexOf('green')!==-1) edge=' edge-green';
  return { rec, verif, verifActive, openBris, openRepar, lastInsp, maint, edge };
}
function locText(rec){
  const l = rec && rec.loc;
  if(!l || (!l.chantier && !l.equipe)) return '<span class="muted">Localisation non renseignée</span>';
  const bits=[];
  if(l.chantier) bits.push('🏗 '+escapeHtml(l.chantier));
  if(l.equipe) bits.push('👷 '+escapeHtml(l.equipe));
  let s = '📍 ' + bits.join(' · ');
  if(l.depuis) s += ' <span class="muted">(depuis '+fmtDateFR(l.depuis)+')</span>';
  return s;
}
function pill(level, text){ return '<span class="pill '+(level||'')+'"><span class="dot '+(level||'grey')+'"></span>'+escapeHtml(text)+'</span>'; }

function renderSummary(){
  let verifDue=0, brisOpen=0, insp0=0;
  const vis = visibleCatalog();
  vis.forEach(m => {
    const st = machineStatus(m);
    if(st.verifActive && (st.verif.level==='red' || st.verif.level==='orange')) verifDue++;
    if(st.openBris>0) brisOpen++;
    if(!st.lastInsp) insp0++;
  });
  document.getElementById('summary').innerHTML =
    '<div class="sum-chip'+(verifDue?' warn':'')+'"><b>'+verifDue+'</b>Vérif. à faire / dues</div>' +
    '<div class="sum-chip'+(brisOpen?' alert':'')+'"><b>'+brisOpen+'</b>Machines avec bris</div>' +
    '<div class="sum-chip"><b>'+vis.length+'</b>Machines suivies</div>';
}
// Pastilles par onglet : rouge = machines en alerte, jaune = à surveiller, vert = tout est beau
function catAlert(cat){
  let red=0, orange=0, green=0;
  visibleCatalog().filter(m => m.cat===cat).forEach(m => {
    const e = machineStatus(m).edge;
    if(e===' edge-red') red++; else if(e===' edge-yellow') orange++; else if(e===' edge-green') green++;
  });
  return { red, orange, green };
}
function renderTabs(){
  document.getElementById('tabs').innerHTML = CATS.map(c => {
    const a = catAlert(c);
    const badge = a.red ? '<span class="tcount">'+a.red+'</span>'
                : (a.orange ? '<span class="tcount orange">'+a.orange+'</span>'
                : (a.green ? '<span class="tdot"></span>' : ''));
    return '<button type="button" class="tab'+(c===currentCat?' active':'')+'" data-cat="'+c+'">'+c+badge+'</button>';
  }).join('');
  document.querySelectorAll('#tabs .tab').forEach(t => t.onclick = () => { currentCat=t.getAttribute('data-cat'); document.getElementById('search').value=''; renderTabs(); renderList(); });
}
// ================== FILTRAGE PAR ÉQUIPE / CHANTIER ==================
// L'utilisateur ne voit que la machinerie de SON équipe (celle choisie dans l'inventaire,
// stockée dans inv:myTeam). En mode admin, on voit toutes les machines.
function isDeviceAdmin(){ try{ return localStorage.getItem('inv:isAdmin') === '1'; }catch(e){ return false; } }
function getMyTeam(){ try{ return localStorage.getItem('inv:myTeam') || null; }catch(e){ return null; } }
// Une machine est-elle sur le chantier de l'équipe donnée ? (cochée par cette équipe dans l'inventaire)
function machineInTeam(m, teamId){
  const target = normNom(m.nom);
  return (teamMachines[teamId]||[]).some(n => normNom(n) === target);
}
// Catalogue visible pour l'utilisateur courant : tout si admin, sinon la machinerie de son équipe.
function visibleCatalog(){
  if(isDeviceAdmin()) return catalog;
  const myTeam = getMyTeam();
  if(!myTeam) return [];   // pas d'équipe choisie -> rien (message d'invitation affiché ailleurs)
  return catalog.filter(m => machineInTeam(m, myTeam));
}

function renderList(){
  const list = document.getElementById('list');
  const q = normNom(document.getElementById('search').value);
  const base = visibleCatalog();
  // Non-admin sans équipe choisie : on invite à sélectionner son équipe dans l'inventaire.
  if(!isDeviceAdmin() && !getMyTeam()){
    document.getElementById('count').textContent = '';
    list.innerHTML = '<div class="empty" style="line-height:1.6;">👷 Choisis d\'abord ton équipe pour voir la machinerie de ton chantier.<br><br>' +
      'Ouvre l\'app <b>Inventaire</b>, onglet <b>Machinerie</b>, et sélectionne ton équipe (le marteau 🔨 apparaît). Tu verras ensuite ici les machines de ton chantier.</div>';
    return;
  }
  let shown;
  if(q){ shown = base.filter(m => normNom(m.nom).includes(q) || normNom(m.ident).includes(q)); }
  else { shown = base.filter(m => m.cat === currentCat); }
  document.getElementById('count').textContent = shown.length + ' machine' + (shown.length>1?'s':'') + (q ? ' trouvée'+(shown.length>1?'s':'') : ' — ' + currentCat);
  if(!shown.length){ list.innerHTML = '<div class="empty">Aucune machine' + (isDeviceAdmin()?'':' sur ton chantier') + ' dans cette catégorie.</div>'; return; }
  list.innerHTML = shown.map(m => {
    const st = machineStatus(m);
    const pills = [];
    pills.push(pill(st.verifActive ? st.verif.level : 'grey', 'Vérif : ' + (st.verifActive ? st.verif.label : 'n/a')));
    if(st.openBris>0) pills.push(pill('red', '⚠️ '+st.openBris+' bris'));
    if(st.openRepar>0) pills.push(pill('orange', '🛠 '+st.openRepar+' répar.'));
    pills.push(pill(st.lastInsp?'green':'grey', 'Insp : ' + (st.lastInsp ? fmtDateFR(st.lastInsp.date) : 'aucune')));
    if(st.maint) pills.push(pill(st.maint.level, '🛢 '+st.maint.label));
    if(m.cat==='Lift' || m.cat==='Fraco'){ const e = extForMachine(m); pills.push(pill(e?'green':'red', e ? ('🧯 #'+e.num) : '🧯 aucun')); }
    return '<div class="card'+st.edge+'" data-key="'+escapeAttr(machineKey(m))+'">' +
      '<div class="c-top"><span class="c-ident">'+escapeHtml(m.ident||'—')+'</span>' +
        '<span class="c-nom">'+escapeHtml(m.nom)+'</span>' + (q?'<span class="c-cat">'+escapeHtml(m.cat)+'</span>':'') + '</div>' +
      '<div class="c-loc">'+locTextAuto(m)+'</div>' +
      '<div class="c-pills">'+pills.join('')+'</div>' +
    '</div>';
  }).join('');
  list.querySelectorAll('.card').forEach(c => c.onclick = () => openDetail(c.getAttribute('data-key')));
}

    '<div class="e-actions"><span class="mini-link danger" data-insp-del="'+i.id+'">Supprimer</span></div></div>'
  ).join('') : '<div class="empty-sec">Aucune inspection enregistrée.</div>';
  const inspSection =
    '<details class="sec"><summary>✅ Inspection quotidienne<span class="chev">▶</span></summary><div class="sec-body">' +
      '<div class="note">📄 Le formulaire d\'inspection officiel sera intégré ici quand tu me fourniras le document. En attendant, tu peux consigner les inspections faites.</div>' +
      '<div class="row2"><input class="inp" type="date" id="inspDate" value="'+todayInput()+'">' +
      '<select class="inp" id="inspConf"><option value="oui">Conforme</option><option value="non">Non conforme</option><option value="na">N/A</option></select></div>' +
      '<textarea class="inp" id="inspNote" placeholder="Note / anomalie constatée (optionnel)"></textarea>' +
      '<button type="button" class="btn primary" id="inspAdd">➕ Consigner l\'inspection</button>' +
      '<div class="field-label" style="margin-top:12px;">Historique des inspections</div>' + inspHtml +
    '</div></details>';

  // --- Entretien moteur (machines à essence) ---
  let entretienSection = '';
  if(m.gas){
    const h=entretienStatus(rec.huile), t=entretienStatus(rec.tuneup);
    entretienSection =
      '<details class="sec"><summary>🛢 Entretien moteur<span class="chev">▶</span></summary><div class="sec-body">' +
        '<div class="field-label">Huile <span class="pill '+h.level+'" style="margin-left:6px;"><span class="dot '+h.level+'"></span>'+escapeHtml(h.label)+'</span></div>' +
        '<input class="inp" id="entHuile" placeholder="ex : fait 2026-05" value="'+escapeAttr(rec.huile||'')+'">' +
        '<div class="field-label">Tune-up <span class="pill '+t.level+'" style="margin-left:6px;"><span class="dot '+t.level+'"></span>'+escapeHtml(t.label)+'</span></div>' +
        '<input class="inp" id="entTune" placeholder="ex : fait 2026-03" value="'+escapeAttr(rec.tuneup||'')+'">' +
        '<button type="button" class="btn primary" id="entSave">Enregistrer l\'entretien</button>' +
      '</div></details>';
  }

  // --- Extincteur assigné (Lift / Fraco) ---
  let extincteurSection = '';
  if(m.cat === 'Lift' || m.cat === 'Fraco'){
    const e = extForMachine(m);
    const cur = e
      ? ('🧯 <b>Extincteur #'+escapeHtml(String(e.num))+'</b>' + (e.since ? ' <span style="color:var(--logo-grey);">(depuis '+fmtDateFR(e.since)+')</span>' : ''))
      : '<span style="color:var(--logo-grey);">Aucun extincteur assigné</span>';
    const histo = (e && e.history && e.history.length)
      ? e.history.slice(0,6).map(h => '<div class="entry"><div class="e-top"><span class="e-date">'+fmtDateFR(h.date)+'</span><span class="e-by">'+escapeHtml(h.par||'')+'</span></div><div class="e-desc">'+escapeHtml(h.action||'')+'</div></div>').join('')
      : '<div class="empty-sec">Aucun changement enregistré.</div>';
    extincteurSection =
      '<details class="sec" open><summary>🧯 Extincteur assigné' + (e?'':' <span class="tag red" style="margin-left:6px;">Aucun</span>') + '<span class="chev">▶</span></summary><div class="sec-body">' +
        '<div class="statusline">'+cur+'</div>' +
        '<div class="btn-row"><button type="button" class="btn primary" id="extAssign">'+(e?'Changer l\'extincteur':'Assigner un extincteur')+'</button>' +
        (e?'<button type="button" class="btn" id="extRemove">Retirer</button>':'') + '</div>' +
        '<div class="note">Chaque Lift et Fraco doit avoir un extincteur numéroté (registre = onglet Extincteurs de l\'inventaire). Déplacer un extincteur ici le retire automatiquement de son ancienne machine.</div>' +
        '<div class="field-label" style="margin-top:12px;">Historique</div>' + histo +
      '</div></details>';
  }

  box.innerHTML =
    '<div class="m-head"><span class="c-ident">'+escapeHtml(m.ident||'—')+'</span><span class="m-title">'+escapeHtml(m.nom)+'</span><button type="button" class="m-close" id="mClose">✕</button></div>' +
    '<div class="m-catline">'+escapeHtml(m.cat)+(m.gas?' · moteur':'')+'</div>' +
    locSection + extincteurSection + verifSection + inspSection + brisSection + repSection + entretienSection;

  document.getElementById('overlay').classList.add('show');
  document.getElementById('mClose').onclick = closeModal;
  wireDetail(m, key);
}

function wireDetail(m, key){
  const rec = records[key];
  const reopen = () => { renderSummary(); renderTabs(); renderList(); openDetail(key); };

  // Extincteur assigné (Lift/Fraco) — assignation / remplacement / retrait
  const extAssign = document.getElementById('extAssign');
  if(extAssign) extAssign.onclick = async () => {
    const cur = extForMachine(m);
    const saisie = prompt('Numéro de l\'extincteur à assigner à '+(m.ident||m.nom)+' :', cur ? String(cur.num) : '');
    if(saisie == null) return;
    const num = String(saisie).replace(/[^\d]/g,'');
    if(!num){ alert('Entre un numéro d\'extincteur (ex. 12).'); return; }
    const other = Object.values(extincteurs).find(x => x && String(x.num) === num && x.machineKey && x.machineKey !== machineKey(m));
    if(other && !confirm('L\'extincteur #'+num+' est présentement sur '+(other.machineIdent||other.machineNom||'une autre machine')+'.\nLe déplacer sur '+(m.ident||m.nom)+' ?')) return;
    const ok = await assignExtincteur(m, num);
    if(ok) reopen(); else alert('Enregistrement impossible. Vérifie la connexion et réessaie.');
  };
  const extRemove = document.getElementById('extRemove');
  if(extRemove) extRemove.onclick = async () => {
    if(!confirm('Retirer l\'extincteur de '+(m.ident||m.nom)+' ? Il sera remis en stock.')) return;
    await removeExtincteur(m); reopen();
  };

  // (La localisation & l'équipe sont automatiques — plus de déplacement manuel ici.)
  // Vérif annuelle
  const vfIn = document.getElementById('vfInput');
  if(vfIn) vfIn.addEventListener('input', () => { const p=vfIn.selectionStart; vfIn.value=formatVerif(vfIn.value); });
  const vfSave = document.getElementById('vfSave');
  if(vfSave) vfSave.onclick = async () => { rec.verif = formatVerif(document.getElementById('vfInput').value); await saveMachine(m, rec); reopen(); };
  // Bris
  const brisAdd = document.getElementById('brisAdd');
  if(brisAdd) brisAdd.onclick = async () => {
    const desc=document.getElementById('brisDesc').value.trim(); const date=document.getElementById('brisDate').value;
    if(!desc){ alert('Décris le bris.'); return; }
    rec.bris = rec.bris||[]; rec.bris.unshift({ id:uid(), date, desc, statut:'ouvert', par:parLabel() });
    await saveMachine(m, rec); reopen();
  };
  document.querySelectorAll('[data-bris-res]').forEach(el => el.onclick = async () => { const id=el.getAttribute('data-bris-res'); const b=(rec.bris||[]).find(x=>x.id===id); if(b){ b.statut='resolu'; b.resoluDate=new Date().toISOString(); } await saveMachine(m, rec); reopen(); });
  document.querySelectorAll('[data-bris-del]').forEach(el => el.onclick = async () => { if(!confirm('Supprimer ce bris ?')) return; const id=el.getAttribute('data-bris-del'); rec.bris=(rec.bris||[]).filter(x=>x.id!==id); (rec.del=rec.del||[]).push(id); await saveMachine(m, rec); reopen(); });
  // Réparations
  const repAdd = document.getElementById('repAdd');
  if(repAdd) repAdd.onclick = async () => {
    const desc=document.getElementById('repDesc').value.trim(); const date=document.getElementById('repDate').value; const cout=document.getElementById('repCout').value.trim();
    if(!desc){ alert('Décris la réparation.'); return; }
    rec.reparations = rec.reparations||[]; rec.reparations.unshift({ id:uid(), date, desc, cout, statut:'a_faire', par:parLabel() });
    await saveMachine(m, rec); reopen();
  };
  document.querySelectorAll('[data-rep-cyc]').forEach(el => el.onclick = async () => { const id=el.getAttribute('data-rep-cyc'); const r=(rec.reparations||[]).find(x=>x.id===id); if(r){ r.statut = r.statut==='a_faire'?'en_cours':(r.statut==='en_cours'?'fait':'a_faire'); } await saveMachine(m, rec); reopen(); });
  document.querySelectorAll('[data-rep-del]').forEach(el => el.onclick = async () => { if(!confirm('Supprimer cette réparation ?')) return; const id=el.getAttribute('data-rep-del'); rec.reparations=(rec.reparations||[]).filter(x=>x.id!==id); (rec.del=rec.del||[]).push(id); await saveMachine(m, rec); reopen(); });
  // Inspections
  const inspAdd = document.getElementById('inspAdd');
  if(inspAdd) inspAdd.onclick = async () => {
    const date=document.getElementById('inspDate').value; const conforme=document.getElementById('inspConf').value; const note=document.getElementById('inspNote').value.trim();
    rec.inspections = rec.inspections||[]; rec.inspections.unshift({ id:uid(), date, conforme, note, par:parLabel() });
    await saveMachine(m, rec); reopen();
  };
  document.querySelectorAll('[data-insp-del]').forEach(el => el.onclick = async () => { if(!confirm('Supprimer cette inspection ?')) return; const id=el.getAttribute('data-insp-del'); rec.inspections=(rec.inspections||[]).filter(x=>x.id!==id); (rec.del=rec.del||[]).push(id); await saveMachine(m, rec); reopen(); });
  // Entretien moteur
  const entSave = document.getElementById('entSave');
  if(entSave) entSave.onclick = async () => { rec.huile=document.getElementById('entHuile').value.trim(); rec.tuneup=document.getElementById('entTune').value.trim(); await saveMachine(m, rec); reopen(); };
}

/* ============================================================
   EXPORT EXCEL (Ctrl+X révèle le bouton — même principe que l'inventaire)
   ============================================================ */
function xlsSheet(aoa, meta, widths, leftCols){
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = widths.map(w => ({wch:w}));
  ws['!freeze'] = { xSplit:0, ySplit:1 };
  ws['!autofilter'] = { ref: XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:aoa.length-1, c:widths.length-1}}) };
  for(let r=0; r<aoa.length; r++){
    for(let c=0; c<widths.length; c++){
      const addr = XLSX.utils.encode_cell({r,c});
      if(!ws[addr]) ws[addr] = { t:'s', v:'' };
      const m = meta[r] || {};
      let fill='FFFFFF', bold=false, fontColor='000000';
      if(m.header){ fill='232221'; bold=true; fontColor='FFFFFF'; }
      else if(m.cat){ fill='D9D2C2'; bold=true; }
      else if(m.couleur==='red') fill='F4CCCC';
      else if(m.couleur==='yellow') fill='FFF2CC';
      else if(m.couleur==='green') fill='D9EAD3';
      ws[addr].s = {
        fill:{ patternType:'solid', fgColor:{rgb:fill} },
        font:{ name:'Arial', sz:m.header?11:10, bold:bold, color:{rgb:fontColor} },
        alignment:{ vertical:'center', horizontal:(leftCols.indexOf(c)!==-1)?'left':'center', wrapText:!!m.header },
        border:{ top:{style:'thin',color:{rgb:'CCCCCC'}}, bottom:{style:'thin',color:{rgb:'CCCCCC'}},
                 left:{style:'thin',color:{rgb:'CCCCCC'}}, right:{style:'thin',color:{rgb:'CCCCCC'}} }
      };
    }
  }
  return ws;
}
// Instantané de l'état des machines, pour la feuille « Résumé modifs » (comme l'inventaire)
function machSnapshotNow(){
  const snap = {};
  catalog.forEach(m => {
    const r = recFor(m) || {}; const loc = autoLocForMachine(m) || {};
    snap[machineKey(m)] = {
      nom:m.nom, verif:r.verif||'', chantier:loc.chantier||'', equipe:loc.equipe||'',
      huile:r.huile||'', tuneup:r.tuneup||'',
      brisOuverts:(r.bris||[]).filter(b=>b.statut!=='resolu').length,
      bris:(r.bris||[]).length,
      rep:(r.reparations||[]).length,
      repFaites:(r.reparations||[]).filter(x=>x.statut==='fait').length,
      insp:(r.inspections||[]).length
    };
  });
  return snap;
}
function machDiffRows(prev, now){
  const rows = [];
  const push = (k, changement, avant, apres, couleur) => {
    const ident = k.indexOf('nom:')===0 ? '—' : k;
    const nom = (now[k]||prev[k]||{}).nom || '';
    rows.push({ row:[ident, nom, changement, avant, apres], couleur });
  };
  Object.keys(now).forEach(k => {
    const p = prev[k], n = now[k];
    if(!p){ push(k, 'Nouvelle machine', '', '', 'yellow'); return; }
    if(p.verif !== n.verif){ const vs = verifStatus(n.verif); push(k, 'Vérif annuelle', p.verif||'—', n.verif||'—', vs?vs.level.replace('orange','yellow'):null); }
    if(p.chantier !== n.chantier || p.equipe !== n.equipe){
      push(k, 'Déplacement', [p.chantier,p.equipe].filter(Boolean).join(' · ')||'—', [n.chantier,n.equipe].filter(Boolean).join(' · ')||'—', 'yellow');
    }
    if(n.brisOuverts > p.brisOuverts) push(k, 'Nouveau bris', p.brisOuverts+' ouvert(s)', n.brisOuverts+' ouvert(s)', 'red');
    if(n.brisOuverts < p.brisOuverts) push(k, 'Bris résolu', p.brisOuverts+' ouvert(s)', n.brisOuverts+' ouvert(s)', 'green');
    if(n.rep > p.rep) push(k, 'Réparation ajoutée', p.rep, n.rep, 'yellow');
    if(n.repFaites > p.repFaites) push(k, 'Réparation faite', p.repFaites, n.repFaites, 'green');
    if(n.insp > p.insp) push(k, 'Inspection(s) +'+(n.insp-p.insp), p.insp, n.insp, 'green');
    if(p.huile !== n.huile) push(k, 'Huile', p.huile||'—', n.huile||'—', 'green');
    if(p.tuneup !== n.tuneup) push(k, 'Tune-up', p.tuneup||'—', n.tuneup||'—', 'green');
  });
  return rows;
}
// Chargement à la demande de la librairie Excel (~1 Mo) : uniquement lors d'un export/import.
let _xlsxLoading = null;
function ensureXLSX(){
  if(window.XLSX) return Promise.resolve();
  if(_xlsxLoading) return _xlsxLoading;
  _xlsxLoading = new Promise(function(res, rej){
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js';
    s.onload = function(){ res(); };
    s.onerror = function(){ _xlsxLoading = null; rej(new Error('xlsx')); };
    document.head.appendChild(s);
  });
  return _xlsxLoading;
}
async function exporterExcel(){
  const btn = document.getElementById('exportBtn');
  const old = btn ? btn.textContent : '';
  if(btn){ btn.textContent='...'; btn.disabled=true; }
  try{
    try{ await ensureXLSX(); }catch(e){ alert('Impossible de charger le module Excel. Vérifie ta connexion et réessaie.'); return; }
    const wb = XLSX.utils.book_new();
    const edgeToCouleur = e => e===' edge-red' ? 'red' : (e===' edge-yellow' ? 'yellow' : (e===' edge-green' ? 'green' : null));
    // --- Résumé modifs depuis le dernier export ---
    const snapNow = machSnapshotNow();
    let prevSnap = null;
    try{ const r = await storage.get('inv:machSnapshot', true); if(r && r.value) prevSnap = JSON.parse(r.value); }catch(e){}
    if(prevSnap && prevSnap.data){
      const diffs = machDiffRows(prevSnap.data, snapNow);
      const aoa=[['Ident','Machine','Changement','Avant','Après']], meta=[{header:true}];
      const depuis = prevSnap.meta && prevSnap.meta.date ? new Date(prevSnap.meta.date).toLocaleString('fr-CA') : '—';
      aoa.push(['Depuis le dernier export : '+depuis, '', '', '', '']); meta.push({cat:true});
      if(diffs.length){ diffs.forEach(dd => { aoa.push(dd.row); meta.push({couleur:dd.couleur}); }); }
      else { aoa.push(['Aucune modification.', '', '', '', '']); meta.push({}); }
      XLSX.utils.book_append_sheet(wb, xlsSheet(aoa, meta, [10,28,22,26,26], [1,3,4]), 'Résumé modifs');
    }
    // --- Une feuille par type de machine ---
    const H = ['Ident','Machine','Chantier','Équipe','Depuis','Vérif annuelle','Statut vérif','Bris ouverts','Répar. en cours','Dern. inspection','Huile','Tune-up','Extincteur'];
    const W = [8,30,26,13,12,14,24,12,15,15,15,15,12];
    CATS.forEach(cat => {
      const machines = catalog.filter(m => m.cat===cat);
      if(!machines.length) return;
      const aoa=[H], meta=[{header:true}];
      machines.forEach(m => {
        const st = machineStatus(m); const rec = st.rec || {};
        const loc = autoLocForMachine(m) || {};
        aoa.push([
          m.ident||'—', m.nom, loc.chantier||'', loc.equipe||'',
          '',
          rec.verif||'', st.verifActive ? st.verif.label : 'n/a',
          st.openBris||0, st.openRepar||0,
          st.lastInsp ? String(st.lastInsp.date).slice(0,10) : '',
          m.gas ? (rec.huile||'') : 'n/a', m.gas ? (rec.tuneup||'') : 'n/a',
          (m.cat==='Lift'||m.cat==='Fraco') ? (extForMachine(m) ? ('#'+extForMachine(m).num) : '—') : 'n/a'
        ]);
        meta.push({couleur:edgeToCouleur(st.edge)});
      });
      wb.SheetNames.length; XLSX.utils.book_append_sheet(wb, xlsSheet(aoa, meta, W, [1,2,10,11]), cat.substring(0,31));
    });
    // --- Feuille Historique : tous les événements ---
    const HH = ['Ident','Machine','Type','Date','Description','Statut','Par'];
    const HW = [8,28,14,12,52,14,22];
    const events = [];
    catalog.forEach(m => {
      const rec = recFor(m); if(!rec) return;
      (rec.histoLoc||[]).forEach(h => events.push({ d:h.date||'', row:[m.ident||'—', m.nom, 'Déplacement', String(h.date||'').slice(0,10), [h.chantier, h.equipe, h.note].filter(Boolean).join(' · '), '', formatNom(h.par)], couleur:null }));
      (rec.bris||[]).forEach(b => events.push({ d:b.date||'', row:[m.ident||'—', m.nom, 'Bris', String(b.date||'').slice(0,10), b.desc||'', b.statut==='resolu'?'Résolu':'Ouvert', formatNom(b.par)], couleur:b.statut==='resolu'?'green':'red' }));
      (rec.reparations||[]).forEach(x => events.push({ d:x.date||'', row:[m.ident||'—', m.nom, 'Réparation', String(x.date||'').slice(0,10), (x.desc||'')+(x.cout?(' ('+x.cout+' $)'):''), x.statut==='fait'?'Fait':(x.statut==='en_cours'?'En cours':'À faire'), formatNom(x.par)], couleur:x.statut==='fait'?'green':'yellow' }));
      (rec.inspections||[]).forEach(i => events.push({ d:i.date||'', row:[m.ident||'—', m.nom, 'Inspection', String(i.date||'').slice(0,10), i.note||'', i.conforme==='non'?'Non conforme':(i.conforme==='oui'?'Conforme':'N/A'), formatNom(i.par)], couleur:i.conforme==='non'?'red':(i.conforme==='oui'?'green':null) }));
    });
    if(events.length){
      events.sort((a,b) => String(b.d).localeCompare(String(a.d)));
      const aoa=[HH], meta=[{header:true}];
      events.forEach(ev => { aoa.push(ev.row); meta.push({couleur:ev.couleur}); });
      XLSX.utils.book_append_sheet(wb, xlsSheet(aoa, meta, HW, [1,4]), 'Historique');
    }
    if(!wb.SheetNames.length){ alert('Aucune donnée à exporter.'); return; }
    const d = new Date();
    XLSX.writeFile(wb, 'Machinerie_DMD_' + d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + '.xlsx');
    // Nouvel instantané pour la prochaine comparaison
    try{ await storage.set('inv:machSnapshot', JSON.stringify({ meta:{ date:d.toISOString() }, data:snapNow }), true); }catch(e){}
    if(btn) btn.style.display='none';
  }catch(e){ console.error(e); alert("Une erreur est survenue pendant l'export."); }
  finally{ if(btn){ btn.textContent=old||'⬇ Excel'; btn.disabled=false; } }
}
document.getElementById('exportBtn').addEventListener('click', exporterExcel);

document.addEventListener('keydown', function(e){
  if((e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey && (e.key==='x' || e.key==='X')){
    const el = document.activeElement;
    if(el && (el.tagName==='INPUT' || el.tagName==='TEXTAREA' || el.isContentEditable)) return;
    e.preventDefault();
    const btn = document.getElementById('exportBtn');
    if(btn){ btn.style.display=''; btn.focus(); }
  }
});
