/* ============================================================
   EXPORT EXCEL — toutes les équipes, tout le détail, 1 fichier
   ============================================================ */
async function exporterExcel(){
  const btn = document.getElementById('exportBtn');
  const old = btn ? btn.textContent : '';
  if(btn){ btn.textContent = '...'; btn.disabled = true; }
  try{
    // Charger toutes les données de toutes les équipes/catégories
    for(const t of teams){
      for(const cat of allCatKeys()){ await ensureTeamCatLoaded(t.id, cat); }
      await loadTeamInfo(t.id);
    }

    // --- Instantané courant + comparaison avec le dernier export ---
    // Champs de saisie suivis par article, avec libellé lisible
    const FIELD_LABELS = {
      qte:'Qté prévue', qteReel:'Qté réelle',
      etatBon:'État bon', etatMoyen:'État moyen', etatMauvais:'État mauvais',
      ident:'Identification', opts:'Type', localisation:'Localisation',
      verif:'Vérif', pression:'Pression', huile:'Huile', tuneup:'Tune-up', lame:'État lame',
      comment:'Commentaire'
    };
    const TRACK = Object.keys(FIELD_LABELS);
    const INFO_LABELS = { projet:'N° projet', contremaitre:'Contremaître', adresse:'Adresse' };
    function normVal(k, v){
      if(k === 'opts') return Array.isArray(v) ? v.join(' + ') : '';
      return (v ?? '').toString();
    }
    function itemFieldsRec(s){
      const rec = {}; TRACK.forEach(k => { rec[k] = normVal(k, s[k]); }); return rec;
    }

    // Instantané courant, structuré :
    //  cats  : liste des catégories (clé -> label)
    //  items : { "teamId|cat|nomArticle" : { champ:valeur } }  (clé par NOM pour être stable)
    //  info  : { "teamId" : { projet, contremaitre, adresse } }
    const snapshotNow = { cats:{}, items:{}, info:{} };
    allCatKeys().forEach(cat => { snapshotNow.cats[cat] = catLabel(cat); });
    teams.forEach(t => {
      allCatKeys().forEach(cat => {
        const items = itemsFor(cat);
        const st = (perTeamState[t.id] && perTeamState[t.id][cat]) || [];
        items.forEach((it, i) => {
          if(it.header) return;
          const s = st[i] || {};
          const rec = itemFieldsRec(s);
          rec._by = s._by || '';   // qui a modifié en dernier (non compté dans TRACK)
          const nom = (it.name || '').replace(/\n/g,' ');
          // On enregistre l'article s'il a une saisie (sinon inutile)
          if(TRACK.some(k => rec[k] !== '')) snapshotNow.items[t.id + '|' + cat + '|' + nom] = rec;
        });
      });
      const inf = teamInfo[t.id] || {};
      snapshotNow.info[t.id] = {
        projet: (inf.projet||'').toString(),
        contremaitre: (inf.contremaitre||'').toString(),
        adresse: (inf.adresse||'').toString()
      };
    });

    // Récupérer l'ancien instantané
    let prevSnap = null, prevMeta = null, hadBaseline = false;
    try{
      const raw = await window.storage.get('inv:snapshot', true);
      if(raw && raw.value){ const parsed = JSON.parse(raw.value); prevSnap = parsed.data || null; prevMeta = parsed.meta || null; }
    }catch(e){ prevSnap = null; }
    if(prevSnap){
      hadBaseline = true;
      // Compatibilité : ancien format (plat, clés "team|cat|idx") -> on repart d'une base vide.
      // (les index ne sont plus comparables aux nouvelles clés par nom)
      if(!prevSnap.items && !prevSnap.cats && !prevSnap.info){
        prevSnap = { cats:{}, items:{}, info:{} };
      }
    }

    // Calculer TOUTES les modifications
    // change = { team, cat, article, champ, avant, apres, level? }
    // Niveau de couleur d'un champ d'après sa valeur APRÈS modif (pour colorer la ligne)
    function champLevel(fieldKey, after){
      if(!after) return null;
      if(fieldKey === 'verif'){ const r = verifStatus(after.verif); return r ? r.level : null; }
      if(fieldKey === 'huile'){ const r = entretienStatus(after.huile); return r ? r.level : null; }
      if(fieldKey === 'tuneup'){ const r = entretienStatus(after.tuneup); return r ? r.level : null; }
      if(fieldKey === 'qte' || fieldKey === 'qteReel'){ const r = qtyStatus(after.qte, after.qteReel); return r ? r.level : null; }
      if(fieldKey === 'etatBon' || fieldKey === 'etatMoyen' || fieldKey === 'etatMauvais'){
        const es = etatSummary({ etatBon:after.etatBon, etatMoyen:after.etatMoyen, etatMauvais:after.etatMauvais });
        return es ? es.level : null;
      }
      return null; // ident, type, localisation, pression, lame, commentaire -> neutre
    }
    const changes = [];
    if(prevSnap){
      const pCats = prevSnap.cats || {}, nCats = snapshotNow.cats || {};
      const pItems = prevSnap.items || {}, nItems = snapshotNow.items || {};
      const pInfo = prevSnap.info || {}, nInfo = snapshotNow.info || {};

      // 1) Onglets (catégories) ajoutés / supprimés
      Object.keys(nCats).forEach(k => {
        if(!(k in pCats)) changes.push({ team:'—', cat:nCats[k], article:'—', champ:'Onglet', avant:'(absent)', apres:'ajouté' });
      });
      Object.keys(pCats).forEach(k => {
        if(!(k in nCats)) changes.push({ team:'—', cat:pCats[k], article:'—', champ:'Onglet', avant:'présent', apres:'supprimé' });
      });

      // 2) Articles ajoutés / supprimés / modifiés (clé = teamId|cat|nom)
      const allItemKeys = new Set([...Object.keys(pItems), ...Object.keys(nItems)]);
      allItemKeys.forEach(key => {
        const parts = key.split('|');
        const teamId = parts[0], cat = parts[1], nom = parts.slice(2).join('|');
        const teamNom = teamLabel(teamId);
        const catNom = (nCats[cat] || pCats[cat] || cat);
        const before = pItems[key], after = nItems[key];
        const parBy = (after && after._by) || (before && before._by) || '';
        if(before && !after){
          changes.push({ team:teamNom, cat:catNom, article:nom, champ:'Article', avant:'présent', apres:'retiré/vidé', par:parBy });
          return;
        }
        if(!before && after){
          // nouvel article renseigné : lister les valeurs saisies
          const remplis = TRACK.filter(k => after[k] !== '');
          const desc = remplis.map(k => FIELD_LABELS[k] + '=' + after[k]).join(', ');
          changes.push({ team:teamNom, cat:catNom, article:nom, champ:'Article', avant:'(vide)', apres:'renseigné' + (desc ? ' — ' + desc : ''), par:parBy });
          return;
        }
        // article présent avant et après : diff champ par champ
        TRACK.forEach(k => {
          const av = before[k] ?? '', ap = after[k] ?? '';
          if(av !== ap){
            changes.push({ team:teamNom, cat:catNom, article:nom, champ:FIELD_LABELS[k],
              avant: av===''?'(vide)':av, apres: ap===''?'(vide)':ap, level: champLevel(k, after), par:parBy });
          }
        });
      });

      // 3) Infos de chantier par équipe
      const allInfoTeams = new Set([...Object.keys(pInfo), ...Object.keys(nInfo)]);
      allInfoTeams.forEach(teamId => {
        const b = pInfo[teamId] || {}, a = nInfo[teamId] || {};
        Object.keys(INFO_LABELS).forEach(k => {
          const av = (b[k]||'').toString(), ap = (a[k]||'').toString();
          if(av !== ap){
            changes.push({ team:teamLabel(teamId), cat:'Chantier', article:'—', champ:INFO_LABELS[k], avant: av===''?'(vide)':av, apres: ap===''?'(vide)':ap });
          }
        });
      });

      // Trier par équipe puis catégorie puis article
      changes.sort((a,b) => (a.team+a.cat+a.article+a.champ).localeCompare(b.team+b.cat+b.article+b.champ, 'fr'));
    }

    const COLS = ['Catégorie','Article','Qté prévue','Qté réelle','Bon','Moyen','Mauvais','Total évalué',
                  'Identification','Type','Localisation','Vérif','Huile','Tune-up','État lame','Pression','Commentaire'];
    const WIDTHS = [14,32,10,10,6,7,8,11,14,16,16,10,10,10,14,9,34];

    function toNum(v){ const n = parseFloat(v); return isNaN(n) ? null : n; }
    function aUneSaisie(s){
      return ['qte','qteReel','etatBon','etatMoyen','etatMauvais','verif','pression','huile','tuneup']
        .some(k => (s[k] ?? '') !== '') || (Array.isArray(s.opts) && s.opts.length > 0);
    }

    const wb = XLSX.utils.book_new();
    let auMoinsUne = false;

    // === Feuille 1 : Résumé des modifications depuis le dernier export ===
    (function buildSummarySheet(){
      const now = new Date();
      const fmt = dt => dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' +
        String(dt.getDate()).padStart(2,'0') + ' ' + String(dt.getHours()).padStart(2,'0') + ':' + String(dt.getMinutes()).padStart(2,'0');
      const sAoa = [];
      const sMeta = [];
      // Titre
      sAoa.push(['RÉSUMÉ DES MODIFICATIONS', '', '', '', '', '']); sMeta.push({title:true});
      const depuis = (prevMeta && prevMeta.date) ? fmt(new Date(prevMeta.date)) : '—';
      sAoa.push(['Dernier export : ' + depuis, '', '', '', '', '']); sMeta.push({info:true});
      sAoa.push(['Export actuel : ' + fmt(now), '', '', '', '', '']); sMeta.push({info:true});
      sAoa.push(['', '', '', '', '', '']); sMeta.push({blank:true});
      // En-têtes du tableau
      sAoa.push(['Équipe','Catégorie','Article','Champ modifié','Avant → Après','Modifié par']); sMeta.push({header:true});
      if(!hadBaseline){
        sAoa.push(['Premier export — aucune comparaison disponible.', '', '', '', '', '']); sMeta.push({note:true});
      }else if(changes.length === 0){
        sAoa.push(['Aucune modification depuis le dernier export.', '', '', '', '', '']); sMeta.push({note:true});
      }else{
        changes.forEach(c => {
          sAoa.push([c.team, c.cat, c.article, c.champ, c.avant + '  →  ' + c.apres, c.par || '(non identifié)']);
          sMeta.push({row:true, level: c.level || null});
        });
      }
      const sws = XLSX.utils.aoa_to_sheet(sAoa);
      sws['!cols'] = [{wch:16},{wch:16},{wch:34},{wch:16},{wch:40},{wch:28}];
      sws['!freeze'] = { xSplit:0, ySplit:5 };
      // Filtre automatique sur la ligne d'en-tête du tableau (ligne 5, index 4)
      // -> permet de filtrer les modifications par Équipe, Catégorie, Modifié par, etc.
      sws['!autofilter'] = { ref: XLSX.utils.encode_range({s:{r:4,c:0}, e:{r:Math.max(4, sAoa.length-1), c:5}}) };
      // Fusion des lignes titre/info sur toute la largeur
      sws['!merges'] = [
        {s:{r:0,c:0},e:{r:0,c:5}},
        {s:{r:1,c:0},e:{r:1,c:5}},
        {s:{r:2,c:0},e:{r:2,c:5}}
      ];
      const nR = sAoa.length, nC = 6;
      for(let r=0; r<nR; r++){
        for(let c=0; c<nC; c++){
          const addr = XLSX.utils.encode_cell({r,c});
          if(!sws[addr]) sws[addr] = { t:'s', v:'' };
          const m = sMeta[r] || {};
          let fill='FFFFFF', bold=false, fontColor='000000', sz=10;
          if(m.title){ fill='232221'; bold=true; fontColor='E8600F'; sz=14; }
          else if(m.info){ fill='2F2D2B'; fontColor='F3EFE6'; }
          else if(m.header){ fill='D9D2C2'; bold=true; }
          else if(m.note){ fill='FFF2CC'; bold=true; }
          else if(m.row && m.level === 'red') fill='F4CCCC';
          else if(m.row && m.level === 'orange') fill='FFF2CC';
          else if(m.row && m.level === 'green') fill='D9EAD3';
          // sinon (changement neutre : ident, localisation, type, commentaire...) -> blanc
          sws[addr].s = {
            fill:{ patternType:'solid', fgColor:{rgb:fill} },
            font:{ name:'Arial', sz:sz, bold:bold, color:{rgb:fontColor} },
            alignment:{ vertical:'center', horizontal:(c===4||m.title||m.info||m.note)?'left':'left', wrapText:false },
            border:{
              top:{style:'thin',color:{rgb:'CCCCCC'}}, bottom:{style:'thin',color:{rgb:'CCCCCC'}},
              left:{style:'thin',color:{rgb:'CCCCCC'}}, right:{style:'thin',color:{rgb:'CCCCCC'}}
            }
          };
        }
      }
      XLSX.utils.book_append_sheet(wb, sws, 'Résumé modifs');
    })();

    // === Feuille 2 : Entretien mécanique (Vérif / Huile / Tune-up en jaune ou rouge) ===
    (function buildEntretienSheet(){
      // Rassemble, toutes équipes confondues, les entretiens/vérifs non-verts.
      const lignes = []; // { equipe, cat, article, type, etat(level), detail }
      teams.forEach(t => {
        allCatKeys().forEach(cat => {
          const items = itemsFor(cat);
          const st = (perTeamState[t.id] && perTeamState[t.id][cat]) || [];
          const catNom = catLabel(cat).toUpperCase();
          items.forEach((it, i) => {
            if(it.header) return;
            const s = st[i] || {};
            const article = (it.name||'').replace(/\n/g,' ');
            // Vérif annuelle : seulement pour les équipements qui en ont une (vf ou ext)
            if(it.vf || it.ext){
              const vs = verifStatus(s.verif);
              if(vs.level === 'orange' || vs.level === 'red'){
                lignes.push({ equipe:teamLabel(t.id), cat:catNom, article,
                  type:'Vérif annuelle', level:vs.level, valeur:(s.verif||'').trim(), detail:vs.label });
              }
            }
            // Huile & Tune-up : seulement pour les moteurs (gas)
            if(it.gas){
              const hs = entretienStatus(s.huile);
              if(hs.level === 'orange' || hs.level === 'red'){
                lignes.push({ equipe:teamLabel(t.id), cat:catNom, article,
                  type:'Huile', level:hs.level, valeur:(s.huile||'').trim(), detail:hs.label });
              }
              const ts = entretienStatus(s.tuneup);
              if(ts.level === 'orange' || ts.level === 'red'){
                lignes.push({ equipe:teamLabel(t.id), cat:catNom, article,
                  type:'Tune-up', level:ts.level, valeur:(s.tuneup||'').trim(), detail:ts.label });
              }
            }
          });
        });
      });
      // Rouge d'abord, puis jaune ; ensuite par catégorie/article
      const rank = lv => lv === 'red' ? 0 : 1;
      lignes.sort((a,b) => rank(a.level)-rank(b.level) || (a.cat+a.article).localeCompare(b.cat+b.article,'fr'));

      const EH = ['Priorité','Équipe','Catégorie','Article','Type d\'entretien','Date inscrite','État'];
      const aoa = [EH];
      const meta = [{header:true}];
      if(lignes.length === 0){
        aoa.push(['—','','','Aucun entretien ni vérification en attente. Tout est à jour ✔','','','']);
        meta.push({note:true});
      }else{
        lignes.forEach(l => {
          aoa.push([
            l.level === 'red' ? 'ROUGE' : 'JAUNE',
            l.equipe, l.cat, l.article, l.type,
            l.valeur || '(vide)', l.detail
          ]);
          meta.push({level:l.level});
        });
      }
      const ews = XLSX.utils.aoa_to_sheet(aoa);
      ews['!cols'] = [{wch:10},{wch:16},{wch:14},{wch:32},{wch:16},{wch:16},{wch:30}];
      ews['!freeze'] = { xSplit:0, ySplit:1 };
      ews['!autofilter'] = { ref: XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:Math.max(0,aoa.length-1), c:EH.length-1}}) };
      const nR = aoa.length, nC = EH.length;
      for(let r=0; r<nR; r++){
        for(let c=0; c<nC; c++){
          const addr = XLSX.utils.encode_cell({r,c});
          if(!ews[addr]) ews[addr] = { t:'s', v:'' };
          const m = meta[r] || {};
          let fill='FFFFFF', bold=false, fontColor='000000';
          if(m.header){ fill='232221'; bold=true; fontColor='FFFFFF'; }
          else if(m.note){ fill='D9EAD3'; bold=true; }
          else if(m.level === 'red') fill='F4CCCC';
          else if(m.level === 'orange') fill='FFF2CC';
          // La colonne Priorité en gras coloré
          const prioBold = (c===0 && !m.header && !m.note);
          ews[addr].s = {
            fill:{ patternType:'solid', fgColor:{rgb:fill} },
            font:{ name:'Arial', sz: m.header?11:10, bold: bold || prioBold,
                   color:{rgb: prioBold ? (m.level==='red'?'B00000':'9C6500') : fontColor} },
            alignment:{ vertical:'center', horizontal:(c===3||c===6)?'left':'center', wrapText:m.header },
            border:{
              top:{style:'thin',color:{rgb:'CCCCCC'}}, bottom:{style:'thin',color:{rgb:'CCCCCC'}},
              left:{style:'thin',color:{rgb:'CCCCCC'}}, right:{style:'thin',color:{rgb:'CCCCCC'}}
            }
          };
        }
      }
      XLSX.utils.book_append_sheet(wb, ews, 'Entretien mécanique');
    })();

    teams.forEach(t => {
      // Rassembler les lignes réellement saisies de cette équipe
      const aoa = [COLS.slice()];        // 1re ligne = en-têtes
      const meta = [{header:true}];      // info de style par ligne
      allCatKeys().forEach(cat => {
        const items = itemsFor(cat);
        const st = (perTeamState[t.id] && perTeamState[t.id][cat]) || [];
        const catNom = catLabel(cat).toUpperCase();
        const lignesCat = [];
        items.forEach((it, i) => {
          if(it.header) return;
          const s = st[i] || {};
          const est = etatSummary(s);
          const qp = it.noQty ? null : toNum(s.qte), qr = it.noQty ? null : toNum(s.qteReel);
          const mauvais = toNum(s.etatMauvais) || 0, moyen = toNum(s.etatMoyen) || 0;
          let couleur = 'none';  // vide => blanc, pas de vert
          if(aUneSaisie(s)){
            couleur = 'green';
            if((qp!==null && qr!==null && qr<qp) || mauvais>0) couleur = 'red';
            else if(moyen>0) couleur = 'yellow';
          }
          lignesCat.push({
            vals:[
              catNom,
              (it.name||'').replace(/\n/g,' '),
              it.noQty ? '' : (s.qte ?? ''), it.noQty ? '' : (s.qteReel ?? ''),
              s.etatBon ?? '', s.etatMoyen ?? '', s.etatMauvais ?? '',
              est ? est.total : '',
              s.ident || '', (Array.isArray(s.opts) ? s.opts.join(' + ') : ''), s.localisation || '',
              s.verif || '', s.huile || '', s.tuneup || '', s.lame || '', s.pression || '', s.comment || ''
            ], couleur
          });
        });
        if(lignesCat.length){
          aoa.push([catNom, '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '']);
          meta.push({cat:true});
          lignesCat.forEach(l => { aoa.push(l.vals); meta.push({couleur:l.couleur}); });
        }
      });

      if(aoa.length <= 1) return; // équipe sans aucune saisie -> pas de feuille
      auMoinsUne = true;

      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols'] = WIDTHS.map(w => ({wch:w}));
      ws['!freeze'] = { xSplit:0, ySplit:1 };
      // Filtre automatique sur la ligne d'en-tête (permet de filtrer par Catégorie, etc.)
      ws['!autofilter'] = { ref: XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:aoa.length-1, c:COLS.length-1}}) };

      // Styliser chaque cellule (SheetJS communautaire lit .s si présent)
      const nRows = aoa.length, nCols = COLS.length;
      for(let r=0; r<nRows; r++){
        for(let c=0; c<nCols; c++){
          const addr = XLSX.utils.encode_cell({r, c});
          if(!ws[addr]) ws[addr] = { t:'s', v:'' };
          const m = meta[r];
          let fill = 'FFFFFF', bold = false, fontColor = '000000';
          if(m.header){ fill = '232221'; bold = true; fontColor = 'FFFFFF'; }
          else if(m.cat){ fill = 'D9D2C2'; bold = true; }
          else if(m.couleur === 'red') fill = 'F4CCCC';
          else if(m.couleur === 'yellow') fill = 'FFF2CC';
          else if(m.couleur === 'green') fill = 'D9EAD3';
          // 'none' => reste blanc (FFFFFF)
          ws[addr].s = {
            fill:{ patternType:'solid', fgColor:{rgb:fill} },
            font:{ name:'Arial', sz: m.header?11:10, bold:bold, color:{rgb:fontColor} },
            alignment:{ vertical:'center', horizontal:(c===0||c===1||c===8||c===9||c===10||c===14||c===16)?'left':'center', wrapText:m.header },
            border:{
              top:{style:'thin',color:{rgb:'CCCCCC'}}, bottom:{style:'thin',color:{rgb:'CCCCCC'}},
              left:{style:'thin',color:{rgb:'CCCCCC'}}, right:{style:'thin',color:{rgb:'CCCCCC'}}
            }
          };
        }
      }
      const nom = teamLabel(t.id).substring(0,31).replace(/[\\/?*\[\]:]/g,' ');
      XLSX.utils.book_append_sheet(wb, ws, nom);
    });

    if(!auMoinsUne && changes.length === 0 && hadBaseline){
      alert("Aucune donnée et aucune modification depuis le dernier export.");
      return;
    }
    if(!auMoinsUne && !hadBaseline){
      alert("Aucune donnée saisie à exporter pour le moment.");
      return;
    }

    const d = new Date();
    const nomFichier = 'Inventaire_DMD_' + d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0') + '.xlsx';
    XLSX.writeFile(wb, nomFichier);

    // Enregistrer le nouvel instantané pour la prochaine comparaison
    try{
      await window.storage.set('inv:snapshot', JSON.stringify({
        meta:{ date: d.toISOString() },
        data: snapshotNow
      }), true);
    }catch(e){ console.error('snapshot save', e); }

    // Recacher le bouton après l'export (il faudra refaire Ctrl+X pour le revoir)
    if(btn) btn.style.display = 'none';
  }catch(e){
    console.error(e);
    alert("Une erreur est survenue pendant l'export. Réessaie dans un instant.");
  }finally{
    if(btn){ btn.textContent = old || '⬇ Excel'; btn.disabled = false; }
  }
}

async function init(){
  document.getElementById('list').innerHTML = '<div class="empty-msg">Chargement...</div>';
  await loadTeams();
  await loadCustomCats();
  await loadMyTeam();
  await loadDeviceUser();
  // Assure que l'identité de cet appareil figure dans le répertoire partagé
  if(deviceUser && !deviceUser.chantier && (deviceUser.nom || deviceUser.courriel)){
    try{ await saveDeviceUser(deviceUser); }catch(e){}
  }
  for(const cat of allCatKeys()){
    await loadExtraItems(cat);
  }
  for(const t of teams){ await loadTeamInfo(t.id); }
  await ensureTeamCatLoaded(currentTeam, currentCat);
  renderTeamBar();
  renderTabs();
  renderList();
  // Identification obligatoire à la première connexion
  if(!deviceUser){ openIdentityModal(true); }
}
const LOGIN_EMAIL = "equipe@dmd-inventaire.app";
async function _doLogin(){
  const errEl = document.getElementById('loginError');
  const pass  = document.getElementById('loginPass').value;
  errEl.textContent = 'Connexion...';
  const { error } = await _sb.auth.signInWithPassword({ email: LOGIN_EMAIL, password: pass });
  if(error){ errEl.textContent = 'Mot de passe incorrect'; return; }
  document.getElementById('loginScreen').style.display = 'none';
  init();
}
(async function(){
  const { data } = await _sb.auth.getSession();
  if(data && data.session){
    document.getElementById('loginScreen').style.display = 'none';
    init();
  }
})();
document.getElementById('loginBtn').addEventListener('click', _doLogin);
var _expBtn = document.getElementById('exportBtn'); if(_expBtn) _expBtn.addEventListener('click', exporterExcel);
var _idDirBtn = document.getElementById('identDirBtn'); if(_idDirBtn) _idDirBtn.addEventListener('click', openPeopleDirectory);
// Le bouton Export est caché par défaut. Ctrl+X le révèle — mais seulement si on
// n'est pas en train d'éditer un champ (sinon on laisse le "couper" normal agir).
// Sans clavier physique (cellulaire/tablette), le bouton reste donc inaccessible.
document.addEventListener('keydown', function(e){
  if((e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey && (e.key === 'x' || e.key === 'X')){
    const el = document.activeElement;
    const enEdition = el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable);
    if(enEdition) return; // on ne bloque pas le vrai "couper"
    e.preventDefault();
    const btn = document.getElementById('exportBtn');
    if(btn){ btn.style.display = ''; btn.focus(); }
  }
});
document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key === 'Enter') _doLogin(); });
(function(){
  var tp = document.getElementById('togglePass');
  var pf = document.getElementById('loginPass');
  if(tp && pf){
    tp.addEventListener('click', function(){
      var show = pf.type === 'password';
      pf.type = show ? 'text' : 'password';
      tp.textContent = show ? '🙈' : '👁';
      tp.setAttribute('aria-label', show ? 'Masquer le mot de passe' : 'Afficher le mot de passe');
      pf.focus();
    });
  }
})();
