<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Inventaire Équipements</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inventaire">
<meta name="theme-color" content="#232221">


<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&display=swap');

:root{
  --asphalt: #232221;
  --asphalt-2: #2f2d2b;
  --paper: #f3efe6;
  --paper-dim: #d9d2c2;
  --safety-orange: #9a3437;   /* accent : rouge brique du logo DMD */
  --brick: #8a2f31;           /* brique (barre d'équipes) */
  --brick-line: #5e2022;      /* joints de brique */
  --logo-grey: #656263;       /* gris du logo (DMD / toit) */
  --safety-yellow: #f2b705;
  --danger-red: #d94b3a;      /* rouge d'alerte, distinct de l'accent */
  --ok-green: #4c7a3f;
  --line: #46433f;
}

*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
html,body{margin:0;padding:0;background:var(--asphalt);color:var(--paper);font-family:'Barlow',sans-serif;height:100%;overflow-x:hidden;}
#app{min-height:100vh; display:flex; flex-direction:column; max-width:560px; margin:0 auto; background:var(--asphalt);}

.hdr{
  padding:16px 16px 10px;
  /* Motif de brique rouge foncé, rangées décalées comme un vrai mur.
     Chaque couche de joints verticaux est une tuile de 124x60 (deux rangées) :
     rangée du haut alignée, rangée du bas décalée d'une demi-brique. */
  background-color: #6e2325;
  background-image:
    /* ombrage vertical pour la profondeur */
    linear-gradient(180deg, rgba(0,0,0,0.10), rgba(0,0,0,0.28)),
    /* joints horizontaux (mortier) toutes les 30px */
    repeating-linear-gradient(
      0deg,
      rgba(48, 16, 16, 0.85) 0px,
      rgba(48, 16, 16, 0.85) 3px,
      transparent 3px,
      transparent 30px
    ),
    /* joints verticaux, rangée du HAUT (0-30px) : aux positions 0 et 124 */
    linear-gradient(90deg,
      rgba(48,16,16,0.85) 0px, rgba(48,16,16,0.85) 3px,
      transparent 3px, transparent 124px),
    /* joints verticaux, rangée du BAS (30-60px) : décalés de 62px */
    linear-gradient(90deg,
      transparent 0px, transparent 62px,
      rgba(48,16,16,0.85) 62px, rgba(48,16,16,0.85) 65px,
      transparent 65px, transparent 124px);
  background-size: 100% 100%, 100% 30px, 124px 30px, 124px 30px;
  background-position: 0 0, 0 0, 0 0px, 0 30px;
  background-repeat: no-repeat, repeat, repeat, repeat;
  border-bottom:3px solid var(--brick-line);
  position:sticky; top:0; z-index:20;
}
.hdr-title{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:24px;
  letter-spacing:0.5px;
  text-transform:uppercase;
  color:var(--paper);
  display:flex; align-items:center; gap:12px;
  margin:0 0 10px 0;
}
.hdr-logo{
  height:46px; width:auto; display:block;
  background:var(--paper);
  padding:6px 10px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.35);
}
.hdr-sub{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:15px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--paper-dim);
  border-left:2px solid var(--brick);
  padding-left:12px;
}
.hdr-title .chip{
  background:var(--safety-orange);
  color:var(--paper);
  font-size:12px;
  font-weight:800;
  padding:3px 8px;
  border-radius:3px;
  letter-spacing:0.5px;
}
.search-row{display:flex; gap:8px;}
.search-input{
  flex:1;
  background:var(--asphalt);
  border:2px solid var(--line);
  color:var(--paper);
  padding:10px 12px;
  border-radius:6px;
  font-size:15px;
  font-family:'Barlow',sans-serif;
}
.search-input:focus{outline:none; border-color:var(--safety-orange);}
.suggestions{
  display:none;
  margin-top:8px;
  background:var(--asphalt-2);
  border:1.5px solid var(--safety-orange);
  border-radius:8px;
  overflow:hidden;
  max-height:300px;
  overflow-y:auto;
}
.suggestions.show{display:block;}
.suggestion{
  padding:10px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  cursor:pointer;
  border-bottom:1px solid var(--line);
}
.suggestion:last-child{border-bottom:none;}
.suggestion:active{background:var(--asphalt);}
.suggestion-name{font-size:15px; font-weight:600; color:var(--paper); line-height:1.2;}
.suggestion-name mark{background:transparent; color:var(--safety-yellow); font-weight:700;}
.suggestion-cat{
  flex:0 0 auto;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.5px;
  color:var(--asphalt);
  background:var(--paper-dim);
  padding:3px 8px;
  border-radius:10px;
}
.suggestion-empty{padding:12px; text-align:center; color:var(--paper-dim); font-size:14px;}
.save-status{
  font-size:11px;
  color:var(--paper-dim);
  text-transform:uppercase;
  letter-spacing:0.5px;
  min-width:70px;
  text-align:right;
  align-self:center;
  transition:opacity 0.3s;
}

/* Team bar */
.team-bar{
  display:flex;
  overflow-x:auto;
  gap:8px;
  padding:10px 16px;
  background:var(--asphalt-2);
  border-bottom:1px solid var(--line);
  scrollbar-width:none;
  align-items:center;
}
.team-bar::-webkit-scrollbar{display:none;}
.team-info{
  display:none;
  padding:12px 16px;
  background:var(--asphalt);
  border-bottom:1px solid var(--line);
  gap:10px;
  flex-direction:column;
}
.team-info.show{display:flex;}
.team-info-title{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:12px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--safety-orange);
  margin-bottom:2px;
}
.ti-row{display:flex; gap:10px;}
.ti-field{flex:1;}
.ti-field.full{flex:1 1 100%;}
.ti-field label{
  display:block;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.5px;
  color:var(--paper-dim);
  margin-bottom:4px;
  font-weight:600;
}
.ti-field input{
  width:100%;
  background:var(--asphalt-2);
  border:1.5px solid var(--line);
  color:var(--paper);
  padding:9px 10px;
  border-radius:6px;
  font-size:15px;
  font-family:'Barlow',sans-serif;
}
.ti-field input:focus{outline:none; border-color:var(--safety-orange);}
.team-info-readonly{
  background:var(--asphalt-2);
  border:1px solid var(--line);
  border-radius:8px;
  padding:10px 12px;
  margin-bottom:10px;
  font-size:13px;
  line-height:1.5;
}
.team-info-readonly .tir-team{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  text-transform:uppercase;
  color:var(--safety-yellow);
  font-size:14px;
}
.team-info-readonly .tir-line{color:var(--paper-dim);}
.team-info-readonly .tir-line b{color:var(--paper); font-weight:600;}
.team-chip{
  flex:0 0 auto;
  padding:7px 13px;
  border-radius:16px;
  border:2px solid var(--line);
  background:var(--asphalt);
  color:var(--paper-dim);
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:14px;
  text-transform:uppercase;
  letter-spacing:0.3px;
  white-space:nowrap;
  cursor:pointer;
}
.team-chip.active{
  background:var(--paper);
  border-color:var(--paper);
  color:var(--asphalt);
}
.team-chip.total{
  border-color:var(--safety-yellow);
  color:var(--safety-yellow);
  font-weight:800;
}
.team-chip.total.active{
  background:var(--safety-yellow);
  border-color:var(--safety-yellow);
  color:var(--asphalt);
}
.team-edit-btn{
  flex:0 0 auto;
  width:30px; height:30px;
  border-radius:50%;
  border:1.5px solid var(--line);
  background:transparent;
  color:var(--paper-dim);
  font-size:14px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  margin-left:2px;
}

/* Category Tabs */
.tabs{
  display:flex;
  overflow-x:auto;
  gap:8px;
  padding:12px 16px;
  background:var(--asphalt);
  border-bottom:1px solid var(--line);
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  flex:0 0 auto;
  padding:8px 14px;
  border-radius:20px;
  border:2px solid var(--line);
  background:var(--asphalt-2);
  color:var(--paper-dim);
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:15px;
  text-transform:uppercase;
  letter-spacing:0.3px;
  white-space:nowrap;
  display:flex; align-items:center; gap:6px;
  cursor:pointer;
}
.tab.active{
  background:var(--safety-orange);
  border-color:var(--safety-orange);
  color:var(--paper);
}
/* Onglet Santé & Sécurité — toujours rouge */
.tab-sst{
  border-color:var(--danger-red);
  color:#ff9d8c;
  background:rgba(194,59,34,0.12);
}
.tab-sst.active{
  background:var(--danger-red);
  border-color:var(--danger-red);
  color:#fff;
}
.team-color-dot{ display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:6px; vertical-align:middle; }
.team-band{ display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; margin-bottom:10px; font-family:'Barlow Condensed',sans-serif; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; color:#fff; font-size:16px; }
.team-band .tb-dot{ width:14px; height:14px; border-radius:50%; background:rgba(255,255,255,0.9); }
.alert-dot{ display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--danger-red); margin-left:5px; vertical-align:middle; box-shadow:0 0 0 2px rgba(194,59,34,0.25); }
.team-chip .alert-dot{ margin-left:6px; }
.my-team-badge{ margin-left:6px; font-size:14px; vertical-align:middle; }
/* Répertoire des personnes identifiées */
.people-list{ display:flex; flex-direction:column; gap:8px; max-height:55vh; overflow-y:auto; }
.people-item{ background:var(--asphalt-2); border:1px solid var(--line); border-radius:10px; padding:10px 12px; }
.people-top{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
.people-name{ font-weight:700; color:var(--paper); font-size:15px; }
.people-team{ font-size:12px; font-weight:700; color:var(--paper); background:var(--brick); border-radius:12px; padding:2px 10px; white-space:nowrap; }
.people-contact{ font-size:13px; color:var(--paper-dim); margin-top:4px; word-break:break-word; }
.people-contact a{ color:var(--paper-dim); text-decoration:underline; }
/* Sélection des machines par équipe */
.manage-machines-bar{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:var(--asphalt-2); border:1px solid var(--line); border-radius:10px;
  padding:10px 14px; margin-bottom:12px; font-weight:600; color:var(--paper-dim);
}
.manage-machines-bar button{
  background:var(--brick); color:var(--paper); border:none; border-radius:8px;
  padding:8px 14px; font-weight:700; font-family:'Barlow',sans-serif; cursor:pointer; white-space:nowrap;
}
.machine-select{ padding:4px 2px 20px; }
.ms-title{ font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:22px; text-transform:uppercase; color:var(--paper); margin-bottom:4px; }
.ms-sub{ color:var(--paper-dim); font-size:14px; margin-bottom:14px; line-height:1.4; }
.ms-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
.ms-item{
  display:flex; align-items:center; gap:12px;
  background:var(--asphalt-2); border:1.5px solid var(--line); border-radius:10px;
  padding:12px 14px; cursor:pointer; font-size:15px; color:var(--paper); font-weight:600;
}
.ms-item input{ width:20px; height:20px; accent-color:var(--brick); flex:none; }
.ms-item:has(input:checked){ border-color:var(--brick); background:rgba(138,47,49,0.18); }
.ms-actions{ display:flex; flex-wrap:wrap; gap:10px; position:sticky; bottom:0; padding-top:8px; }
.ms-actions button{ flex:1; min-width:110px; padding:12px; border-radius:9px; border:none; font-weight:700; font-family:'Barlow',sans-serif; cursor:pointer; font-size:14px; }
.ms-all, .ms-none{ background:var(--asphalt-2); color:var(--paper-dim); border:1.5px solid var(--line) !important; }
.ms-save{ background:var(--brick); color:var(--paper); }
.team-ctx-menu{
  position:fixed; z-index:3000;
  background:var(--asphalt-2); border:2px solid var(--brick);
  border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,0.5);
  padding:6px;
}
.team-ctx-menu button{
  background:var(--brick); color:var(--paper); border:none;
  border-radius:7px; padding:11px 14px; font-size:14px; font-weight:700;
  font-family:'Barlow',sans-serif; cursor:pointer; white-space:nowrap;
}
.team-ctx-menu button:active{ background:var(--brick-line); }
.tab .count{
  font-size:11px;
  opacity:0.8;
  font-family:'Barlow',sans-serif;
  font-weight:600;
}
.tab-add{
  flex:0 0 auto;
  width:36px; height:36px;
  border-radius:50%;
  border:2px dashed var(--safety-yellow);
  background:transparent;
  color:var(--safety-yellow);
  font-size:18px;
  font-weight:800;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}

.list{flex:1; padding:10px 12px 90px; overflow-y:auto;}
.section-label{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:14px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--safety-yellow);
  margin:18px 4px 8px;
  padding-bottom:4px;
  border-bottom:1px solid var(--line);
}
.section-label:first-child{margin-top:4px;}

.total-banner{
  background:rgba(242,183,5,0.12);
  border:1px solid var(--safety-yellow);
  border-radius:8px;
  padding:10px 12px;
  font-size:12.5px;
  color:var(--safety-yellow);
  margin-bottom:12px;
  line-height:1.4;
}
/* Bannière Santé & Sécurité (onglet S.S.T.) */
.sst-banner{
  background:linear-gradient(135deg, rgba(194,59,34,0.22), rgba(194,59,34,0.10));
  border:1.5px solid var(--danger-red);
  border-left:6px solid var(--danger-red);
  border-radius:8px;
  padding:12px 14px;
  margin-bottom:12px;
  display:flex; align-items:center; gap:12px;
}
.sst-banner .sst-icon{ font-size:26px; line-height:1; flex:0 0 auto; }
.sst-banner .sst-text{ line-height:1.35; }
.sst-banner .sst-title{
  font-family:'Barlow Condensed',sans-serif; font-weight:800;
  text-transform:uppercase; letter-spacing:1px; font-size:16px; color:#ff9d8c;
}
.sst-banner .sst-sub{ font-size:12.5px; color:var(--paper-dim); margin-top:2px; }
.sst-stripe{
  height:10px; border-radius:4px; margin-bottom:12px;
  background:repeating-linear-gradient(45deg, var(--danger-red) 0 14px, #1a1918 14px 28px);
}

.card{
  background:var(--asphalt-2);
  border:1px solid var(--line);
  border-left:4px solid var(--line);
  border-radius:8px;
  margin-bottom:8px;
  overflow:hidden;
  transition:border-color 0.2s;
}
.card.filled{border-left-color: var(--ok-green);}
.card.missing{border-left-color: var(--danger-red);}
.card.edge-red{border-left-color: var(--danger-red);}
.card.edge-yellow{border-left-color: var(--safety-yellow);}
.card.edge-green{border-left-color: var(--ok-green);}
.card-row{
  padding:12px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  gap:8px;
}
.card-name{
  font-size:16px;
  font-weight:600;
  color:var(--paper);
  line-height:1.25;
}
.card-sub{
  font-size:12px;
  color:var(--paper-dim);
  margin-top:2px;
}
.card-meta{
  display:flex; align-items:center; gap:8px; flex-shrink:0;
}
.qty-badge{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:14px;
  background:var(--asphalt);
  border:1px solid var(--line);
  border-radius:4px;
  padding:2px 8px;
  color:var(--paper-dim);
  min-width:26px;
  text-align:center;
}
.qty-badge.total-badge{
  background:var(--safety-yellow);
  color:var(--asphalt);
  border-color:var(--safety-yellow);
}
.chevron{
  color:var(--paper-dim);
  font-size:14px;
  transition:transform 0.2s;
}
.card.open .chevron{transform:rotate(180deg);}

.card-body{
  padding:0 14px 16px;
  display:none;
  border-top:1px solid var(--line);
}
.card.open .card-body{display:block; padding-top:14px;}

.field-row{display:flex; gap:10px; margin-bottom:12px;}
.field{flex:1;}
.field label{
  display:block;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.5px;
  color:var(--paper-dim);
  margin-bottom:4px;
  font-weight:600;
}
.field input[type=number], .field input[type=text]{
  width:100%;
  background:var(--asphalt);
  border:1.5px solid var(--line);
  color:var(--paper);
  padding:9px 10px;
  border-radius:6px;
  font-size:15px;
  font-family:'Barlow',sans-serif;
}
.field input:focus{outline:none; border-color:var(--safety-orange);}
/* Statut de vérification annuelle */
.field input.verif-red{ border-color:var(--danger-red); background:rgba(194,59,34,0.14); color:#ffd9d1; }
.field input.verif-orange{ border-color:var(--safety-yellow); background:rgba(242,183,5,0.14); color:#ffe9a8; }
.field input.verif-green{ border-color:var(--ok-green); background:rgba(76,122,63,0.14); }
.verif-hint{ font-size:11px; margin-top:4px; font-weight:600; }
.verif-hint.red{ color:var(--danger-red); }
.verif-hint.orange{ color:var(--safety-yellow); }
.verif-hint.green{ color:var(--ok-green); }
.verif-dot{ display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:4px; vertical-align:middle; }
.verif-dot.red{ background:var(--danger-red); }
.verif-dot.orange{ background:var(--safety-yellow); }
.verif-dot.green{ background:var(--ok-green); }

.etat-chips{display:flex; gap:6px; flex-wrap:wrap;}
.etat-chip{
  padding:6px 12px;
  border-radius:16px;
  border:1.5px solid var(--line);
  background:var(--asphalt);
  color:var(--paper-dim);
  font-size:13px;
  font-weight:600;
  cursor:pointer;
}
.etat-chip.sel-bon{background:var(--ok-green); border-color:var(--ok-green); color:#fff;}
.etat-chip.sel-moyen{background:var(--safety-yellow); border-color:var(--safety-yellow); color:var(--asphalt);}
.etat-chip.sel-mauvais{background:var(--danger-red); border-color:var(--danger-red); color:#fff;}
.etat-chip.readonly{cursor:default;}
/* Compteurs par état */
.etat-counters{display:flex; gap:8px;}
.etat-counter{flex:1; text-align:center;}
.etat-counter label{
  display:block; font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:0.5px; margin-bottom:4px;
}
.etat-counter.bon label{color:var(--ok-green);}
.etat-counter.moyen label{color:var(--safety-yellow);}
.etat-counter.mauvais label{color:var(--danger-red);}
.etat-counter input{
  width:100%; text-align:center; background:var(--asphalt);
  border:1.5px solid var(--line); color:var(--paper);
  padding:9px 4px; border-radius:6px; font-size:16px; font-weight:700;
  font-family:'Barlow',sans-serif;
}
.etat-counter.bon input:focus{outline:none; border-color:var(--ok-green);}
.etat-counter.moyen input:focus{outline:none; border-color:var(--safety-yellow);}
.etat-counter.mauvais input:focus{outline:none; border-color:var(--danger-red);}
.etat-total-hint{font-size:11px; margin-top:6px; font-weight:600; color:var(--paper-dim);}
.etat-total-hint.mismatch{color:var(--safety-yellow);}
/* Options cochables (ex: Fil / Batterie) */
.opt-chips{display:flex; flex-wrap:wrap; gap:8px;}
.opt-chip{
  display:inline-flex; align-items:center; gap:6px;
  border:1.5px solid var(--line); background:var(--asphalt);
  color:var(--paper); padding:8px 12px; border-radius:8px;
  font-size:14px; font-weight:600; cursor:pointer; user-select:none;
  font-family:'Barlow',sans-serif;
}
.opt-chip .box{
  width:16px; height:16px; border-radius:4px; border:2px solid var(--paper-dim);
  display:inline-flex; align-items:center; justify-content:center;
  font-size:12px; line-height:1; color:transparent;
}
.opt-chip.sel{background:var(--safety-orange); border-color:var(--safety-orange); color:#fff;}
.opt-chip.sel .box{border-color:#fff; color:#fff;}
.etat-pill{
  display:inline-block; font-size:11px; font-weight:700; padding:2px 8px;
  border-radius:10px; margin-left:4px;
}
.etat-pill.green{background:var(--ok-green); color:#fff;}
.etat-pill.orange{background:var(--safety-yellow); color:var(--asphalt);}
.etat-pill.red{background:var(--danger-red); color:#fff;}


.delete-link{
  color:var(--danger-red);
  font-size:12px;
  font-weight:600;
  text-decoration:underline;
  cursor:pointer;
  margin-top:6px;
  display:inline-block;
}

.add-item-btn{
  width:100%;
  margin-top:6px;
  padding:14px;
  border-radius:8px;
  border:2px dashed var(--line);
  background:transparent;
  color:var(--paper-dim);
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:15px;
  text-transform:uppercase;
  letter-spacing:0.5px;
  cursor:pointer;
}
.add-item-btn:active{border-color:var(--safety-orange); color:var(--safety-orange);}

.empty-msg{
  text-align:center;
  color:var(--paper-dim);
  padding:40px 20px;
  font-size:15px;
}

.team-detail-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 0;
  border-bottom:1px solid var(--line);
  font-size:14px;
}
.team-detail-row:last-child{border-bottom:none;}
.team-detail-name{color:var(--paper); font-weight:600;}
.team-detail-meta{color:var(--paper-dim); font-size:12px;}
.team-detail-vals{display:flex; align-items:center; gap:8px;}

.footer{
  padding:10px 16px;
  text-align:center;
  font-size:11px;
  color:var(--paper-dim);
  background:var(--asphalt-2);
  border-top:1px solid var(--line);
}
.reset-link{
  color:var(--danger-red);
  text-decoration:underline;
  cursor:pointer;
  font-weight:600;
}

/* Modal */
.overlay{
  position:fixed; inset:0; background:rgba(0,0,0,0.6);
  display:none; align-items:flex-end; justify-content:center;
  z-index:100;
}
.overlay.show{display:flex;}
.modal{
  background:var(--asphalt-2);
  width:100%; max-width:560px;
  border-radius:16px 16px 0 0;
  border-top:3px solid var(--safety-orange);
  padding:20px 18px 26px;
  max-height:85vh;
  overflow-y:auto;
  animation:slideup 0.2s ease-out;
}
@keyframes slideup{ from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;} }
.modal h3{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:0.5px;
  font-size:20px;
  margin:0 0 14px 0;
  color:var(--safety-yellow);
}
.modal .field{margin-bottom:12px;}
.modal-actions{display:flex; gap:10px; margin-top:6px;}
.btn{
  flex:1;
  padding:12px;
  border-radius:8px;
  border:none;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:16px;
  text-transform:uppercase;
  letter-spacing:0.5px;
  cursor:pointer;
}
.btn-cancel{background:var(--asphalt); color:var(--paper-dim); border:1.5px solid var(--line);}
.btn-confirm{background:var(--safety-orange); color:var(--paper);}
</style>

/* Statut d'une date de vérif. annuelle au format AAAA-MM.
   - red    : vide, invalide, ou >= 12 mois écoulés (expiré)
   - orange : entre 9 et 12 mois écoulés (approche)
   - green  : < 9 mois écoulés (à jour) */
/* Formate une saisie libre en AAAA/MM.
   Garde uniquement les chiffres, insère la barre après l'année. */
function formatVerif(val){
  const d = (val || '').replace(/[^\d]/g, '').slice(0, 6); // max 6 chiffres AAAAMM
  if(d.length <= 4) return d;
  return d.slice(0,4) + '/' + d.slice(4);
}

function verifStatus(val){
  const s = (val || '').trim();
  // Accepte 2026/07, 2026-07, 2026.07, 2026 07, ou 202607
  const m = s.match(/^(\d{4})[\/\-. ]?(\d{1,2})$/);
  if(!m) return { level:'red', label: s ? 'Format AAAA/MM attendu' : 'Aucune date — vérif. requise' };
  const y = parseInt(m[1],10), mo = parseInt(m[2],10);
  if(mo < 1 || mo > 12) return { level:'red', label:'Mois invalide (01–12)' };
  const now = new Date();
  // mois écoulés depuis la date de vérif
  const months = (now.getFullYear() - y) * 12 + (now.getMonth() + 1 - mo);
  if(months < 0) return { level:'green', label:'Date future' };
  if(months >= 12) return { level:'red', label:'Expirée (' + months + ' mois) — à revérifier' };
  if(months >= 9)  return { level:'orange', label:'Bientôt due (' + months + ' mois)' };
  return { level:'green', label:'À jour (' + months + ' mois)' };
}

/* Statut d'un entretien libre (Huile / Tune-up).
   Le champ est du texte libre (ex. « fait 2025-03 »). On tente d'y trouver
   une date AAAA-MM ; sinon on considère l'entretien comme non daté.
   - vide          -> rouge (à faire)
   - date trouvée  -> même règle que la vérif (>=12 mois rouge, >=9 jaune)
   - texte sans date -> jaune (présent mais date inconnue)  */
function entretienStatus(val){
  const s = (val || '').trim();
  if(!s) return { level:'red', label:'À faire (aucune date)' };
  const m = s.match(/(\d{4})[\/\-. ]?(\d{1,2})/);
  if(!m) return { level:'orange', label:'Date à préciser' };
  const y = parseInt(m[1],10), mo = parseInt(m[2],10);
  if(mo < 1 || mo > 12) return { level:'orange', label:'Date à préciser' };
  const now = new Date();
  const months = (now.getFullYear() - y) * 12 + (now.getMonth() + 1 - mo);
  if(months < 0) return { level:'green', label:'Date future' };
  if(months >= 12) return { level:'red', label:'Expiré (' + months + ' mois)' };
  if(months >= 9)  return { level:'orange', label:'Bientôt dû (' + months + ' mois)' };
  return { level:'green', label:'À jour (' + months + ' mois)' };
}

/* Statut de quantité : compare prévue vs réelle.
   - null   : comparaison impossible (une des deux vide)
   - red    : réelle < prévue (manque)
   - green  : réelle >= prévue (compte bon ou surplus) */
function qtyStatus(qte, qteReel){
  if(qte === "" || qteReel === "" || qte == null || qteReel == null) return null;
  const p = parseFloat(qte), r = parseFloat(qteReel);
  if(isNaN(p) || isNaN(r)) return null;
  if(r < p) return { level:'red', label:'Manque ' + (p - r) + ' (prévu ' + p + ', réel ' + r + ')' };
  if(r > p) return { level:'green', label:'Surplus ' + (r - p) + ' (prévu ' + p + ', réel ' + r + ')' };
  return { level:'green', label:'Compte exact (' + p + ')' };
}

/* Synthèse des compteurs d'état d'un article.
   Retourne null si aucun compteur rempli, sinon { bon, moyen, mauvais, total, level, label }.
   - level red    : au moins 1 en mauvais
   - level orange : des moyens mais aucun mauvais
   - level green  : uniquement des bons */
function etatSummary(s){
  const b = parseInt(s.etatBon,10)   || 0;
  const m = parseInt(s.etatMoyen,10) || 0;
  const x = parseInt(s.etatMauvais,10)|| 0;
  if(s.etatBon==="" && s.etatMoyen==="" && s.etatMauvais==="") return null;
  const total = b + m + x;
  let level = 'green';
  if(x > 0) level = 'red';
  else if(m > 0) level = 'orange';
  const parts = [];
  if(b) parts.push(b + ' bon' + (b>1?'s':''));
  if(m) parts.push(m + ' moyen' + (m>1?'s':''));
  if(x) parts.push(x + ' mauvais');
  return { b, m, x, total, level, label: parts.length ? parts.join(' · ') : 'aucun' };
}

/* Texte d'aide sous les compteurs : total compté, et alerte si ≠ quantité réelle */
function etatHintText(est, s){
  if(!est) return '';
  let txt = 'Total évalué : ' + est.total;
  const r = parseFloat(s.qteReel);
  if(!isNaN(r) && s.qteReel !== "" && est.total !== r){
    txt += ' — ⚠ ne correspond pas à la qté réelle (' + r + ')';
  }
  return txt;
}

/* Priorité d'un article : 0 = rouge (urgent), 1 = orange, 2 = normal.
   Prend le pire des trois indicateurs (état, quantité, vérif). */
/* Couleur de la barre gauche d'un article selon TA règle :
   - rouge  : quantité insuffisante OU état mauvais
   - jaune  : état moyen (et rien de rouge)
   - vert   : le reste (données saisies, tout va bien)
   - ''     : aucune donnée saisie (barre grise par défaut) */
function edgeClassFor(s, it){
  const noQty = !!(it && it.noQty);
  // On rassemble tous les statuts colorables de l'article et on garde le pire.
  const levels = [];
  const est = etatSummary(s);
  if(est) levels.push(est.level);
  const qst = noQty ? null : qtyStatus(s.qte, s.qteReel);
  if(qst) levels.push(qst.level);
  // Dates : vérif annuelle (vf/ext) + huile & tune-up (moteurs gas)
  if(it && (it.vf || it.ext)){ const vs = verifStatus(s.verif); if(vs) levels.push(vs.level); }
  if(it && it.gas){
    const hs = entretienStatus(s.huile);  if(hs) levels.push(hs.level);
    const ts = entretienStatus(s.tuneup); if(ts) levels.push(ts.level);
  }
  if(levels.indexOf('red') !== -1) return ' edge-red';
  if(levels.indexOf('orange') !== -1) return ' edge-yellow';
  // vert si au moins une donnée saisie (quantité, état, ou une date à jour)
  const hasData = (!noQty && (s.qte !== "" || s.qteReel !== "")) || !!est || levels.indexOf('green') !== -1;
  return hasData ? ' edge-green' : '';
}

function levelRank(level){ return level === 'red' ? 0 : (level === 'orange' ? 1 : 2); }
function itemPriority(it, s){
  let best = 2;
  const est = etatSummary(s);
  if(est) best = Math.min(best, levelRank(est.level));
  const qst = (it && it.noQty) ? null : qtyStatus(s.qte, s.qteReel);
  if(qst) best = Math.min(best, levelRank(qst.level));
  if(it.vf || it.ext){ const vst = verifStatus(s.verif); if(vst) best = Math.min(best, levelRank(vst.level)); }
  if(it.gas){
    const hst = entretienStatus(s.huile);  if(hst) best = Math.min(best, levelRank(hst.level));
    const tst = entretienStatus(s.tuneup); if(tst) best = Math.min(best, levelRank(tst.level));
  }
  return best;
}

/* Réordonne les articles en gardant les sections (en-têtes) :
   dans chaque bloc délimité par un en-tête, tri stable par priorité (rouge, orange, reste).
   Renvoie une liste de {it, i} où i est l'index d'origine (pour l'état). */
function orderedItemsWithPriority(items, st){
  const out = [];
  let block = [];
  const flush = () => {
    // tri stable : priorité (rouge, orange, reste) PUIS alphabétique
    block.map((e, idx) => ({ e, idx }))
      .sort((a, b) =>
        (a.e.prio - b.e.prio) ||
        a.e.name.localeCompare(b.e.name, 'fr', { sensitivity:'base', numeric:true }) ||
        (a.idx - b.idx))
      .forEach(x => out.push(x.e));
    block = [];
  };
  items.forEach((it, i) => {
    if(it.header){
      flush();
      out.push({ it, i, header:true });
    } else {
      const s = (st && st[i]) || defaultItemState(it);
      block.push({ it, i, header:false, prio: itemPriority(it, s), name: (it.name||'').replace(/\n/g,' ') });
    }
  });
  flush();
  return out;
}

}

/* ---- Infos par équipe (n° projet, adresse, contremaître) ---- */
let teamInfo = {}; // teamId -> { projet, adresse, contremaitre }
let teamInfoSaveTimer = null;
async function loadTeamInfo(teamId){
  if(teamInfo[teamId]) return teamInfo[teamId];
  let info = { projet:"", adresse:"", contremaitre:"" };
  try{
    const res = await window.storage.get('inv:info:' + teamId, true);
    if(res && res.value) info = { ...info, ...JSON.parse(res.value) };
  }catch(e){}
  teamInfo[teamId] = info;
  return info;
}
function scheduleSaveTeamInfo(teamId){
  const statusEl = document.getElementById('saveStatus');
  if(statusEl) statusEl.textContent = 'Modif...';
  clearTimeout(teamInfoSaveTimer);
  teamInfoSaveTimer = setTimeout(async () => {
    try{
      await window.storage.set('inv:info:' + teamId, JSON.stringify(teamInfo[teamId]), true);
      if(statusEl){ statusEl.textContent = 'Enregistré ✓';
        setTimeout(() => { if(statusEl.textContent === 'Enregistré ✓') statusEl.textContent = '\u00A0'; }, 1500); }
    }catch(e){ if(statusEl) statusEl.textContent = 'Erreur'; }
  }, 500);
}
function renderTeamInfo(){

  if(currentTeam === 'TOTAL'){ box.classList.remove('show'); box.innerHTML=''; return; }
  const info = teamInfo[currentTeam] || { projet:"", adresse:"", contremaitre:"" };

async function ensureTeamCatLoaded(teamId, cat){
  if(perTeamState[teamId] && perTeamState[teamId][cat]) return perTeamState[teamId][cat];
  const items = itemsFor(cat);
  let arr;
  try{
    const res = await window.storage.get('inv:' + teamId + ':' + cat, true);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      arr = items.map((it, i) => parsed[i] ? {...defaultItemState(it), ...parsed[i]} : defaultItemState(it));
    } else {
      arr = items.map(it => defaultItemState(it));
    }
  }catch(e){
    arr = items.map(it => defaultItemState(it));
  }
  if(!perTeamState[teamId]) perTeamState[teamId] = {};
  perTeamState[teamId][cat] = arr;
  if(isSelectCat(cat)) await loadMachineSel(teamId, cat);
  return arr;
}

function scheduleSaveTeamCat(teamId, cat){
  const statusEl = document.getElementById('saveStatus');
  statusEl.textContent = 'Modif...';

  saveTimer = setTimeout(async () => {

      statusEl.textContent = 'Enregistré ✓';
      setTimeout(() => { if(statusEl.textContent === 'Enregistré ✓') statusEl.textContent = '\u00A0'; }, 1500);
    }catch(e){
      statusEl.textContent = 'Erreur';
    }
  }, 500);
}

/* ---- Aggregation ---- */
function countFilledForTeam(teamId, cat){
  const items = itemsFor(cat);
  const st = (perTeamState[teamId] && perTeamState[teamId][cat]) || [];
  let filled = 0, total = 0;
  items.forEach((it, i) => {
    if(it.header) return;
    total++;
    const s = st[i];
    if(s && (s.qte !== "" || s.qteReel !== "" || s.etatBon !== "" || s.etatMoyen !== "" || s.etatMauvais !== "")) filled++;
  });
  return {filled, total};
}

/* ---- Rendering: Team bar ---- */
/* ---- Couleurs d'identification des équipes ----
   Palette lisible, distincte, attribuée dans l'ordre des équipes.
   L'entrepôt a une couleur fixe (gris-bleu) pour se distinguer. */
const TEAM_COLORS = ['#9a3437','#2f7fd1','#4c7a3f','#b5399b','#d1a300','#0f9d9d','#c23b22','#7a5cff'];
function teamColor(teamId){
  if(teamId === 'entrepot') return '#8a94a6';
  const idx = teams.findIndex(t => t.id === teamId);
  if(idx < 0) return '#8a94a6';
  return TEAM_COLORS[idx % TEAM_COLORS.length];
}

/* Renvoie true si, pour une équipe et une catégorie données,
   au moins un article est au niveau rouge (priorité 0). */
function catHasRedForTeam(teamId, cat){
  const items = itemsFor(cat);
  const st = (perTeamState[teamId] && perTeamState[teamId][cat]) || [];
  for(let i=0;i<items.length;i++){
    const it = items[i];
    if(it.header) continue;
    const s = st[i] || defaultItemState(it);
    if(itemPriority(it, s) === 0) return true;
  }
  return false;
}
/* true si une équipe a au moins un article rouge, toutes catégories confondues. */
function teamHasRed(teamId){
  for(const cat of allCatKeys()){
    if(catHasRedForTeam(teamId, cat)) return true;
  }
  return false;
}
/* true si une catégorie a au moins un rouge sur l'ensemble des équipes (vue Total). */
function catHasRedAnyTeam(cat){
  for(const t of teams){
    if(catHasRedForTeam(t.id, cat)) return true;
  }
  return false;
}

/* ---- "Mon équipe" (par appareil) : alerte si on ouvre l'inventaire d'une autre équipe ---- */
// Articles déjà confirmés pour modification sur une autre équipe (clé: teamId|cat|index)
let foreignEditOK = new Set();
// Vrai si l'équipe affichée n'est pas "mon équipe" (et que mon équipe est définie)
function isForeignTeam(){
  return !!myTeam && currentTeam !== 'TOTAL' && currentTeam !== myTeam;
}
// Demande confirmation une seule fois par article avant de modifier une équipe étrangère.
// Retourne true si la modification est autorisée.
function confirmForeignEdit(i){
  if(!isForeignTeam()) return true;
  const key = currentTeam + '|' + currentCat + '|' + i;
  if(foreignEditOK.has(key)) return true;
  const mine = teams.find(x => x.id === myTeam);
  const target = teams.find(x => x.id === currentTeam);
  const mineLabel = mine ? mine.label : myTeam;
  const targetLabel = target ? target.label : currentTeam;
  const ok = confirm('Es-tu sûr de vouloir modifier l\'inventaire de « ' + targetLabel + ' » ?\n\n' +
    'Ton équipe est « ' + mineLabel + ' ».');
  if(ok) foreignEditOK.add(key);
  return ok;
}

/* ---- Identité de l'appareil (qui modifie) ---- */
async function loadDeviceUser(){
  try{
    const raw = await window.storage.get('inv:deviceUser', false);
    if(raw && raw.value){ const p = JSON.parse(raw.value); if(p && typeof p === 'object') deviceUser = p; }
  }catch(e){ deviceUser = null; }
}
async function saveDeviceUser(obj){
  deviceUser = obj;
  try{ await window.storage.set('inv:deviceUser', JSON.stringify(obj), false); }catch(e){}
  // Enregistre aussi dans le répertoire PARTAGÉ (visible par tous les appareils),
  // sauf pour "tablette de chantier" (ce n'est pas une personne).
  if(obj && !obj.chantier && (obj.nom || obj.courriel)){
    // id stable : courriel en minuscules, sinon nom normalisé
    const rawId = (obj.courriel || obj.nom || '').toLowerCase().trim();
    const id = rawId.replace(/[^\w.@-]+/g, '_').slice(0, 120) || ('p_' + Date.now());
    const rec = {
      nom: obj.nom || '',
      tel: obj.tel || '',
      courriel: obj.courriel || '',
      equipe: (myTeam ? (teams.find(t => t.id === myTeam)?.label || '') : ''),
      equipeId: myTeam || '',
      maj: new Date().toISOString(),
      extra: {}   // réservé pour plus tard (cartes, formations, etc.)
    };
    try{
      // conserver un éventuel "extra" déjà présent pour ne pas l'écraser
      const prev = await window.storage.get('inv:person:' + id, true);
      if(prev && prev.value){ const p = JSON.parse(prev.value); if(p && p.extra) rec.extra = p.extra; }
    }catch(e){}
    try{ await window.storage.set('inv:person:' + id, JSON.stringify(rec), true); }catch(e){}
  }
}
// Charge tout le répertoire partagé des personnes identifiées
async function loadPeopleDirectory(){
  const people = [];
  try{
    const listed = await window.storage.list('inv:person:', true);
    const keys = (listed && listed.keys) || [];
    for(const k of keys){
      try{
        const r = await window.storage.get(k, true);
        if(r && r.value){ const p = JSON.parse(r.value); if(p) people.push(p); }
      }catch(e){}
    }
  }catch(e){}
  // tri par nom
  people.sort((a,b) => (a.nom||'').localeCompare(b.nom||'', 'fr'));
  return people;
}
// Étiquette courte de l'identité, pour marquer les modifications
function deviceUserLabel(){
  if(!deviceUser) return '';
  if(deviceUser.chantier) return 'Tablette de chantier';
  const bits = [];
  if(deviceUser.nom) bits.push(deviceUser.nom);
  if(deviceUser.tel) bits.push(deviceUser.tel);
  if(deviceUser.courriel) bits.push(deviceUser.courriel);
  return bits.join(' · ');
}

/* ---- Sélection des machines par équipe (Lift/Fraco/Mixeur/Scie) ---- */
function isSelectCat(cat){ return SELECT_CATS.indexOf(cat) !== -1; }
// Un article est-il une "machine" sélectionnable ? (dans Fraco, seules les vraies Fraco le sont)
function isSelectableItem(it){ return !!(it && it.selectable); }
async function loadMachineSel(teamId, cat){
  if(!machineSel[teamId]) machineSel[teamId] = {};
  if(machineSel[teamId][cat]) return machineSel[teamId][cat];
  let val = { set:false, actifs:[] };
  try{
    const raw = await window.storage.get('inv:machines:' + teamId + ':' + cat, true);
    if(raw && raw.value){ const p = JSON.parse(raw.value); if(p && typeof p === 'object'){ val = { set: !!p.set, actifs: Array.isArray(p.actifs)?p.actifs:[] }; } }
  }catch(e){}
  machineSel[teamId][cat] = val;
  return val;
}
async function saveMachineSel(teamId, cat){
  const v = (machineSel[teamId] && machineSel[teamId][cat]) || { set:true, actifs:[] };
  try{ await window.storage.set('inv:machines:' + teamId + ':' + cat, JSON.stringify(v), true); }catch(e){}
}
// Un article est-il actif (sur le chantier) pour l'équipe courante dans une select-cat ?
function isMachineActive(teamId, cat, itemName){
  const v = machineSel[teamId] && machineSel[teamId][cat];
  if(!v || !v.set) return true;           // pas encore configuré -> tout visible
  return v.actifs.indexOf(itemName) !== -1;
}
// Passe à l'équipe teamId, avec confirmation si ce n'est pas "mon équipe".
// Retourne true si le changement a lieu, false s'il est annulé.
async function switchToTeam(teamId){
  // On change librement d'équipe. L'avertissement "bonne équipe ?" apparaît désormais
  // à chaque article touché dans l'inventaire d'une autre équipe (voir confirmForeignEdit).
  foreignEditOK = new Set(); // on repart à zéro pour la nouvelle équipe
  return true;
}

// Petit menu flottant sur appui long d'un onglet d'équipe
function showTeamContextMenu(chip, teamId){
  // retirer un éventuel menu déjà ouvert
  const old = document.getElementById('teamCtxMenu');
  if(old) old.remove();
  const t = teams.find(x => x.id === teamId);
  const label = t ? t.label : teamId;
  const isMine = (myTeam === teamId);

  const menu = document.createElement('div');
  menu.id = 'teamCtxMenu';
  menu.className = 'team-ctx-menu';
  menu.innerHTML = isMine
    ? '<button data-act="unset">🔨 Retirer « mon équipe »</button>'
    : '<button data-act="set">🔨 Définir « ' + escapeHtml(label) + ' » comme mon équipe</button>';
  document.body.appendChild(menu);

  // positionner sous le chip
  const r = chip.getBoundingClientRect();
  const mw = menu.offsetWidth;
  let left = r.left + (r.width/2) - (mw/2);
  left = Math.max(8, Math.min(left, window.innerWidth - mw - 8));
  menu.style.left = left + 'px';
  menu.style.top = (r.bottom + 6) + 'px';

  menu.querySelector('button').onclick = async (e) => {
    e.stopPropagation();
    const act = e.currentTarget.getAttribute('data-act');
    if(act === 'set') await saveMyTeam(teamId);
    else { myTeam = null; try{ await window.storage.delete('inv:myTeam', false); }catch(err){} }
    menu.remove();
    renderTeamBar();
  };

  // fermer si on touche ailleurs
  setTimeout(() => {
    const closer = (ev) => {
      if(!menu.contains(ev.target)){ menu.remove(); document.removeEventListener('click', closer, true); document.removeEventListener('touchstart', closer, true); }
    };
    document.addEventListener('click', closer, true);
    document.addEventListener('touchstart', closer, true);
  }, 10);
}

function renderTeamBar(){
  const bar = document.getElementById('teamBar');
  bar.innerHTML = '';
  teams.forEach(t => {
    const chip = document.createElement('div');
    chip.className = 'team-chip' + (currentTeam === t.id ? ' active' : '');
    const _col = teamColor(t.id);
    chip.style.borderLeft = '5px solid ' + _col;
    if(currentTeam === t.id){ chip.style.background = _col; chip.style.borderColor = _col; chip.style.color = '#fff'; }
    chip.innerHTML = '<span class="team-color-dot" style="background:' + _col + '"></span>' + escapeHtml(t.label) +
      (myTeam === t.id ? '<span class="my-team-badge" title="Mon équipe">🔨</span>' : '') +
      (teamHasRed(t.id) ? '<span class="alert-dot" title="Article(s) en rouge"></span>' : '');
    chip.onclick = async () => {
      if(chip._lpFired){ chip._lpFired = false; return; } // ignore le clic si un appui long vient de se déclencher
      if(currentTeam === t.id) return; // déjà dessus
      const ok = await switchToTeam(t.id);
      if(!ok){ renderTeamBar(); return; } // annulé : on ne change pas
      currentTeam = t.id;
      openIndex = null;
      await ensureTeamCatLoaded(currentTeam, currentCat);
      renderTeamBar(); renderTabs(); renderList();
    };
    // Appui long -> menu "Définir comme mon équipe"
    let lpTimer = null;
    const startLP = (ev) => {
      clearTimeout(lpTimer);
      lpTimer = setTimeout(() => {
        chip._lpFired = true;
        showTeamContextMenu(chip, t.id);
      }, 500);
    };
    const cancelLP = () => { clearTimeout(lpTimer); };
    chip.addEventListener('touchstart', startLP, {passive:true});
    chip.addEventListener('touchend', cancelLP);
    chip.addEventListener('touchmove', cancelLP);
    chip.addEventListener('mousedown', startLP);
    chip.addEventListener('mouseup', cancelLP);
    chip.addEventListener('mouseleave', cancelLP);
    bar.appendChild(chip);
  });
  const totalChip = document.createElement('div');
  totalChip.className = 'team-chip total' + (currentTeam === 'TOTAL' ? ' active' : '');
  totalChip.textContent = 'Total';
  totalChip.onclick = async () => {
    currentTeam = 'TOTAL';
    openIndex = null;
    for(const t of teams){ await ensureTeamCatLoaded(t.id, currentCat); }
    renderTeamBar(); renderTabs(); renderList();
  };
  bar.appendChild(totalChip);

  const editBtn = document.createElement('div');
  editBtn.className = 'team-edit-btn';
  editBtn.textContent = '✎';
  editBtn.onclick = openEditTeamsModal;
  bar.appendChild(editBtn);
}

/* ---- Rendering: Category tabs ---- */
function renderTabs(){
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  allCatKeys().forEach(cat => {
    const tab = document.createElement('div');
    const isSST = cat === 'S.S.T.';
    tab.className = 'tab' + (cat === currentCat ? ' active' : '') + (isSST ? ' tab-sst' : '');
    let countHtml = '';
    if(currentTeam !== 'TOTAL'){
      const {filled, total} = countFilledForTeam(currentTeam, cat);
      countHtml = `<span class="count">${filled}/${total}</span>`;
    }
    let hasRed = (currentTeam === 'TOTAL') ? catHasRedAnyTeam(cat) : catHasRedForTeam(currentTeam, cat);
    const redDot = hasRed ? '<span class="alert-dot" title="Article(s) en rouge"></span>' : '';
    tab.innerHTML = `${isSST ? '🦺 ' : ''}${escapeHtml(catLabel(cat))} ${countHtml}${redDot}`;
    tab.onclick = async () => {
      currentCat = cat; openIndex = null;
      if(currentTeam === 'TOTAL'){
        for(const t of teams){ await ensureTeamCatLoaded(t.id, currentCat); }
      } else {
        await ensureTeamCatLoaded(currentTeam, currentCat);
      }
      renderTabs(); renderList();
    };
    tabsEl.appendChild(tab);
  });
  const addTab = document.createElement('div');
  addTab.className = 'tab-add';
  addTab.textContent = '+';
  addTab.onclick = openAddCategoryModal;
  tabsEl.appendChild(addTab);
}

function matchesSearch(name, query){
  if(!query) return true;
  const q = query.toLowerCase();
  // On découpe le nom en mots ; un article correspond si l'un de ses mots
  // COMMENCE par ce qui est tapé (pas juste s'il le contient au milieu).
  const mots = name.toLowerCase().split(/[\s\-/(),.]+/).filter(Boolean);
  return mots.some(m => m.startsWith(q));
}

// Écran de sélection des machines pour l'équipe courante dans une select-cat
function renderMachineSelection(){
  const listEl = document.getElementById('list');
  listEl.innerHTML = '';
  const cat = currentCat;
  const items = itemsFor(cat).filter(it => !it.header && isSelectableItem(it));
  const v = (machineSel[currentTeam] && machineSel[currentTeam][cat]) || { set:false, actifs:[] };
  const dejaConfig = v.set;
  // pré-cocher : si déjà configuré, on garde les actifs ; sinon rien de coché
  const coche = new Set(v.actifs);

  const wrap = document.createElement('div');
  wrap.className = 'machine-select';
  wrap.innerHTML =
    '<div class="ms-title">🔧 ' + escapeHtml(catLabel(cat)) + ' — ' + escapeHtml(teamLabel(currentTeam)) + '</div>' +
    '<div class="ms-sub">Coche les ' + escapeHtml(catLabel(cat).toLowerCase()) + ' présents sur ton chantier. ' +
      'Les autres restent en réserve et pourront être ajoutés plus tard.</div>' +
    '<div class="ms-list">' +
      items.map(it => {
        const nom = (it.name||'').replace(/\n/g,' ');
        return '<label class="ms-item"><input type="checkbox" value="' + escapeAttr(nom) + '"' +
               (coche.has(nom) ? ' checked' : '') + '><span>' + escapeHtml(nom) + '</span></label>';
      }).join('') +
    '</div>' +
    '<div class="ms-actions">' +
      '<button type="button" class="ms-all">Tout cocher</button>' +
      '<button type="button" class="ms-none">Tout décocher</button>' +
      '<button type="button" class="ms-save">Enregistrer ma liste</button>' +
    '</div>';
  listEl.appendChild(wrap);

  const boxes = () => Array.from(wrap.querySelectorAll('input[type="checkbox"]'));
  wrap.querySelector('.ms-all').onclick = () => boxes().forEach(b => b.checked = true);
  wrap.querySelector('.ms-none').onclick = () => boxes().forEach(b => b.checked = false);
  wrap.querySelector('.ms-save').onclick = async () => {
    const actifs = boxes().filter(b => b.checked).map(b => b.value);
    if(!machineSel[currentTeam]) machineSel[currentTeam] = {};
    machineSel[currentTeam][cat] = { set:true, actifs };
    await saveMachineSel(currentTeam, cat);
    openIndex = null;
    renderTeamList();
    renderTabs();
  };
}

function renderTeamList(){
  const listEl = document.getElementById('list');
  const query = document.getElementById('search').value.trim();
  listEl.innerHTML = '';

  // Catégories à sélection de machines (Lift/Fraco/Mixeur/Scie) :
  // si l'équipe n'a pas encore choisi ses machines -> écran de sélection.
  if(isSelectCat(currentCat)){
    const v = (machineSel[currentTeam] && machineSel[currentTeam][currentCat]) || { set:false, actifs:[] };
    if(!v.set){ renderMachineSelection(); return; }
  }

  if(!query){ const b = sstBannerHTML(); if(b){ const d = document.createElement('div'); d.innerHTML = b; listEl.appendChild(d); } }
  // Bouton "Gérer ma liste" en haut des catégories à sélection
  if(isSelectCat(currentCat) && !query){
    const bar = document.createElement('div');
    bar.className = 'manage-machines-bar';
    const v = machineSel[currentTeam][currentCat];
    bar.innerHTML = '<span>🔧 ' + v.actifs.length + ' machine' + (v.actifs.length>1?'s':'') + ' sur le chantier</span>' +
                    '<button type="button" id="manageMachinesBtn">Gérer ma liste</button>';
    listEl.appendChild(bar);
    bar.querySelector('#manageMachinesBtn').onclick = () => { renderMachineSelection(); };
  }

  const items = itemsFor(currentCat);
  const st = (perTeamState[currentTeam] && perTeamState[currentTeam][currentCat]) || [];
  const baseLen = baseItemsFor(currentCat).length;
  let anyVisible = false;

  orderedItemsWithPriority(items, st).forEach(({ it, i }) => {
    if(it.header){
      if(query) return;
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = it.name;
      listEl.appendChild(label);
      return;
    }
    if(!matchesSearch(it.name, query)) return;
    // Dans les catégories à sélection : masquer seulement les MACHINES non cochées.
    // Les accessoires / rack gris (non sélectionnables) restent toujours affichés.
    if(isSelectCat(currentCat) && isSelectableItem(it) &&
       !isMachineActive(currentTeam, currentCat, (it.name||'').replace(/\n/g,' '))) return;
    anyVisible = true;
    const s = st[i] || defaultItemState(it);
    const est = etatSummary(s);
    const hasData = s.qte !== "" || s.qteReel !== "" || !!est;
    const isExtra = i >= baseLen;
    const hasVerif = !!(it.vf || it.ext);
    const vst = hasVerif ? verifStatus(s.verif) : null;
    const hst = it.gas ? entretienStatus(s.huile) : null;   // huile
    const tst = it.gas ? entretienStatus(s.tuneup) : null;  // tune-up
    const qst = qtyStatus(s.qte, s.qteReel);
    const card = document.createElement('div');
    const etatBorder = edgeClassFor(s, it);
    card.className = 'card' + (openIndex === i ? ' open' : '') + etatBorder;

    const subParts = [];
    if(s.ident) subParts.push(s.ident);
    if(Array.isArray(s.opts) && s.opts.length) subParts.push('🔩 ' + s.opts.join(' + '));
    if(s.localisation) subParts.push('📍 ' + s.localisation);
    if(est) subParts.push('🔧 ' + est.label);
    if(s.comment) subParts.push(s.comment);

    const row = document.createElement('div');
    row.className = 'card-row';
    row.innerHTML = `
      <div>
        <div class="card-name">${escapeHtml(it.name.replace(/\n/g,' '))}</div>
        <div class="card-sub"${subParts.length ? '' : ' style="display:none;"'}>${subParts.length ? escapeHtml(subParts.join(' · ')) : ''}</div>
      </div>
      <div class="card-meta">
        ${est ? `<span class="verif-dot ${est.level}" data-dot="etat" title="${escapeAttr('État — ' + est.label)}"></span>` : ''}
        ${(!it.noQty && qst) ? `<span class="verif-dot ${qst.level}" data-dot="qty" title="${escapeAttr('Quantité — ' + qst.label)}"></span>` : ''}
        ${vst ? `<span class="verif-dot ${vst.level}" data-dot="verif" title="${escapeAttr('Vérif — ' + vst.label)}"></span>` : ''}
        ${(!it.noQty && s.qte !== "") ? `<span class="qty-badge">${escapeHtml(s.qte)}</span>` : ''}
        <span class="chevron">▾</span>
      </div>
    `;
    row.onclick = () => { openIndex = (openIndex === i ? null : i); renderList(); };
    card.appendChild(row);

    const body = document.createElement('div');
    body.className = 'card-body';
    body.innerHTML = `
      ${it.noQty ? '' : `
      <div class="field-row">
        <div class="field">
          <label>Qté prévue</label>
          <input type="number" inputmode="numeric" data-field="qte" value="${escapeAttr(s.qte)}" placeholder="0">
        </div>
        <div class="field">
          <label>Qté réelle</label>
          <input type="number" inputmode="numeric" data-field="qteReel" class="${qst ? 'verif-'+qst.level : ''}" value="${escapeAttr(s.qteReel)}" placeholder="0">
        </div>
      </div>
      <div class="qty-hint-wrap" style="${qst ? '' : 'display:none;'} margin-top:-6px; margin-bottom:12px;">
        <div class="verif-hint ${qst ? qst.level : ''}">${qst ? escapeHtml(qst.label) : ''}</div>
      </div>`}
      <div class="field" style="margin-bottom:12px;">
        <label>État ${est ? `<span class="etat-pill ${est.level}">${escapeHtml(est.label)}</span>` : ''}</label>
        <div class="etat-counters">
          <div class="etat-counter bon">
            <label>Bon</label>
            <input type="number" inputmode="numeric" min="0" data-field="etatBon" value="${escapeAttr(s.etatBon)}" placeholder="0">
          </div>
          <div class="etat-counter moyen">
            <label>Moyen</label>
            <input type="number" inputmode="numeric" min="0" data-field="etatMoyen" value="${escapeAttr(s.etatMoyen)}" placeholder="0">
          </div>
          <div class="etat-counter mauvais">
            <label>Mauvais</label>
            <input type="number" inputmode="numeric" min="0" data-field="etatMauvais" value="${escapeAttr(s.etatMauvais)}" placeholder="0">
          </div>
        </div>
        <div class="etat-total-hint" data-etat-hint>${est ? etatHintText(est, s) : ''}</div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Identification</label>
          <input type="text" data-field="ident" value="${escapeAttr(s.ident)}" placeholder="ex: rouge, JAUNE...">
        </div>
      </div>
      ${(it.options && it.options.length) ? `
      <div class="field" style="margin-bottom:12px;">
        <label>Type</label>
        <div class="opt-chips" data-opts>
          ${it.options.map(o => {
            const sel = Array.isArray(s.opts) && s.opts.indexOf(o) !== -1;
            return `<span class="opt-chip ${sel ? 'sel' : ''}" data-opt="${escapeAttr(o)}"><span class="box">✓</span>${escapeHtml(o)}</span>`;
          }).join('')}
        </div>
      </div>` : ''}
      ${it.loc ? `
      <div class="field-row">
        <div class="field">
          <label>📍 Localisation</label>
          <input type="text" data-field="localisation" value="${escapeAttr(s.localisation)}" placeholder="ex: Machine 3, camion, cour...">
        </div>
      </div>` : ''}
      ${it.vf ? `
      <div class="field-row">
        <div class="field">
          <label>Vérif. annuelle (AAAA/MM)</label>
          <input type="text" inputmode="numeric" data-field="verif" class="verif-${vst.level}" value="${escapeAttr(s.verif)}" placeholder="2026/07">
          <div class="verif-hint ${vst.level}">${escapeHtml(vst.label)}</div>
        </div>
      </div>` : ''}
      ${it.ext ? `
      <div class="field-row">
        <div class="field">
          <label>Vérif. annuelle (AAAA/MM)</label>
          <input type="text" inputmode="numeric" data-field="verif" class="verif-${vst.level}" value="${escapeAttr(s.verif)}" placeholder="2026/07">
          <div class="verif-hint ${vst.level}">${escapeHtml(vst.label)}</div>
        </div>
        <div class="field">
          <label>Pression (vert)</label>
          <input type="text" data-field="pression" value="${escapeAttr(s.pression)}" placeholder="ex: OK / vert">
        </div>
      </div>` : ''}
      ${it.gas ? `
      <div class="field-row">
        <div class="field">
          <label>🛢️ Changement d'huile (AAAA/MM)</label>
          <input type="text" inputmode="numeric" data-field="huile" class="verif-${hst.level}" value="${escapeAttr(s.huile)}" placeholder="2026/03">
          <div class="verif-hint ${hst.level}">${escapeHtml(hst.label)}</div>
        </div>
        <div class="field">
          <label>🔧 Tune up (AAAA/MM)</label>
          <input type="text" inputmode="numeric" data-field="tuneup" class="verif-${tst.level}" value="${escapeAttr(s.tuneup)}" placeholder="2026/03">
          <div class="verif-hint ${tst.level}">${escapeHtml(tst.label)}</div>
        </div>
      </div>` : ''}
      ${currentCat === 'LOURD_SCIE' ? `
      <div class="field-row">
        <div class="field">
          <label>🪚 État de la lame</label>
          <input type="text" data-field="lame" value="${escapeAttr(s.lame || '')}" placeholder="ex: bonne, à changer...">
        </div>
      </div>` : ''}
      <div class="field">
        <label>Commentaire</label>
        <input type="text" data-field="comment" value="${escapeAttr(s.comment)}" placeholder="Note libre...">
      </div>
      ${isExtra ? '<div class="delete-link" data-del-item="1">Supprimer cet article</div>' : ''}
    `;
    card.appendChild(body);
    listEl.appendChild(card);

    if(openIndex === i){
      body.querySelectorAll('input[data-field]').forEach(inp => {
        inp.addEventListener('input', () => {
          // Confirmation une fois par article si on modifie une autre équipe
          if(!confirmForeignEdit(i)){
            inp.value = st[i][inp.dataset.field] || '';  // annule : on remet l'ancienne valeur
            inp.blur();
            return;
          }
          st[i][inp.dataset.field] = inp.value;
          st[i]._by = deviceUserLabel();   // qui a modifié
          st[i]._at = Date.now();          // quand
          scheduleSaveTeamCat(currentTeam, currentCat);
          renderTabs();
          renderTeamBar();  // met à jour les points rouges d'alerte sur les équipes
          // Recalcule la couleur de la barre gauche (rouge/jaune/vert) en direct
          card.classList.remove('filled','missing','edge-red','edge-yellow','edge-green');
          const _edge = edgeClassFor(st[i], it).trim();
          if(_edge) card.classList.add(_edge);
          // Recolore le champ vérif. en direct sans perdre le focus
          if(inp.dataset.field === 'verif'){
            const formatted = formatVerif(inp.value);
            if(formatted !== inp.value){
              inp.value = formatted;
              st[i].verif = formatted;
              inp.setSelectionRange(formatted.length, formatted.length);
            }
            const vs = verifStatus(inp.value);
            inp.classList.remove('verif-red','verif-orange','verif-green');
            inp.classList.add('verif-' + vs.level);
            const hint = inp.parentElement.querySelector('.verif-hint');
            if(hint){ hint.className = 'verif-hint ' + vs.level; hint.textContent = vs.label; }
            const dot = card.querySelector('.verif-dot[data-dot="verif"]');
            if(dot){ dot.className = 'verif-dot ' + vs.level; dot.title = 'Vérif — ' + vs.label; }
          }
          // Recolore huile / tune-up en direct (format date AAAA/MM comme la vérif)
          if(inp.dataset.field === 'huile' || inp.dataset.field === 'tuneup'){
            const formatted = formatVerif(inp.value);
            if(formatted !== inp.value){
              inp.value = formatted;
              st[i][inp.dataset.field] = formatted;
              inp.setSelectionRange(formatted.length, formatted.length);
            }
            const es = entretienStatus(inp.value);
            inp.classList.remove('verif-red','verif-orange','verif-green');
            inp.classList.add('verif-' + es.level);
            const hint = inp.parentElement.querySelector('.verif-hint');
            if(hint){ hint.className = 'verif-hint ' + es.level; hint.textContent = es.label; }
          }
          // Recolore l'indicateur de quantité en direct
          if(inp.dataset.field === 'qte' || inp.dataset.field === 'qteReel'){
            const qs = qtyStatus(st[i].qte, st[i].qteReel);
            const reelInp = body.querySelector('input[data-field="qteReel"]');
            if(reelInp){
              reelInp.classList.remove('verif-red','verif-orange','verif-green');
              if(qs) reelInp.classList.add('verif-' + qs.level);
            }
            const wrap = body.querySelector('.qty-hint-wrap');
            const qhint = wrap ? wrap.querySelector('.verif-hint') : null;
            if(wrap && qhint){
              if(qs){ wrap.style.display=''; qhint.className='verif-hint '+qs.level; qhint.textContent=qs.label; }
              else { wrap.style.display='none'; qhint.textContent=''; }
            }
            // pastille d'en-tête quantité
            let qdot = card.querySelector('.verif-dot[data-dot="qty"]');
            const meta = card.querySelector('.card-meta');
            if(qs){
              if(!qdot && meta){
                qdot = document.createElement('span');
                qdot.setAttribute('data-dot','qty');
                meta.insertBefore(qdot, meta.firstChild);
              }
              if(qdot){ qdot.className = 'verif-dot ' + qs.level; qdot.title = 'Quantité — ' + qs.label; }
            } else if(qdot){ qdot.remove(); }
          }
          // Recolore l'indicateur d'état (compteurs Bon/Moyen/Mauvais)
          if(inp.dataset.field === 'etatBon' || inp.dataset.field === 'etatMoyen' || inp.dataset.field === 'etatMauvais'){
            const es = etatSummary(st[i]);
            // pastille dans le label
            const lbl = body.querySelector('.etat-counters').parentElement.querySelector('label');
            if(lbl){
              const existing = lbl.querySelector('.etat-pill');
              if(existing) existing.remove();
              if(es){ lbl.insertAdjacentHTML('beforeend', ' <span class="etat-pill ' + es.level + '">' + escapeHtml(es.label) + '</span>'); }
            }
            // texte d'aide (total + alerte)
            const eh = body.querySelector('[data-etat-hint]');
            if(eh){ eh.textContent = es ? etatHintText(es, st[i]) : ''; eh.className = 'etat-total-hint' + (es && !isNaN(parseFloat(st[i].qteReel)) && st[i].qteReel!=="" && es.total !== parseFloat(st[i].qteReel) ? ' mismatch' : ''); }
            // pastille d'en-tête état + bordure de carte
            let edot = card.querySelector('.verif-dot[data-dot="etat"]');
            const meta2 = card.querySelector('.card-meta');
            if(es){
              if(!edot && meta2){ edot = document.createElement('span'); edot.setAttribute('data-dot','etat'); meta2.insertBefore(edot, meta2.firstChild); }
              if(edot){ edot.className = 'verif-dot ' + es.level; edot.title = 'État — ' + es.label; }
            } else if(edot){ edot.remove(); }
            // (bordure recalculée globalement plus bas)
          }
        });
        inp.addEventListener('click', e => e.stopPropagation());
      });
      const delLink = body.querySelector('[data-del-item]');
      if(delLink){
        delLink.addEventListener('click', async (e) => {
          e.stopPropagation();
          if(!confirm('Supprimer "' + it.name + '" ? (pour toutes les équipes)')) return;
          const extraIdx = i - baseLen;
          extraItems[currentCat].splice(extraIdx, 1);
          await saveExtraItems(currentCat);
          for(const t of teams){
            if(perTeamState[t.id] && perTeamState[t.id][currentCat]){
              perTeamState[t.id][currentCat].splice(i, 1);
              await window.storage.set('inv:' + t.id + ':' + currentCat, JSON.stringify(perTeamState[t.id][currentCat]), true);
            }
          }
          openIndex = null;
          renderTabs();
          renderList();
        });
      }
      // Options cochables (ex: Fil / Batterie) — plusieurs choix possibles
      body.querySelectorAll('.opt-chip[data-opt]').forEach(chip => {
        chip.addEventListener('click', (e) => {
          e.stopPropagation();
          if(!confirmForeignEdit(i)) return; // autre équipe : refus -> on ne change rien
          const opt = chip.getAttribute('data-opt');
          if(!Array.isArray(st[i].opts)) st[i].opts = [];
          const pos = st[i].opts.indexOf(opt);
          if(pos === -1){ st[i].opts.push(opt); chip.classList.add('sel'); }
          else { st[i].opts.splice(pos, 1); chip.classList.remove('sel'); }
          st[i]._by = deviceUserLabel();
          st[i]._at = Date.now();
          // Met à jour le sous-titre de la carte
          const subEl = card.querySelector('.card-sub');
          const bits = [];
          if(st[i].ident) bits.push(st[i].ident);
          if(st[i].opts && st[i].opts.length) bits.push('🔩 ' + st[i].opts.join(' + '));
          if(st[i].localisation) bits.push('📍 ' + st[i].localisation);
          const esNow = etatSummary(st[i]);
          if(esNow) bits.push('🔧 ' + esNow.label);
          if(st[i].comment) bits.push(st[i].comment);
          if(subEl){
            if(bits.length){ subEl.textContent = bits.join(' · '); subEl.style.display=''; }
            else { subEl.textContent=''; subEl.style.display='none'; }
          }
          scheduleSaveTeamCat(currentTeam, currentCat);
        });
      });
    }
  });

  if(!anyVisible){
    const empty = document.createElement('div');
    empty.className = 'empty-msg';
    empty.textContent = query ? 'Aucun article ne correspond à "' + query + '".' : 'Aucun article.';
    listEl.appendChild(empty);
  }

  if(!query){
    const addBtn = document.createElement('button');
    addBtn.className = 'add-item-btn';
    addBtn.textContent = '+ Ajouter un article';
    addBtn.onclick = openAddItemModal;
    listEl.appendChild(addBtn);
  }
}

function renderTotalList(){
  const listEl = document.getElementById('list');
  const query = document.getElementById('search').value.trim();
  listEl.innerHTML = '';

  if(!query){ const b = sstBannerHTML(); if(b){ const d = document.createElement('div'); d.innerHTML = b; listEl.appendChild(d); } }

  const banner = document.createElement('div');
  banner.className = 'total-banner';
  banner.textContent = 'Vue Total — détail par équipe et somme des quantités réelles pour "' + catLabel(currentCat) + '".';
  listEl.appendChild(banner);

  // Récapitulatif des infos de chantier de chaque équipe (lecture seule)
  const anyInfo = teams.some(t => {
    const inf = teamInfo[t.id]; return inf && (inf.projet || inf.adresse || inf.contremaitre);
  });
  if(anyInfo && !query){
    const wrap = document.createElement('div');
    wrap.innerHTML = teams.map(t => {
      const inf = teamInfo[t.id] || {};
      if(!(inf.projet || inf.adresse || inf.contremaitre)) return '';
      const bits = [];
      if(inf.projet) bits.push('<span class="tir-line">N° projet : <b>' + escapeHtml(inf.projet) + '</b></span>');
      if(inf.contremaitre) bits.push('<span class="tir-line">Contremaître : <b>' + escapeHtml(inf.contremaitre) + '</b></span>');
      if(inf.adresse) bits.push('<span class="tir-line">Adresse : <b>' + escapeHtml(inf.adresse) + '</b></span>');
      return '<div class="team-info-readonly"><div class="tir-team">' + escapeHtml(t.label) + '</div>' + bits.join('<br>') + '</div>';
    }).join('');
    listEl.appendChild(wrap);
  }

  const items = itemsFor(currentCat);
  let anyVisible = false;

  // Priorité en vue Total : pire priorité parmi toutes les équipes pour l'article
  const totalPrio = items.map((it, i) => {
    if(it.header) return 2;
    let best = 2;
    for(const t of teams){
      const st = (perTeamState[t.id] && perTeamState[t.id][currentCat]) || [];
      const s = st[i] || defaultItemState(it);
      best = Math.min(best, itemPriority(it, s));
    }
    return best;
  });
  // Réordonne en gardant les sections
  const orderedTotal = [];
  {
    let block = [];
    const flush = () => {
      block.map((e,idx)=>({e,idx})).sort((a,b)=>
        (totalPrio[a.e.i]-totalPrio[b.e.i]) ||
        (a.e.it.name||'').replace(/\n/g,' ').localeCompare((b.e.it.name||'').replace(/\n/g,' '), 'fr', { sensitivity:'base', numeric:true }) ||
        (a.idx-b.idx)
      ).forEach(x=>orderedTotal.push(x.e));
      block = [];
    };
    items.forEach((it,i)=>{ if(it.header){ flush(); orderedTotal.push({it,i,header:true}); } else { block.push({it,i,header:false}); } });
    flush();
  }

  orderedTotal.forEach(({ it, i }) => {
    if(it.header){
      if(query) return;
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = it.name;
      listEl.appendChild(label);
      return;
    }
    if(!matchesSearch(it.name, query)) return;
    anyVisible = true;

    let totalReel = 0, anyNumeric = false;
    let aggBon = 0, aggMoyen = 0, aggMauvais = 0, anyEtat = false;
    const perTeamRows = teams.map(t => {
      const st = (perTeamState[t.id] && perTeamState[t.id][currentCat]) || [];
      const s = st[i] || defaultItemState(it);
      const n = parseFloat(s.qteReel);
      if(!isNaN(n)){ totalReel += n; anyNumeric = true; }
      const es = etatSummary(s);
      if(es){ aggBon += es.b; aggMoyen += es.m; aggMauvais += es.x; anyEtat = true; }
      return {team: t, s, es};
    });
    const hasAnyData = perTeamRows.some(r => r.s.qte !== "" || r.s.qteReel !== "" || r.es);

    const card = document.createElement('div');
    card.className = 'card' + (openIndex === i ? ' open' : '');

    const row = document.createElement('div');
    row.className = 'card-row';
    row.innerHTML = `
      <div>
        <div class="card-name">${escapeHtml(it.name.replace(/\n/g,' '))}</div>
        ${!hasAnyData ? '<div class="card-sub">Aucune donnée saisie</div>' : ''}
      </div>
      <div class="card-meta">
        ${(!it.noQty && anyNumeric) ? `<span class="qty-badge total-badge">${totalReel}</span>` : ''}
        <span class="chevron">▾</span>
      </div>
    `;
    row.onclick = () => { openIndex = (openIndex === i ? null : i); renderList(); };
    card.appendChild(row);

    const body = document.createElement('div');
    body.className = 'card-body';
    let rowsHtml = perTeamRows.map(({team, s, es}) => {
      const etatChip = es ? `<span class="etat-pill ${es.level}">${escapeHtml(es.label)}</span>` : '';
      const metaBits = [];
      if(s.ident) metaBits.push(s.ident);
      if(Array.isArray(s.opts) && s.opts.length) metaBits.push('🔩 ' + s.opts.join(' + '));
      if(s.localisation) metaBits.push('📍 ' + s.localisation);
      if(s.verif) metaBits.push('Vérif: ' + s.verif);
      if(s.pression) metaBits.push('Pression: ' + s.pression);
      if(s.huile) metaBits.push('🛢️ ' + s.huile);
      if(s.tuneup) metaBits.push('🔧 ' + s.tuneup);
      if(s.comment) metaBits.push(s.comment);
      return `
        <div class="team-detail-row">
          <div>
            <div class="team-detail-name">${escapeHtml(team.label)}</div>
            ${metaBits.length ? `<div class="team-detail-meta">${escapeHtml(metaBits.join(' · '))}</div>` : ''}
          </div>
          <div class="team-detail-vals">
            ${it.noQty ? '' : `<span class="qty-badge">P:${s.qte !== "" ? escapeHtml(s.qte) : '-'}</span>
            <span class="qty-badge">R:${s.qteReel !== "" ? escapeHtml(s.qteReel) : '-'}</span>`}
            ${etatChip}
          </div>
        </div>
      `;
    }).join('');
    const aggLevel = aggMauvais > 0 ? 'red' : (aggMoyen > 0 ? 'orange' : 'green');
    const aggParts = [];
    if(aggBon) aggParts.push(aggBon + ' bon' + (aggBon>1?'s':''));
    if(aggMoyen) aggParts.push(aggMoyen + ' moyen' + (aggMoyen>1?'s':''));
    if(aggMauvais) aggParts.push(aggMauvais + ' mauvais');
    body.innerHTML = rowsHtml + `
      ${it.noQty ? '' : `<div class="team-detail-row" style="margin-top:6px; border-top:2px solid var(--safety-yellow); padding-top:10px;">
        <div class="team-detail-name" style="color:var(--safety-yellow);">TOTAL (Qté réelle)</div>

async function onDeleteCategory(){
  if(!confirm('Supprimer complètement la catégorie "' + catLabel(currentCat) + '" et toutes les données de toutes les équipes ?')) return;
  const catToDelete = currentCat;
  customCats = customCats.filter(c => c.key !== catToDelete);
  await saveCustomCats();
  try{ await window.storage.delete('inv:extra:' + catToDelete, true); }catch(e){}
  for(const t of teams){
    try{ await window.storage.delete('inv:' + t.id + ':' + catToDelete, true); }catch(e){}
    if(perTeamState[t.id]) delete perTeamState[t.id][catToDelete];
  }
  delete extraItems[catToDelete];
  currentCat = allCatKeys()[0];
  openIndex = null;
  if(currentTeam === 'TOTAL'){
    for(const t of teams){ await ensureTeamCatLoaded(t.id, currentCat); }
  } else {
    await ensureTeamCatLoaded(currentTeam, currentCat);
  }
  renderTeamBar();
  renderTabs();
  renderList();
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }

/* ---- Recherche globale + suggestions (tous onglets, présents et futurs) ---- */
function highlightMatch(name, query){
  const i = name.toLowerCase().indexOf(query.toLowerCase());
  if(i < 0) return escapeHtml(name);
  return escapeHtml(name.slice(0,i)) + '<mark>' + escapeHtml(name.slice(i, i+query.length)) + '</mark>' + escapeHtml(name.slice(i+query.length));
}

function buildSuggestions(query){
  // Cherche dans TOUTES les catégories (base + lourd + personnalisées, actuelles et futures)
  const results = [];
  allCatKeys().forEach(cat => {
    const items = itemsFor(cat);
    items.forEach((it, idx) => {
      if(it.header) return;
      const cleanName = it.name.replace(/\n/g,' ');
      if(matchesSearch(cleanName, query)){
        results.push({ cat, idx, name: cleanName });
      }
    });
  });
  return results;
}

function renderSuggestions(){
  const box = document.getElementById('suggestions');
  const query = document.getElementById('search').value.trim();
  if(query.length < 1){
    box.classList.remove('show');
    box.innerHTML = '';
    return;
  }
  const results = buildSuggestions(query);
  if(results.length === 0){
    box.innerHTML = '<div class="suggestion-empty">Aucun article trouvé pour « ' + escapeHtml(query) + ' »</div>';
    box.classList.add('show');
    return;
  }
  // Limite l'affichage pour rester lisible
  const shown = results.slice(0, 40);
  box.innerHTML = shown.map(r =>
    `<div class="suggestion" data-cat="${escapeAttr(r.cat)}" data-idx="${r.idx}">
      <span class="suggestion-name">${highlightMatch(r.name, query)}</span>
      <span class="suggestion-cat">${escapeHtml(catLabel(r.cat))}</span>
    </div>`
  ).join('') + (results.length > shown.length
      ? `<div class="suggestion-empty">+ ${results.length - shown.length} autres résultats…</div>`
      : '');
  box.classList.add('show');
  box.querySelectorAll('.suggestion').forEach(el => {
    el.addEventListener('click', () => goToSuggestion(el.dataset.cat, parseInt(el.dataset.idx, 10)));
  });
}

async function goToSuggestion(cat, idx){
  // Bascule vers l'onglet et ouvre l'article correspondant
  currentCat = cat;
  openIndex = idx;
  document.getElementById('search').value = '';
  document.getElementById('suggestions').classList.remove('show');
  document.getElementById('suggestions').innerHTML = '';
  if(currentTeam === 'TOTAL'){
    for(const t of teams){ await ensureTeamCatLoaded(t.id, currentCat); }
  } else {
    await ensureTeamCatLoaded(currentTeam, currentCat);
  }
  renderTabs();
  renderList();
  // Fait défiler jusqu'à la carte ouverte
  setTimeout(() => {
    const openCard = document.querySelector('.card.open');
    if(openCard) openCard.scrollIntoView({behavior:'smooth', block:'center'});
  }, 60);
}

document.getElementById('search').addEventListener('input', () => {
  renderSuggestions();  // suggestions globales pendant la frappe
  renderList();         // filtre aussi l'onglet courant
});
// Ferme les suggestions si on tape Échap
document.getElementById('search').addEventListener('keydown', (e) => {
  if(e.key === 'Escape'){
    document.getElementById('search').value = '';
    document.getElementById('suggestions').classList.remove('show');

});
// Ferme les suggestions en cliquant ailleurs
document.addEventListener('click', (e) => {

});
