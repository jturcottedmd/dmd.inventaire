const SUPABASE_URL = "https://toajegeqsqulnhdwkajm.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvYWplZ2Vxc3F1bG5oZHdrYWptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1OTY1OTQsImV4cCI6MjA5OTE3MjU5NH0.LBLVG--c1d9V_ZRw-h_ATZE2SUX3OAP7lf0SxMqPqNE";
let _sb = null;
try{ if(window.supabase && window.supabase.createClient){ _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } }catch(e){ console.error(e); }
function withTimeout(promise, ms, label){
  return Promise.race([
    Promise.resolve(promise),
    new Promise((_, rej) => setTimeout(() => rej(new Error('timeout:' + (label||''))), ms))
  ]);
}

function escapeHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeAttr(s){ return escapeHtml(s).replace(/'/g,'&#39;'); }

// ================== STOCKAGE PARTAGÉ (même logique que l'inventaire) ==================
// shared=true -> Supabase (partagé entre tous) ; shared=false -> localStorage (cet appareil)
window.storage = {
  async get(k, shared = true){
    if(shared === false){
      try{ const v = localStorage.getItem(k); return v === null ? null : { key:k, value:v }; }
      catch(e){ return null; }
    }
    try{
      const res = await withTimeout(_sb.from('inv_store').select('value').eq('key', k).maybeSingle(), 8000, 'get:'+k);
      const { data, error } = res || {};
      if(error){ console.error(error); return null; }
      return data ? { key:k, value:data.value } : null;
    }catch(e){ console.error(e); return null; }
  },
  async set(k, value, shared = true){
    if(shared === false){
      try{ localStorage.setItem(k, value); return { key:k, value }; }catch(e){ return null; }
    }
    const { error } = await _sb.from('inv_store').upsert({ key:k, value:value, updated_at:new Date().toISOString() });
    if(error){ console.error(error); return null; }
    return { key:k, value };
  },
  async delete(k, shared = true){
    if(shared === false){
      try{ localStorage.removeItem(k); return { key:k, deleted:true }; }catch(e){ return null; }
    }
    const { error } = await _sb.from('inv_store').delete().eq('key', k);
    if(error){ console.error(error); return null; }
    return { key:k, deleted:true };
  }
};

// ================== MODE ADMIN (débloqué par code, mémorisé sur cet appareil) ==================
let isAdmin = false;
const ADMIN_CODE = 'DMD-ADMIN';   // même code que l'inventaire (modifiable sur demande)
async function loadAdmin(){
  try{ const r = await window.storage.get('inv:isAdmin', false); isAdmin = !!(r && r.value === '1'); }catch(e){ isAdmin = false; }
}
async function setAdmin(on){
  isAdmin = !!on;
  try{ await window.storage.set('inv:isAdmin', on ? '1' : '0', false); }catch(e){}
}

// ================== FORMATIONS — IMPORT / SYNCHRO EXCEL (admin) ==================
function indexFormations(data){
  data.people = Array.isArray(data.people) ? data.people : [];
  return data;
}
async function saveFormations(data){
  formationsData = indexFormations(data);
  try{ await window.storage.set('inv:formations', JSON.stringify({ people:data.people, maj:data.maj }), true); }catch(e){}
}
// Lit l'Excel croisé « Liste des formations » : en-têtes sur 2 lignes,
// blocs de 3 lignes par employé (Date / Attestation reçu / Échéance).
async function importFormationsFromFile(file){
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type:'array', cellDates:true });

  // Choisir la feuille croisée : celle qui contient « EMPLOYÉ » en haut à gauche
  // et une ligne « Échéance ».
  let sheet = null;
  wb.SheetNames.forEach(sn => {
    const ws = wb.Sheets[sn];
    const aoa = XLSX.utils.sheet_to_json(ws, { header:1, defval:'', raw:false });
    const flat = aoa.slice(0,6).map(r => (r||[]).join(' ')).join(' ').toLowerCase();
    const hasEmp = /employ/.test(flat);
    const hasEch = aoa.some(r => (r||[]).some(c => /échéance|echeance/i.test(String(c))));
    if(hasEmp && hasEch && !sheet){ sheet = { sn, aoa }; }
  });
  if(!sheet) return { people:[], maj:new Date().toISOString() };

  const aoa = sheet.aoa;
  const fmt = v => {
    if(v == null) return '';
    if(v instanceof Date){ return v.getFullYear() + '-' + String(v.getMonth()+1).padStart(2,'0') + '-' + String(v.getDate()).padStart(2,'0'); }
    return String(v).trim();
  };

  // Ligne d'en-tête des formations = celle qui contient « SECOURISTE » (ou SILICE)
  let hRow = -1;
  for(let r=0; r<Math.min(aoa.length, 6); r++){
    if((aoa[r]||[]).some(c => /secouriste|silice/i.test(String(c)))){ hRow = r; break; }
  }
  if(hRow === -1) hRow = 1;
  // colonnes de formation = à partir de la 3e colonne (index 2)
  const formCols = [];
  const headerRow = aoa[hRow] || [];
  for(let c=2; c<headerRow.length; c++){
    const nom = fmt(headerRow[c]).replace(/\s+/g,' ').trim();
    if(nom) formCols.push({ c, nom });
  }

  // Blocs employés : nom en colonne 0 (1re ligne) ; 3 lignes = Date / Attestation / Échéance.
  const people = [];
  let r = hRow + 1;
  while(r < aoa.length){
    const nom = fmt((aoa[r]||[])[0]);
    if(nom){
      const rowDate = aoa[r] || [], rowAtt = aoa[r+1] || [], rowEch = aoa[r+2] || [];
      const forms = [];
      formCols.forEach(({c, nom:fnom}) => {
        const d = fmt(rowDate[c]), a = fmt(rowAtt[c]), e = fmt(rowEch[c]);
        if(d || a || e){ forms.push({ formation:fnom, date:d, attestation:a, echeance:e }); }
      });
      if(forms.length) people.push({ nom, forms });
      r += 3;
    } else {
      r += 1;
    }
  }
  return { people, maj:new Date().toISOString() };
}

// ================== BARRE ADMIN (mode admin + synchro formations) ==================
function renderAdminBar(){
  const el = document.getElementById('adminBar');
  if(!el) return;
  if(!isAdmin){
    el.innerHTML = '<button type="button" class="admin-toggle" id="adminUnlock">🔑 Mode admin</button>';
    const unlock = document.getElementById('adminUnlock');
    if(unlock) unlock.onclick = async () => {
      const code = prompt('Code admin :');
      if(code == null) return;
      if(code.trim() === ADMIN_CODE){ await setAdmin(true); renderAdminBar(); render(); }
      else alert('Code incorrect.');
    };
    return;
  }
  const majTxt = (formationsData && formationsData.maj)
    ? ('Formations à jour : ' + new Date(formationsData.maj).toLocaleDateString('fr-CA'))
    : 'Aucune formation importée.';
  el.innerHTML =
    '<div class="admin-zone">' +
      '<div class="admin-zone-title">🔑 Mode admin</div>' +
      '<div class="admin-maj">' + escapeHtml(majTxt) + '</div>' +
      '<input type="file" id="formFile" accept=".xlsx,.xls,.csv" style="display:none;">' +
      '<button type="button" class="admin-btn primary" id="importForm">📥 Mettre à jour les formations (Excel)</button>' +
      '<button type="button" class="admin-btn" id="adminLock">Quitter le mode admin</button>' +
    '</div>';
  const lock = document.getElementById('adminLock');
  if(lock) lock.onclick = async () => { await setAdmin(false); renderAdminBar(); render(); };
  const importBtn = document.getElementById('importForm');
  const fileInp = document.getElementById('formFile');
  if(importBtn && fileInp){
    importBtn.onclick = () => fileInp.click();
    fileInp.onchange = async () => {
      const f = fileInp.files && fileInp.files[0];
      if(!f) return;
      try{
        importBtn.textContent = 'Lecture…'; importBtn.disabled = true;
        const data = await importFormationsFromFile(f);
        if(!data.people || !data.people.length){
          alert('Aucune formation trouvée. Vérifie que la feuille « Liste des formations » est présente (colonne EMPLOYÉ + ligne Échéance).');
        } else {
          await saveFormations(data);
          const total = data.people.reduce((n,p) => n + p.forms.length, 0);
          alert(data.people.length + ' employé(s) et ' + total + ' formation(s) importés.');
        }
      }catch(e){ console.error(e); alert('Impossible de lire ce fichier Excel.'); }
      finally{
        importBtn.textContent = '📥 Mettre à jour les formations (Excel)';
        importBtn.disabled = false;
        renderAdminBar(); render();
      }
    };
  }
}

// ================== CORRESPONDANCE NOMS ↔ FORMATIONS (même logique que l'inventaire) ==================
function normNom(s){
  return (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[.,\-]/g,' ').replace(/\s+/g,' ').trim();
}
function levenshtein(a, b){
  if(a === b) return 0;
  if(!a || !b) return (a.length + b.length);
  let prev = Array.from({length:b.length+1}, (_,i)=>i);
  for(let i=0;i<a.length;i++){
    let cur = [i+1];
    for(let j=0;j<b.length;j++){
      cur.push(Math.min(prev[j+1]+1, cur[j]+1, prev[j] + (a[i]!==b[j] ? 1 : 0)));
    }
    prev = cur;
  }
  return prev[b.length];
}
function motsProches(m1, m2){
  const d = levenshtein(m1, m2), L = Math.max(m1.length, m2.length);
  if(L >= 6) return d <= 2;
  if(L >= 4) return d <= 1;
  return d === 0;
}
function nomsProches(n1, n2){
  const w1 = normNom(n1).split(' ').filter(Boolean);
  const w2 = normNom(n2).split(' ').filter(Boolean);
  if(w1.length !== w2.length || w1.length === 0) return false;
  const used = new Array(w2.length).fill(false);
  for(const a of w1){
    let ok = false;
    for(let i=0;i<w2.length;i++){
      if(!used[i] && motsProches(a, w2[i])){ used[i] = true; ok = true; break; }
    }
    if(!ok) return false;
  }
  return true;
}
// Statut d'une échéance : rouge expirée, jaune <90 jours, verte sinon
function echeanceStatus(dateStr){
  const m = (dateStr||'').match(/(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})/);
  if(!m) return null;
  const d = new Date(+m[1], +m[2]-1, +m[3]);
  if(isNaN(d)) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const jours = Math.round((d - now) / 86400000);
  if(jours < 0) return { level:'red', label:'Expirée' };
  if(jours <= 90) return { level:'orange', label:'Bientôt due' };
  return { level:'green', label:'À jour' };
}

// ================== DONNÉES ==================
let people = [];          // fiches inv:person:*
let formationsData = null; // { people:[{nom, forms:[{formation,date,attestation,echeance}]}], maj }

async function loadAll(){
  // Une seule requête pour toutes les fiches + une pour les formations
  const [pRes, fRes] = await Promise.all([
    withTimeout(_sb.from('inv_store').select('key,value').like('key','inv:person:%'), 12000, 'people'),
    withTimeout(_sb.from('inv_store').select('value').eq('key','inv:formations').maybeSingle(), 12000, 'formations')
  ]);
  people = [];
  if(pRes && Array.isArray(pRes.data)){
    pRes.data.forEach(r => {
      try{
        const p = JSON.parse(r.value);
        if(p){ p._key = r.key; if(!p.id) p.id = r.key.replace('inv:person:',''); people.push(p); }
      }catch(e){}
    });
  }
  people.sort((a,b) => (a.nom||'').localeCompare(b.nom||'', 'fr'));
  formationsData = null;
  if(fRes && fRes.data && fRes.data.value){
    try{ const f = JSON.parse(fRes.data.value); if(f && Array.isArray(f.people)) formationsData = f; }catch(e){}
  }
}

// Pire niveau d'échéance de formation d'une personne (pour la pastille de bord)
function worstFormationLevel(nom){
  if(!formationsData || !Array.isArray(formationsData.people)) return null;
  let match = formationsData.people.find(p => normNom(p.nom) === normNom(nom));
  if(!match) match = formationsData.people.find(p => nomsProches(p.nom, nom));
  if(!match || !match.forms || !match.forms.length) return null;
  let worst = null;
  const rank = { green:1, orange:2, red:3 };
  match.forms.forEach(f => {
    const st = echeanceStatus(f.echeance);
    if(st && (!worst || rank[st.level] > rank[worst])) worst = st.level;
  });
  return worst;
}
function formationsHtmlFor(nom){
  if(!formationsData || !Array.isArray(formationsData.people)) return '';
  let match = formationsData.people.find(p => normNom(p.nom) === normNom(nom));
  if(!match) match = formationsData.people.find(p => nomsProches(p.nom, nom));
  if(!match || !match.forms || !match.forms.length) return '';
  const items = match.forms.map(f => {
    const st = echeanceStatus(f.echeance);
    const dot = st ? '<span class="dot ' + st.level + '"></span>' : '';
    const ech = f.echeance
      ? ('<span class="f-ech ' + (st ? st.level : '') + '">' + escapeHtml(f.echeance) + (st && st.level !== 'green' ? ' — ' + st.label : '') + '</span>')
      : '—';
    return '<div class="f-line">' + dot + '<b>' + escapeHtml(f.formation) + '</b> · éch : ' + ech + '</div>';
  }).join('');
  return '<div class="pf"><div class="pf-title">🎓 Formations (' + match.forms.length + ')</div>' + items + '</div>';
}

// ================== AFFICHAGE ==================
function render(){
  const list = document.getElementById('list');
  const q = normNom(document.getElementById('search').value);
  const myId = getDeviceId();
  const shown = q ? people.filter(p => normNom(p.nom).includes(q)) : people;

  const majTxt = (formationsData && formationsData.maj)
    ? ' · <span class="maj">Formations à jour : ' + new Date(formationsData.maj).toLocaleDateString('fr-CA') + '</span>' : '';
  document.getElementById('count').innerHTML =
    shown.length + ' personne' + (shown.length > 1 ? 's' : '') + (q ? ' trouvée' + (shown.length > 1 ? 's' : '') : ' identifiée' + (shown.length > 1 ? 's' : '')) + majTxt;

  if(!shown.length){
    list.innerHTML = '<div class="empty">' + (q
      ? 'Aucun nom ne correspond à ta recherche.'
      : 'Aucune personne identifiée pour le moment.<br>Chaque personne apparaît ici après s\'être identifiée sur l\'accueil.') + '</div>';
    return;
  }
  list.innerHTML = shown.map(p => {
    const isMe = (p.id === myId);
    const tel = p.tel ? '<a href="tel:' + escapeAttr(p.tel) + '"><b>📞</b> ' + escapeHtml(p.tel) + '</a>' : '';
    const mail = p.courriel ? '<a href="mailto:' + escapeAttr(p.courriel) + '"><b>✉️</b> ' + escapeHtml(p.courriel) + '</a>' : '';
    const contact = [tel, mail].filter(Boolean).join('');
    const equipe = p.equipe ? '<span class="p-team">' + escapeHtml(p.equipe) + '</span>' : '';
    const carte = (p.extra && p.extra.carteUrl)
      ? '<div class="p-carte"><a href="' + escapeAttr(p.extra.carteUrl) + '" target="_blank" rel="noopener">🪪 Voir la carte / certificat</a></div>' : '';
    const pKey = escapeAttr(p._key || ('inv:person:' + p.id));
    const adminBtns = isAdmin
      ? '<div class="p-admin">' +
          '<button type="button" class="p-admin-btn" data-carte-key="' + pKey + '">🔗 ' + ((p.extra && p.extra.carteUrl) ? 'Modifier' : 'Ajouter') + ' lien carte</button>' +
          '<button type="button" class="p-admin-btn danger" data-del-key="' + pKey + '" data-del-id="' + escapeAttr(p.id || '') + '" data-del-nom="' + escapeAttr(p.nom || '') + '">🗑️ Supprimer</button>' +
        '</div>'
      : '';
    const wl = worstFormationLevel(p.nom);
    const edge = wl ? (' edge-' + (wl==='orange' ? 'yellow' : wl)) : '';
    return '<div class="card' + (isMe ? ' me' : '') + edge + '">' +
      '<div class="p-top"><span class="p-name">' + escapeHtml(p.nom || '(sans nom)') +
        (isMe ? ' <span class="p-you">Toi</span>' : '') + '</span>' + equipe + '</div>' +
      (contact ? '<div class="p-contact">' + contact + '</div>' : '') +
      carte +
      formationsHtmlFor(p.nom) +
      (isMe ? '<button type="button" class="edit-btn" id="editMe">✏️ Modifier mes infos</button>' : '') +
      adminBtns +
      '</div>';
  }).join('');
  const btn = document.getElementById('editMe');
  if(btn) btn.onclick = openEdit;

  // ---- Actions admin par personne (lien carte + suppression) ----
  if(isAdmin){
    list.querySelectorAll('[data-carte-key]').forEach(b => {
      b.onclick = async () => {
        const key = b.getAttribute('data-carte-key');
        const person = people.find(x => (x._key || ('inv:person:' + x.id)) === key);
        const actuel = (person && person.extra && person.extra.carteUrl) || '';
        const url = prompt('Lien vers la photo de la carte / certificat (Google Drive, etc.) :', actuel);
        if(url == null) return;
        const rec = Object.assign({}, person);
        delete rec._key; // ne pas enregistrer la clé technique dans la valeur
        rec.extra = Object.assign({}, (person && person.extra) || {}, { carteUrl: url.trim() });
        try{ await window.storage.set(key, JSON.stringify(rec), true); }catch(e){}
        try{ await loadAll(); }catch(e){}
        render();
      };
    });
    list.querySelectorAll('[data-del-key]').forEach(b => {
      b.onclick = async () => {
        const key = b.getAttribute('data-del-key');
        const pid = b.getAttribute('data-del-id') || key.replace('inv:person:', '');
        const pnom = b.getAttribute('data-del-nom') || 'cette personne';
        if(!confirm('Supprimer la fiche de « ' + pnom + ' » ?\n\n' +
          'Elle disparaîtra du répertoire. La personne devra se réidentifier pour recréer sa fiche.')) return;
        // 1) retirer la fiche partagée
        try{ await window.storage.delete(key, true); }catch(e){}
        // 2) marquer l'appareil comme « supprimé » pour qu'il ne se recrée pas tout seul
        try{
          const raw = await window.storage.get('inv:deletedPeople', true);
          const arr = (raw && raw.value) ? JSON.parse(raw.value) : [];
          if(arr.indexOf(pid) === -1) arr.push(pid);
          await window.storage.set('inv:deletedPeople', JSON.stringify(arr), true);
        }catch(e){}
        // 3) si c'est CET appareil, effacer l'identité locale -> réidentification forcée
        if(pid === getDeviceId()){
          try{ localStorage.removeItem('inv:deviceUser'); }catch(e){}
        }
        try{ await loadAll(); }catch(e){}
        render();
      };
    });
  }
}

// ================== MODIFIER MES INFOS ==================
function openEdit(){
  const u = getDeviceUser() || {};
  document.getElementById('idNom').value = u.nom || '';
  document.getElementById('idTel').value = u.tel || '';
  document.getElementById('idCourriel').value = u.courriel || '';
  document.getElementById('idError').innerHTML = '&nbsp;';
  document.getElementById('overlay').classList.add('show');
}
document.getElementById('idCancel').onclick = () => document.getElementById('overlay').classList.remove('show');
document.getElementById('overlay').addEventListener('click', e => { if(e.target.id === 'overlay') document.getElementById('overlay').classList.remove('show'); });
document.getElementById('idSave').onclick = async () => {
  const nom = document.getElementById('idNom').value.trim();
  const tel = document.getElementById('idTel').value.trim();
  const courriel = document.getElementById('idCourriel').value.trim();
  if(!nom){ document.getElementById('idError').textContent = 'Le nom est requis.'; return; }
  const obj = { nom, tel, courriel };
  try{ localStorage.setItem('inv:deviceUser', JSON.stringify(obj)); }catch(e){}
  document.getElementById('overlay').classList.remove('show');
  // Met à jour la fiche partagée puis recharge la liste
  const stEl = document.getElementById('saveStatus');
  if(stEl){ stEl.className='save-status'; stEl.textContent='💾 Enregistrement…'; }
  try{
    const id = getDeviceId();
    const rec = { id, nom, tel, courriel, equipe:'', equipeId:'', maj:new Date().toISOString(), extra:{} };
    const prev = people.find(x => x.id === id);
    if(prev){ rec.equipe = prev.equipe || ''; rec.equipeId = prev.equipeId || ''; if(prev.extra) rec.extra = prev.extra; }
    await withTimeout(_sb.from('inv_store').upsert({ key:'inv:person:' + id, value:JSON.stringify(rec), updated_at:new Date().toISOString() }), 10000, 'save');
    if(stEl){ const d=new Date(); stEl.className='save-status ok'; stEl.textContent='✔ Enregistré à '+String(d.getHours()).padStart(2,'0')+'h'+String(d.getMinutes()).padStart(2,'0'); }
  }catch(e){
    console.error(e);
    if(stEl){ stEl.className='save-status err'; stEl.textContent='⚠ Non enregistré — vérifie la connexion et réessaie'; }
  }
  try{ await loadAll(); }catch(e){}
  render();
};

document.getElementById('search').addEventListener('input', render);

/* ============================================================
   EXPORT EXCEL (Ctrl+X révèle le bouton — même principe que l'inventaire)
   ============================================================ */
function xlsSheet(aoa, meta, widths, leftCols){
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = widths.map(w => ({wch:w}));
  ws['!freeze'] = { xSplit:0, ySplit:1 };
  ws['!autofilter'] = { ref: XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:aoa.length-1, c:widths.length-1}}) };
  for(let r=0; r<aoa.length; r++){
    for(let c=0; c<widths.length; c++){
      const addr = XLSX.utils.encode_cell({r,c});
      if(!ws[addr]) ws[addr] = { t:'s', v:'' };
      const m = meta[r] || {};
      let fill='FFFFFF', bold=false, fontColor='000000';
      if(m.header){ fill='232221'; bold=true; fontColor='FFFFFF'; }
      else if(m.cat){ fill='D9D2C2'; bold=true; }
      else if(m.couleur==='red') fill='F4CCCC';
      else if(m.couleur==='yellow') fill='FFF2CC';
      else if(m.couleur==='green') fill='D9EAD3';
      ws[addr].s = {
        fill:{ patternType:'solid', fgColor:{rgb:fill} },
        font:{ name:'Arial', sz:m.header?11:10, bold:bold, color:{rgb:fontColor} },
        alignment:{ vertical:'center', horizontal:(leftCols.indexOf(c)!==-1)?'left':'center', wrapText:!!m.header },
        border:{ top:{style:'thin',color:{rgb:'CCCCCC'}}, bottom:{style:'thin',color:{rgb:'CCCCCC'}},
                 left:{style:'thin',color:{rgb:'CCCCCC'}}, right:{style:'thin',color:{rgb:'CCCCCC'}} }
      };
    }
  }
  return ws;
}
async function exporterExcel(){
  const btn = document.getElementById('exportBtn');
  const old = btn ? btn.textContent : '';
  if(btn){ btn.textContent='...'; btn.disabled=true; }
  try{
    if(typeof XLSX === 'undefined'){ alert('Librairie Excel non chargée. Vérifie ta connexion.'); return; }
    if(!people.length && !(formationsData && formationsData.people && formationsData.people.length)){ alert('Aucune donnée à exporter.'); return; }
    const wb = XLSX.utils.book_new();
    // --- Répertoire ---
    if(people.length){
      const aoa=[['Nom','Téléphone','Courriel','Équipe']], meta=[{header:true}];
      people.forEach(p => { aoa.push([p.nom||'—', p.tel||'', p.courriel||'', p.equipe||'']); meta.push({}); });
      XLSX.utils.book_append_sheet(wb, xlsSheet(aoa, meta, [30,16,32,14], [0,2]), 'Répertoire');
    }
    // --- Formations (avec échéances colorées, comme à l'écran) ---
    if(formationsData && Array.isArray(formationsData.people) && formationsData.people.length){
      const aoa=[['Employé','Formation','Date','Attestation','Échéance','Statut']], meta=[{header:true}];
      formationsData.people.forEach(pers => {
        (pers.forms||[]).forEach(f => {
          const st = echeanceStatus(f.echeance);
          aoa.push([pers.nom, f.formation||'', f.date||'', f.attestation||'', f.echeance||'', st?st.label:'']);
          meta.push({couleur: st ? (st.level==='orange'?'yellow':st.level) : null});
        });
      });
      XLSX.utils.book_append_sheet(wb, xlsSheet(aoa, meta, [30,26,12,12,14,16], [0,1]), 'Formations');
    }
    const d = new Date();
    XLSX.writeFile(wb, 'Infos_DMD_' + d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + '.xlsx');
    if(btn) btn.style.display='none';
  }catch(e){ console.error(e); alert("Une erreur est survenue pendant l'export."); }
  finally{ if(btn){ btn.textContent=old||'⬇ Excel'; btn.disabled=false; } }
}
document.getElementById('exportBtn').addEventListener('click', exporterExcel);
document.addEventListener('keydown', function(e){
  if((e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey && (e.key==='x' || e.key==='X')){
    const el = document.activeElement;
    if(el && (el.tagName==='INPUT' || el.tagName==='TEXTAREA' || el.isContentEditable)) return;
    e.preventDefault();
    const btn = document.getElementById('exportBtn');
    if(btn){ btn.style.display=''; btn.focus(); }
  }
});

    list.innerHTML = '<div class="empty">Connexion au serveur impossible (librairie non chargée).<br>Vérifie ta connexion Internet et réessaie.</div>';
    return;
  }
  // Session obligatoire : sinon on retourne à l'accueil (qui gère le mot de passe)

    if(!data || !data.session){ location.replace('./index.html'); return; }
  }catch(e){
    list.innerHTML = '<div class="empty">Serveur injoignable. Vérifie ta connexion et réessaie.</div>';
    return;
  }
  try{
    await loadAdmin();
    await loadAll();
    render();
    renderAdminBar();
  }catch(e){
    console.error(e);
    list.innerHTML = '<div class="empty">Impossible de charger le répertoire. Vérifie ta connexion et réessaie.</div>';
  }
})();
