*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--asphalt);color:var(--paper);font-family:'Barlow',sans-serif;min-height:100%;-webkit-text-size-adjust:100%;}
#app{min-height:100vh; display:flex; flex-direction:column; max-width:620px; margin:0 auto; background:var(--asphalt);}
.hdr{

  background-image:linear-gradient(rgba(0,0,0,0.12) 2px,transparent 2px),linear-gradient(90deg,rgba(0,0,0,0.12) 2px,transparent 2px);
  background-size:38px 20px; border-bottom:3px solid var(--brick-line);
}
.back{ color:var(--paper); text-decoration:none; font-size:22px; line-height:1; padding:8px 10px; border-radius:8px; background:rgba(0,0,0,0.25); }
.hdr-txt{ display:flex; flex-direction:column; }
.hdr-title{ font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:22px; letter-spacing:0.5px; margin:0; line-height:1.05; }
.hdr-sub{ font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--paper-dim); margin-top:1px; }
.adm-toggle{ margin-left:auto; flex:0 0 auto; background:rgba(0,0,0,0.25); border:1px solid rgba(0,0,0,0.3); color:var(--paper); border-radius:8px; padding:8px 11px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:0.5px; cursor:pointer; white-space:nowrap; }
.adm-toggle.on{ background:var(--safety-yellow); color:#232221; border-color:var(--safety-yellow); }

.tabs{ display:flex; gap:6px; padding:10px 14px 2px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.tab{ flex:0 0 auto; padding:9px 15px; border-radius:20px; border:1.5px solid var(--line); background:var(--asphalt-2); color:var(--paper-dim); font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:15px; letter-spacing:0.5px; text-transform:uppercase; cursor:pointer; }
.tab.active{ background:var(--brick); border-color:var(--brick-line); color:var(--paper); font-size:17.5px; font-weight:800; }

.wrap{ padding:12px 14px 30px; }
.teamsel{ display:flex; align-items:center; gap:9px; margin:4px 0 12px; }
.teamsel label{ font-size:12px; text-transform:uppercase; letter-spacing:0.5px; color:var(--paper-dim); font-weight:700; }
.teamsel select{ flex:1; padding:10px 12px; border-radius:9px; border:1.5px solid var(--line); background:var(--asphalt-2); color:var(--paper); font-family:'Barlow',sans-serif; font-size:15px; }
.mine-badge{ font-size:11px; font-weight:700; color:#232221; background:var(--safety-yellow); border-radius:12px; padding:2px 8px; text-transform:uppercase; letter-spacing:0.4px; }
.ro-note{ font-size:12.5px; color:var(--amber); background:rgba(224,149,43,0.1); border:1px solid rgba(224,149,43,0.35); border-radius:9px; padding:8px 11px; margin-bottom:11px; line-height:1.4; }

.grp-title{ font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:15px; text-transform:uppercase; letter-spacing:0.7px; color:var(--paper-dim); margin:16px 2px 7px; display:flex; align-items:center; gap:8px; }
.card{ background:var(--asphalt-2); border:1.5px solid var(--line); border-radius:13px; padding:12px 14px; margin:9px 0; cursor:pointer; }
.card:active{ border-color:var(--paper-dim); }
.card-top{ display:flex; align-items:center; gap:9px; }
.card-ident{ font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px; background:var(--asphalt); border:1px solid var(--line); color:var(--safety-yellow); border-radius:7px; padding:2px 8px; flex:0 0 auto; }
.card-nom{ font-weight:600; font-size:16px; }
.card-form{ font-size:12px; color:var(--paper-dim); margin-top:2px; }
.weekdots{ display:flex; gap:5px; margin-top:10px; }
.wd{ flex:1; text-align:center; }
.wd .d{ font-size:10px; color:var(--logo-grey); text-transform:uppercase; }
.wd .dot{ width:14px; height:14px; border-radius:50%; margin:3px auto 0; background:var(--line); }
.dot.green{ background:var(--ok-soft); } .dot.red{ background:var(--danger-red); } .dot.amber{ background:var(--amber); } .dot.future{ background:transparent; border:1px dashed var(--line); }
.empty{ color:var(--logo-grey); font-size:14px; font-style:italic; padding:20px 6px; text-align:center; }

.btn{ width:100%; padding:12px; border:none; border-radius:10px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; text-transform:uppercase; letter-spacing:0.5px; cursor:pointer; margin-top:9px; background:var(--asphalt); color:var(--paper-dim); border:1.5px solid var(--line); }
.btn.primary{ background:var(--safety-yellow); color:#232221; border:none; }
.btn.brick{ background:var(--brick); color:var(--paper); border:none; }
.btn.danger{ background:#5a2a2a; color:#ffd7d7; border:none; }

.hist-item{ background:var(--asphalt-2); border:1.5px solid var(--line); border-radius:11px; padding:10px 12px; margin:8px 0; display:flex; align-items:center; gap:10px; cursor:pointer; }
.hist-main{ flex:1; min-width:0; }
.hist-date{ font-weight:700; font-size:15px; }
.hist-sub{ font-size:12.5px; color:var(--paper-dim); margin-top:2px; }
.hi-dot{ width:12px; height:12px; border-radius:50%; flex:0 0 auto; }

/* Overlay / modale */
.overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,0.74); z-index:60; align-items:flex-start; justify-content:center; padding:18px 10px; overflow-y:auto; }
.overlay.show{ display:flex; }
.modal{ background:var(--asphalt-2); border:1.5px solid var(--line); border-radius:16px; padding:16px; width:100%; max-width:560px; }
.modal h3{ font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:20px; margin:0 0 4px; letter-spacing:0.5px; }
.m-meta{ font-size:12.5px; color:var(--paper-dim); margin-bottom:10px; line-height:1.45; }
.field-label{ font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--paper-dim); margin:9px 0 3px; }
.inp{ width:100%; padding:10px 11px; border-radius:9px; border:1.5px solid var(--line); background:var(--asphalt); color:var(--paper); font-size:15px; font-family:'Barlow',sans-serif; }
textarea.inp{ resize:vertical; min-height:52px; }

.wknav{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin:8px 0; }
.wknav button{ background:var(--asphalt); border:1.5px solid var(--line); color:var(--paper); border-radius:9px; padding:8px 12px; font-size:16px; cursor:pointer; }
.wknav button:disabled{ opacity:0.35; }
.wknav .lbl{ flex:1; text-align:center; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:15px; text-transform:uppercase; letter-spacing:0.5px; }
.daychips{ display:flex; gap:4px; margin:6px 0 12px; }
.daychip{ flex:1; text-align:center; padding:7px 2px; border-radius:9px; border:1.5px solid var(--line); background:var(--asphalt); cursor:pointer; }
.daychip.sel{ border-color:var(--safety-yellow); background:rgba(242,183,5,0.12); }
.daychip.future{ opacity:0.32; }
.daychip .dn{ font-size:10.5px; text-transform:uppercase; color:var(--paper-dim); font-weight:700; }
.daychip .dd{ font-size:14px; font-weight:700; }
.daychip .cdot{ width:8px; height:8px; border-radius:50%; margin:3px auto 0; background:var(--line); }

.itbl{ margin-top:6px; }
.igroup{ font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13.5px; text-transform:uppercase; letter-spacing:0.5px; color:var(--safety-yellow); margin:12px 0 5px; padding-bottom:3px; border-bottom:1px solid var(--line); }
.irow{ padding:7px 0; border-bottom:1px dashed var(--line); }
.irow .it-lbl{ font-size:14px; line-height:1.35; margin-bottom:6px; }
.st-btns{ display:flex; gap:6px; }
.st{ flex:1; padding:8px 4px; border-radius:8px; border:1.5px solid var(--line); background:var(--asphalt); color:var(--paper-dim); font-size:13px; font-weight:700; cursor:pointer; text-align:center; }
.st.ok.on{ background:var(--ok-green); border-color:var(--ok-green); color:#fff; }
.st.anomalie.on{ background:var(--danger-red); border-color:var(--danger-red); color:#fff; }
.st.na.on{ background:var(--logo-grey); border-color:var(--logo-grey); color:#fff; }
.qtyrow{ display:flex; gap:8px; margin-top:6px; }
.qtyrow .qf{ flex:1; }
.qtyrow .qf .field-label{ margin:0 0 2px; }
.roflag{ pointer-events:none; opacity:0.75; }
.save-status{ font-size:12.5px; color:var(--ok-soft); min-height:16px; margin-top:6px; text-align:center; }

.gate{ position:fixed; inset:0; z-index:1000; display:none; align-items:center; justify-content:center; padding:28px; text-align:center; background:var(--asphalt); color:var(--paper-dim); }
.gate.show{ display:flex; }
</style>
</head>

const HEADER_LABELS = { noSerie:'N° de série', marque:'Marque', modele:'Modèle', charge:'Charge nominale', horometre:'Horomètre', typeUnite:"Type d'unité (mono/bi mât…)", chantier:'Chantier', emplacement:'Emplacement', lieu:'Lieu de travail' };
function statusOptions(form){ const f=FORMS[form]; return STATUS_DEF[(f&&f.status)||'def']; }
function itemsFlat(form){ const out=[]; (FORMS[form].groups||[]).forEach((g,gi)=>g.items.forEach((it,ii)=>out.push({gi,ii,key:'g'+gi+'_'+ii,label:it,qty:!!g.qty}))); return out; }

// ================== ÉTAT ==================
let teams=[], teamLabelMap={}, myTeamId=null, isAdmin=false;
let catalog=[], catByName={}, identsByName={}, teamMachines={};
let units=[];              // {unitKey, teamId, name, cat, form, ident}
let currentTab='machines';
let curTeamSel=null;

const STD_TEAMS=[{id:'team_1',label:'Équipe 1'},{id:'team_2',label:'Équipe 2'},{id:'team_3',label:'Équipe 3'},{id:'team_4',label:'Équipe 4'},{id:'team_5',label:'Équipe 5'},{id:'team_6',label:'Équipe 6'},{id:'reno_1',label:'Réno 1'},{id:'reno_2',label:'Réno 2'},{id:'entrepot',label:'Entrepôt'},{id:'administration',label:'Administration'}];

async function loadTeams(){
  try{ const r=await storage.get('inv:teams'); if(r&&r.value){ const p=JSON.parse(r.value); if(Array.isArray(p)&&p.length) teams=p; } }catch(e){}
  if(!teams.length) teams=STD_TEAMS.slice();
  teamLabelMap={}; teams.forEach(t=>teamLabelMap[t.id]=t.label);
}
function teamLabel(id){ return teamLabelMap[id]||id; }

async function loadCatalog(){
  try{ const r=await storage.get('inv:machineCatalog'); if(r&&r.value){ const p=JSON.parse(r.value); if(p&&Array.isArray(p.machines)) catalog=p.machines; } }catch(e){ catalog=[]; }
  catByName={}; identsByName={};
  catalog.forEach(m=>{ const k=normNom(m.nom); if(!(k in catByName)) catByName[k]=m.cat; (identsByName[k]=identsByName[k]||[]).push(m.ident||''); });
}
async function loadTeamMachines(){
  teamMachines={};
  const rows=await storage.like('inv:machines:');
  rows.forEach(r=>{
    const mm=r.key.match(/^inv:machines:(.+):MACHINERIE$/); if(!mm) return;
    try{ const v=JSON.parse(r.value); if(v&&Array.isArray(v.actifs)) teamMachines[mm[1]]=v.actifs; }catch(e){}
  });
}
function formForMachine(cat,nom){
  const n=normNom(nom);
  if(cat==='Fraco') return 'fraco';
  if(cat==='Lift') return 'chariot';
  if(cat==='Scie'){ if(/chain|chaine|husqvarna/.test(n)) return 'scie_chaine'; return 'scie_gaz'; }
  return null;   // Mixeur ou inconnu : aucune fiche d'inspection
}
function buildUnits(){
  units=[];
  const orderedTeams=teams.map(t=>t.id);
  orderedTeams.forEach(teamId=>{
    const actifs=teamMachines[teamId]||[]; const occ={};
    actifs.forEach(name=>{
      const k=normNom(name); const cat=catByName[k]; const form=formForMachine(cat,name); if(!form) return;
      occ[k]=(occ[k]||0)+1; const idx=occ[k];
      const ids=identsByName[k]||[]; const ident=ids[idx-1]||(ids[0]||'');
      // Clé STABLE : l'identifiant catalogue (L02, F04, S14…) quand il existe — l'historique
      // ne se détache pas si l'ordre ou le nombre de machines de l'équipe change.
      const stable = ids[idx-1] ? slug(ids[idx-1]) : (slug(name)+'|'+idx);
      units.push({ unitKey:teamId+'|'+stable, teamId, name, cat, form, ident:ident+(ids.length>1&&!ids[idx-1]?(' #'+idx):'') });
    });
  });
}
function unitsForTeam(teamId){ return units.filter(u=>u.teamId===teamId); }

// ---- équipe de l'utilisateur (registre inv:teammember) ----
async function loadMyTeam(){
  const me=myName(); if(!me||me==='Tablette de chantier'||/^Appareil /.test(me)){ myTeamId=null; return; }
  const rows=await storage.like('inv:teammember:'); const members=[];
  rows.forEach(r=>{ try{ const m=JSON.parse(r.value); if(m&&m.nom&&m.teamId) members.push(m); }catch(e){} });
  const hit=members.find(m=>normNom(m.nom)===normNom(me)); if(hit){ myTeamId=hit.teamId; return; }
  const near=members.filter(m=>nomsProches(m.nom,me)); if(near.length===1) myTeamId=near[0].teamId;
}
function canFillTeam(teamId){ return isAdmin || (myTeamId && teamId===myTeamId); }

// ================== ONGLETS ==================
const TABS=[{id:'machines',label:'Machinerie & scies'},{id:'echafaudage',label:'Échafaudage'},{id:'madriers',label:'Madriers'}];
function renderTabs(){
  document.getElementById('tabs').innerHTML = TABS.map(t=>'<div class="tab'+(t.id===currentTab?' active':'')+'" data-tab="'+t.id+'">'+escapeHtml(t.label)+'</div>').join('');
  document.querySelectorAll('#tabs .tab').forEach(el=>el.onclick=()=>{ currentTab=el.getAttribute('data-tab'); renderTabs(); renderTab(); });
}
function renderTab(){
  if(currentTab==='machines') renderMachines();
  else renderGlobal(currentTab);
}

// ================== ONGLET MACHINES ==================
let weekCache={};   // unitKey -> {weekStart -> record}
function renderMachines(){
  const wrap=document.getElementById('wrap');
  if(curTeamSel==null) curTeamSel = myTeamId || (teams[0]&&teams[0].id);
  let html='';
  html+='<div class="teamsel"><label>Équipe</label><select id="teamSel">'+teams.map(t=>'<option value="'+escapeAttr(t.id)+'"'+(t.id===curTeamSel?' selected':'')+'>'+escapeHtml(t.label)+(t.id===myTeamId?' — mon équipe':'')+'</option>').join('')+'</select></div>';
  const canFill=canFillTeam(curTeamSel);
  if(!canFill) html+='<div class="ro-note">🔒 Lecture seule — tu peux remplir uniquement les inspections des machines de ton équipe'+(myTeamId?(' ('+escapeHtml(teamLabel(myTeamId))+')'):'')+'.</div>';
  const list=unitsForTeam(curTeamSel);
  if(!list.length){
    html+='<div class="empty">Aucune machine assignée à cette équipe dans l\'inventaire.<br>Les machines proviennent de la sélection par équipe de la tuile Inventaire (onglet Machinerie).</div>';
  } else {
    const byForm={};
    list.forEach(u=>{ (byForm[u.form]=byForm[u.form]||[]).push(u); });
    ['chariot','fraco','scie_gaz','scie_chaine'].forEach(fk=>{
      if(!byForm[fk]) return;
      html+='<div class="grp-title">'+escapeHtml(FORMS[fk].label)+'</div>';
      byForm[fk].forEach(u=>{ html+=unitCard(u); });
    });
  }
  wrap.innerHTML=html;
  document.getElementById('teamSel').onchange=e=>{ curTeamSel=e.target.value; renderMachines(); };
  wrap.querySelectorAll('[data-unit]').forEach(el=>el.onclick=()=>openWeek(el.getAttribute('data-unit')));
  // charge les enregistrements de la semaine courante pour colorer les pastilles
  loadWeekDotsFor(list);
}
function unitCard(u){
  const ws=isoDate(mondayOf(new Date())); const rec=(weekCache[u.unitKey]||{})[ws];
  const days=weekDays(ws); const today=todayISO();
  let dots='';
  days.forEach((d,i)=>{
    let cls='dot ';
    if(d>today) cls+='future';
    else{ const st=dayStatus(rec,d); cls+=st; }
    dots+='<div class="wd"><div class="d">'+DAYNAMES[i]+'</div><div class="'+cls+'"></div></div>';
  });
  return '<div class="card" data-unit="'+escapeAttr(u.unitKey)+'"><div class="card-top">'+(u.ident?'<span class="card-ident">'+escapeHtml(u.ident)+'</span>':'')+'<div><div class="card-nom">'+escapeHtml(u.name)+'</div><div class="card-form">'+escapeHtml(FORMS[u.form].label)+'</div></div></div><div class="weekdots">'+dots+'</div></div>';
}
function dayStatus(rec,d){
  if(!rec||!rec.days||!rec.days[d]) return '';   // vide
  const ans=rec.days[d].answers||{}; let filled=0,anom=0;
  for(const k in ans){ if(ans[k]){ filled++; if(ans[k]==='anomalie') anom++; } }
  if(!filled) return '';
  if(anom>0) return 'red';
  return 'green';
}
async function loadWeekDotsFor(list){
  const ws=isoDate(mondayOf(new Date()));
  const missing=list.filter(u=>!(weekCache[u.unitKey] && weekCache[u.unitKey][ws]!==undefined));
  if(!missing.length) return;
  const teamAtStart=curTeamSel;
  // Chargement en PARALLÈLE (une requête par unité, toutes en même temps) — fini le
  // chargement séquentiel qui faisait attendre les pastilles avec 10+ machines.
  await Promise.all(missing.map(async u=>{
    try{ const r=await storage.get('inv:insp:'+u.form+':'+u.unitKey+':'+ws);
      weekCache[u.unitKey]=weekCache[u.unitKey]||{};
      weekCache[u.unitKey][ws]= r&&r.value ? JSON.parse(r.value) : null;
    }catch(e){ weekCache[u.unitKey]=weekCache[u.unitKey]||{}; weekCache[u.unitKey][ws]=null; }
  }));
  if(currentTab==='machines' && curTeamSel===teamAtStart) renderMachines();
}

// ---- Grille hebdo d'une unité ----
let fillState=null;   // { u, weekStart, rec, selDay, answers }
async function openWeek(unitKey){
  const u=units.find(x=>x.unitKey===unitKey); if(!u) return;
  const weekStart=isoDate(mondayOf(new Date()));
  await loadWeek(u,weekStart, todayISO());
}
async function loadWeek(u, weekStart, selDay){
  const r=await storage.get('inv:insp:'+u.form+':'+u.unitKey+':'+weekStart);
  const rec = r&&r.value ? JSON.parse(r.value) : { form:u.form, unitKey:u.unitKey, teamId:u.teamId, name:u.name, ident:u.ident, weekStart, header:{}, days:{} };
  weekCache[u.unitKey]=weekCache[u.unitKey]||{}; weekCache[u.unitKey][weekStart]=rec;
  const today=todayISO();
  // jour sélectionné par défaut : aujourd'hui s'il est dans la semaine, sinon dernier jour <= aujourd'hui
  const days=weekDays(weekStart);
  if(!selDay || selDay>today) { selDay = days.filter(d=>d<=today).pop() || days[0]; }
  fillState={ u, weekStart, rec, selDay, answers:Object.assign({}, (rec.days[selDay]&&rec.days[selDay].answers)||{}) };
  renderWeekModal();
}
function renderWeekModal(){
  const {u,weekStart,rec,selDay}=fillState; const canFill=canFillTeam(u.teamId);
  const days=weekDays(weekStart); const today=todayISO();
  const thisMonday=isoDate(mondayOf(new Date()));
  let h='<h3>'+escapeHtml(u.name)+'</h3>';
  h+='<div class="m-meta">'+(u.ident?('<b>'+escapeHtml(u.ident)+'</b> · '):'')+escapeHtml(FORMS[u.form].label)+' · '+escapeHtml(teamLabel(u.teamId))+'</div>';
  // navigation semaine
  const canNext = weekStart < thisMonday;
  h+='<div class="wknav"><button id="wkPrev">‹</button><div class="lbl">Semaine du '+frDate(weekStart)+' au '+frDate(addDays(weekStart,6))+'</div><button id="wkNext"'+(canNext?'':' disabled')+'>›</button></div>';
  // en-tête (une fois par semaine)
  if((FORMS[u.form].header||[]).length){
    h+='<div style="display:flex;gap:8px;flex-wrap:wrap;">';
    (FORMS[u.form].header||[]).forEach(f=>{
      h+='<div style="flex:1;min-width:44%;"><div class="field-label">'+escapeHtml(HEADER_LABELS[f]||f)+'</div><input class="inp" data-hdr="'+f+'" value="'+escapeAttr((rec.header&&rec.header[f])||'')+'"'+(canFill?'':' disabled')+'></div>';
    });
    h+='</div>';
  }
  // sélecteur de jour
  h+='<div class="daychips">';
  days.forEach((d,i)=>{
    const fut=d>today; const sel=d===selDay;
    h+='<div class="daychip'+(sel?' sel':'')+(fut?' future':'')+'" data-day="'+d+'"><div class="dn">'+DAYNAMES[i]+'</div><div class="dd">'+d.slice(8)+'</div><div class="cdot '+(fut?'future':dayStatus(rec,d))+'"></div></div>';
  });
  h+='</div>';
  const future = selDay>today;
  if(future){ h+='<div class="ro-note">Ce jour n\'est pas encore arrivé — remplissage indisponible.</div>'; }
  // légende
  h+='<div style="font-size:11.5px;color:var(--paper-dim);margin:2px 0 4px;">Inspecteur : <b>'+escapeHtml(formatNom(myName()))+'</b> · Légende : OK · Anomalie (X) · N.A.</div>';
  // items
  h+='<div class="itbl'+((canFill&&!future)?'':' roflag')+'">';
  (FORMS[u.form].groups||[]).forEach((g,gi)=>{
    h+='<div class="igroup">'+escapeHtml(g.title)+'</div>';
    g.items.forEach((it,ii)=>{ h+=itemRow(u.form,'g'+gi+'_'+ii,it,fillState.answers['g'+gi+'_'+ii]); });
  });
  h+='</div>';
  h+='<div class="save-status" id="saveStatus"></div>';
  if(canFill&&!future) h+='<button class="btn primary" id="saveDay">💾 Enregistrer le '+DAYNAMES[days.indexOf(selDay)]+' '+frDate(selDay)+'</button>';
  h+='<button class="btn" id="closeM">Fermer</button>';
  const box=document.getElementById('modalBox'); box.innerHTML=h;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('overlay').onclick=e=>{ if(e.target.id==='overlay'){ if(!confirmDiscard()) return; closeModal(); } };
  document.getElementById('closeM').onclick=()=>{ if(!confirmDiscard()) return; closeModal(); };
  document.getElementById('wkPrev').onclick=()=>{ if(!confirmDiscard()) return; loadWeek(u, addDays(weekStart,-7), null); };
  if(canNext) document.getElementById('wkNext').onclick=()=>{ if(!confirmDiscard()) return; loadWeek(u, addDays(weekStart,7), null); };
  box.querySelectorAll('.daychip').forEach(el=>el.onclick=()=>{ const d=el.getAttribute('data-day'); if(d>today) return; // futur bloqué
    if(d===fillState.selDay) return;
    if(!confirmDiscard()) return;                     // réponses cochées mais pas enregistrées -> on demande avant de les perdre
    fillState.selDay=d; fillState.answers=Object.assign({},(rec.days[d]&&rec.days[d].answers)||{}); renderWeekModal(); });
  if(canFill&&!future){
    box.querySelectorAll('.st').forEach(b=>b.onclick=()=>{ const k=b.getAttribute('data-k'); const v=b.getAttribute('data-v'); fillState.answers[k]=(fillState.answers[k]===v?'':v); paintItem(k); });
    const sd=document.getElementById('saveDay'); if(sd) sd.onclick=saveDay;
  }
}
// Des réponses ont-elles été cochées sans être enregistrées ? (comparaison avec la version sauvegardée du jour)
function hasUnsaved(){
  if(!fillState) return false;
  const saved=(fillState.rec.days[fillState.selDay]&&fillState.rec.days[fillState.selDay].answers)||{};
  const cur=fillState.answers||{};
  const keys=new Set(Object.keys(saved).concat(Object.keys(cur)));
  for(const k of keys){ if((saved[k]||'')!==(cur[k]||'')) return true; }
  return false;
}
function confirmDiscard(){
  if(!hasUnsaved()) return true;
  return confirm('Des réponses cochées ne sont pas enregistrées.\n\nQuitter sans enregistrer ? (OK = abandonner, Annuler = rester)');
}
function itemRow(form,key,label,val){
  const opts=statusOptions(form);
  let btns=opts.map(o=>'<div class="st '+o[0]+(val===o[0]?' on':'')+'" data-k="'+key+'" data-v="'+o[0]+'">'+escapeHtml(o[1])+'</div>').join('');
  return '<div class="irow" data-row="'+key+'"><div class="it-lbl">'+escapeHtml(label)+'</div><div class="st-btns">'+btns+'</div></div>';
}
function paintItem(key){
  const row=document.querySelector('.irow[data-row="'+key+'"]'); if(!row) return;
  row.querySelectorAll('.st').forEach(b=>b.classList.toggle('on', b.getAttribute('data-v')===fillState.answers[key]));
}
async function saveDay(){
  const {u,weekStart,selDay}=fillState;
  const ss=document.getElementById('saveStatus'); if(ss) ss.textContent='Enregistrement…';
  // FUSION : on relit l'enregistrement serveur juste avant d'écrire et on n'y remplace
  // QUE le jour sauvegardé (+ l'en-tête). Deux inspecteurs sur la même machine la même
  // semaine ne s'effacent plus mutuellement (ex. le lundi de l'un écrasé par le mardi de l'autre).
  const storeKey='inv:insp:'+u.form+':'+u.unitKey+':'+weekStart;
  let rec=null;
  try{ const fr=await storage.get(storeKey); if(fr&&fr.value) rec=JSON.parse(fr.value); }catch(e){}
  if(!rec) rec={ form:u.form, unitKey:u.unitKey, teamId:u.teamId, name:u.name, ident:u.ident, weekStart, header:{}, days:{} };
  const hdr=rec.header||{}; document.querySelectorAll('[data-hdr]').forEach(inp=>{ hdr[inp.getAttribute('data-hdr')]=inp.value.trim(); });
  rec.header=hdr;
  rec.days=rec.days||{};
  rec.days[selDay]={ answers:Object.assign({},fillState.answers), inspecteur:formatNom(myName()), deviceId:getDeviceId(), ts:new Date().toISOString() };
  rec.maj=new Date().toISOString();
  const r=await storage.set(storeKey, JSON.stringify(rec));
  if(r){ weekCache[u.unitKey]=weekCache[u.unitKey]||{}; weekCache[u.unitKey][weekStart]=rec; fillState.rec=rec; renderWeekModal(); const ss2=document.getElementById('saveStatus'); if(ss2) ss2.textContent='✓ Inspection du '+frDate(selDay)+' enregistrée'; }
  else if(ss) ss.textContent='Échec de l\'enregistrement — réessaie.';
}

// ================== ONGLETS GLOBAUX (échafaudage / madriers) ==================
let globalCache={};
async function renderGlobal(form){
  const wrap=document.getElementById('wrap'); const f=FORMS[form];
  wrap.innerHTML='<button class="btn brick" id="newInsp">＋ Nouvelle inspection — '+escapeHtml(f.label)+'</button><div class="empty">Chargement de l\'historique…</div>';
  document.getElementById('newInsp').onclick=()=>openGlobalForm(form,null);
  const rows=await storage.like('inv:insp:'+form+':g:');
  if(currentTab!==form) return;   // l'utilisateur a changé d'onglet pendant le chargement : ne pas écraser l'affichage
  const list=rows.map(r=>{ try{ const v=JSON.parse(r.value); v._key=r.key; return v; }catch(e){ return null; } }).filter(Boolean).sort((a,b)=>(b.ts||'').localeCompare(a.ts||''));

function inspHasAnomalie(x){ const a=x.answers||{}; for(const k in a){ if(a[k]==='anomalie') return true; } return false; }

  (f.groups||[]).forEach((g,gi)=>{

  h+='<button class="btn" id="closeM">Fermer</button>';
  const box=document.getElementById('modalBox'); box.innerHTML=h;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('overlay').onclick=e=>{ if(e.target.id==='overlay') closeModal(); };
  document.getElementById('closeM').onclick=closeModal;
  if(!ro){
    box.querySelectorAll('.st').forEach(b=>b.onclick=()=>{ const k=b.getAttribute('data-k'),v=b.getAttribute('data-v'); st.answers[k]=(st.answers[k]===v?'':v); const row=box.querySelector('.irow[data-row="'+k+'"]'); row.querySelectorAll('.st').forEach(x=>x.classList.toggle('on',x.getAttribute('data-v')===st.answers[k])); });
    document.getElementById('gSave').onclick=()=>saveGlobal(st);
  }
  if(ro && isAdmin){ document.getElementById('gDel').onclick=async()=>{ if(!confirm('Supprimer cette inspection ?')) return; await storage.del(existing._key); closeModal(); renderGlobal(form); }; }
}
async function saveGlobal(st){
  const box=document.getElementById('modalBox');
  const hdr={}; box.querySelectorAll('[data-gh]').forEach(inp=>hdr[inp.getAttribute('data-gh')]=inp.value.trim());
  const qty={}; box.querySelectorAll('[data-qa]').forEach(inp=>{ const k=inp.getAttribute('data-qa'); qty[k]=qty[k]||{}; qty[k].a=inp.value.trim(); }); box.querySelectorAll('[data-qr]').forEach(inp=>{ const k=inp.getAttribute('data-qr'); qty[k]=qty[k]||{}; qty[k].r=inp.value.trim(); });
  const rec={ form:st.form, teamId:myTeamId||'', inspecteur:formatNom(myName()), deviceId:getDeviceId(), date:document.getElementById('gDate').value||todayISO(), header:hdr, answers:st.answers, qty, commentaires:document.getElementById('gComment').value.trim(), ts:new Date().toISOString() };
  const ss=document.getElementById('saveStatus'); if(ss) ss.textContent='Enregistrement…';
  const key='inv:insp:'+st.form+':g:'+rec.ts.replace(/[:.]/g,'')+'_'+uid();
  const r=await storage.set(key, JSON.stringify(rec));
  if(r){ closeModal(); renderGlobal(st.form); } else if(ss) ss.textContent='Échec — réessaie.';
}
function closeModal(){ document.getElementById('overlay').classList.remove('show'); document.getElementById('overlay').onclick=null; }

// ================== EXPORT EXCEL (Ctrl+X, admin) ==================
let _xlsxLoading=null;
function ensureXLSX(){ if(window.XLSX) return Promise.resolve(); if(_xlsxLoading) return _xlsxLoading; _xlsxLoading=new Promise((res,rej)=>{ const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js'; s.onload=()=>res(); s.onerror=()=>{ _xlsxLoading=null; rej(new Error('xlsx')); }; document.head.appendChild(s); }); return _xlsxLoading; }
async function exporterExcel(){
  const btn=document.getElementById('exportBtn'); const old=btn?btn.textContent:'';
  if(btn){ btn.textContent='...'; btn.disabled=true; }
  try{
    try{ await ensureXLSX(); }catch(e){ alert('Module Excel indisponible.'); return; }
    const rows=await storage.like('inv:insp:');
    if(!rows.length){ alert('Aucune inspection à exporter.'); return; }
    const aoa=[['Fiche','Machine/Ident','Équipe','Date','Élément','Statut','Inspecteur','Commentaire']];
    rows.forEach(r=>{
      let v; try{ v=JSON.parse(r.value); }catch(e){ return; }
      const form=(r.key.split(':')[2])||''; const flabel=(FORMS[form]&&FORMS[form].label)||form;
      const items=itemsFlat(form);
      if(v.days){ // hebdo machine
        Object.keys(v.days).sort().forEach(d=>{ const dd=v.days[d]; const ans=dd.answers||{};
          items.forEach(it=>{ if(ans[it.key]) aoa.push([flabel, (v.ident?v.ident+' ':'')+(v.name||''), teamLabel(v.teamId), d, it.label, statLabel(form,ans[it.key]), formatNom(dd.inspecteur||''), '']); });
        });
      } else { // global
        const ans=v.answers||{};
        items.forEach(it=>{ if(ans[it.key]) aoa.push([flabel, (v.header&&(v.header.chantier||v.header.lieu||v.header.emplacement))||'', teamLabel(v.teamId||''), v.date||'', it.label, statLabel(form,ans[it.key]), formatNom(v.inspecteur||''), v.commentaires||'']); });
      }
    });
    const ws=XLSX.utils.aoa_to_sheet(aoa); ws['!cols']=[{wch:26},{wch:22},{wch:16},{wch:12},{wch:52},{wch:14},{wch:20},{wch:30}];
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Inspections');
    const d=new Date(); XLSX.writeFile(wb,'Inspections_DMD_'+d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'.xlsx');
    if(btn) btn.style.display='none';
  }catch(e){ console.error(e); alert('Erreur pendant l\'export.'); }
  finally{ if(btn){ btn.textContent=old||'⬇ Excel'; btn.disabled=false; } }
}
function statLabel(form,v){ const o=statusOptions(form).find(x=>x[0]===v); return o?o[1]:v; }
document.getElementById('exportBtn').addEventListener('click',exporterExcel);
document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&!e.altKey&&(e.key==='x'||e.key==='X')){
    const el=document.activeElement; if(el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.isContentEditable)) return;
    try{ if(localStorage.getItem('inv:isAdmin')!=='1') return; }catch(err){ return; }
    e.preventDefault(); const btn=document.getElementById('exportBtn'); if(btn){ btn.style.display=''; btn.focus(); }
  }
});

/* ==== DMD : Entree = champ suivant + correction auto du champ ==== */
(function(){
  if (window.__dmdEnterNext) return; window.__dmdEnterNext = true;
  var NAV_SCOPE='.modal, #modalBox, .card, form, .panel, .sheet, .edit-form';
  var SKIP={button:1,submit:1,reset:1,checkbox:1,radio:1,file:1,range:1,color:1,hidden:1,image:1};
  function navigable(el){ if(!el||el.tagName!=='INPUT') return false; var ty=(el.getAttribute('type')||'text').toLowerCase(); return !SKIP[ty]; }
  function visibleField(el){ if(el.disabled||el.readOnly) return false; var ty=(el.getAttribute('type')||'text').toLowerCase(); if(ty==='hidden'||ty==='file') return false; return el.offsetParent!==null; }
  document.addEventListener('keydown',function(e){
    if(e.key!=='Enter'||e.shiftKey||e.altKey||e.ctrlKey||e.metaKey) return;
    if(e.defaultPrevented) return;
    var t=e.target; if(!navigable(t)) return;
    var scope=t.closest(NAV_SCOPE); if(!scope) return;
    var fields=[].slice.call(scope.querySelectorAll('input, select, textarea')).filter(visibleField);
    var i=fields.indexOf(t); if(i<0) return;
    e.preventDefault();
    if(i<fields.length-1){ var nx=fields[i+1]; nx.focus(); if(nx.select){ try{nx.select();}catch(_){} } } else { t.blur(); }
  });
})();
